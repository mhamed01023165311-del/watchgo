<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchGo - Studio Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --primary: #9b51e0; --bg: #050505; --text: #ffffff; --glass: rgba(255, 255, 255, 0.05); --transition: 0.3s ease-in-out; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; line-height: 1.6; overflow-x: hidden; }

        /* --- الأزرار العلوية --- */
        .admin-controls { position: fixed; top: 20px; left: 20px; z-index: 10001; display: flex; gap: 10px; }
        .gear-btn { background: var(--primary); color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 0 15px var(--primary); }
        .bg-btn { background: #e67e22; display: none; }

        .hero-section { position: relative; width: 100%; min-height: 100vh; background-size: cover; background-position: center; background-attachment: fixed; display: flex; flex-direction: column; align-items: center; padding: 40px 5%; }
        .hero-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(5,5,5,0.5) 0%, rgba(5,5,5,0.9) 70%, #050505 100%); z-index: 1; }

        .movie-layout { position: relative; z-index: 2; display: grid; grid-template-columns: 320px 1fr; gap: 40px; width: 100%; max-width: 1400px; margin-top: 20px; }
        .poster { width: 100%; border-radius: 15px; border: 2px solid var(--primary); box-shadow: 0 0 30px rgba(155, 81, 224, 0.4); cursor: pointer; }

        .btn { padding: 15px; border-radius: 12px; text-align: center; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: var(--transition); color: white; text-decoration: none; border: none; width: 100%; margin-bottom: 10px; }
        .btn-watch { background: var(--primary); }
        .btn-download { background: #222; border: 1px solid #444; }

        .content-panel h1 { font-size: 48px; margin-bottom: 10px; outline: none; }
        .section-header { display: flex; align-items: center; gap: 12px; color: var(--primary); font-size: 22px; margin: 30px 0 15px; font-weight: bold; }
        .overview { font-size: 17px; color: #ccc; background: var(--glass); padding: 25px; border-radius: 15px; border-right: 5px solid var(--primary); backdrop-filter: blur(10px); outline: none; }

        /* الشبكة Grid */
        .items-grid { display: grid; gap: 20px; margin-bottom: 20px; grid-template-columns: repeat(6, 1fr); }
        #seasonsGrid, #relatedGrid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
        #episodesGrid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }

        .item-card { position: relative; background: #111; border-radius: 12px; overflow: hidden; cursor: pointer; transition: var(--transition); border: 1px solid #222; aspect-ratio: 2/3; }
        #episodesGrid .item-card { aspect-ratio: 16/9; }
        .item-card:hover { transform: scale(1.05); border-color: var(--primary); }
        .item-card img { width: 100%; height: 100%; object-fit: cover; }
        .item-info { padding: 10px; text-align: center; background: rgba(0,0,0,0.8); font-size: 14px; position: absolute; bottom: 0; width: 100%; }

        /* المودال */
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:20000; justify-content:center; align-items:center; backdrop-filter: blur(10px); }
        .modal-box { background: #111; padding: 30px; border-radius: 20px; border: 1px solid var(--primary); width: 90%; max-width: 500px; text-align: center; }
        .modal-box input { width: 100%; padding: 12px; margin-bottom: 15px; background: #222; border: 1px solid #444; color: white; border-radius: 8px; }

        #libraryGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; max-height: 400px; overflow-y: auto; padding: 10px; }
        
        .edit-mode [contenteditable="true"] { border: 1px dashed var(--primary); background: rgba(155, 81, 224, 0.05); }
        .edit-mode .bg-btn { display: flex; }
        .add-btn { display: none; background: var(--glass); border: 2px dashed var(--primary); border-radius: 12px; align-items: center; justify-content: center; font-size: 30px; color: var(--primary); cursor: pointer; min-height: 150px; }
        .edit-mode .add-btn { display: flex; }
        
        @media (max-width: 1000px) { 
            .movie-layout { grid-template-columns: 1fr; }
            .items-grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>

    <div class="admin-controls">
        <div class="gear-btn" onclick="toggleEditMode()"><i class="fa-solid fa-gear"></i></div>
        <div class="gear-btn bg-btn" onclick="triggerFile('bg')"><i class="fa-solid fa-image"></i></div>
    </div>

    <div id="episodeModal" class="modal">
        <div class="modal-box">
            <h2 id="epModalTitle">إعدادات الحلقة</h2>
            <div id="editEpLinks" style="display:none;">
                <input type="text" id="watchLink" placeholder="رابط المشاهدة">
                <input type="text" id="downloadLink" placeholder="رابط التحميل">
                <button class="btn btn-watch" onclick="saveEpLinks()">حفظ الروابط</button>
            </div>
            <div id="userEpLinks" style="display:none;">
                <button class="btn btn-watch" onclick="openLink('watch')">مشاهدة الآن</button>
                <button class="btn btn-download" onclick="openLink('download')">تحميل الحلقة</button>
            </div>
            <button class="btn" style="background:#444" onclick="closeModals()">إلغاء</button>
        </div>
    </div>

    <div id="libraryModal" class="modal">
        <div class="modal-box" style="max-width: 700px;">
            <h2>اختر عملاً لإضافته</h2>
            <div id="libraryGrid"></div>
            <button class="btn" style="background:#444; margin-top:20px;" onclick="closeModals()">إغلاق</button>
        </div>
    </div>

    <input type="file" id="fileInput" style="display:none" accept="image/*">

    <div class="hero-section" id="heroSection">
        <div class="hero-overlay"></div>
        <div class="movie-layout">
            <div class="side-panel">
                <img src="https://via.placeholder.com/320x480" id="poster" class="poster" onclick="triggerFile('poster')">
                <button class="btn btn-watch" onclick="handleMainAction('watch')">المشاهدة الآن</button>
                <button class="btn btn-download" onclick="handleMainAction('download')">تحميل مباشر</button>
            </div>

            <div class="content-panel">
                <h1 id="movieTitle" contenteditable="false">اسم العمل</h1>
                <p id="movieOverview" class="overview" contenteditable="false">وصف العمل...</p>

                <div id="seriesSection">
                    <div class="section-header">المواسم والحلقات</div>
                    <div class="items-grid" id="seasonsGrid">
                        <div class="add-btn" onclick="addSeason()"><i class="fa-solid fa-plus"></i></div>
                    </div>
                    <div id="episodesArea" style="display:none; margin-top:20px;">
                        <div class="items-grid" id="episodesGrid">
                            <div class="add-btn" onclick="addEpisode()"><i class="fa-solid fa-plus"></i></div>
                        </div>
                    </div>
                </div>

                <div class="section-header">معلومات</div>
                <div style="display:flex; gap:15px;">
                    <div style="background:var(--glass); padding:10px 20px; border-radius:10px;">التقييم: <span id="detRate" contenteditable="false">8.0</span></div>
                    <div style="background:var(--glass); padding:10px 20px; border-radius:10px;">السنة: <span id="detYear" contenteditable="false">2026</span></div>
                </div>
            </div>
        </div>

        <div class="related-section" style="width: 100%; max-width: 1400px; z-index: 2; margin-top: 50px;">
            <div class="section-header">أعمال قد تعجبك</div>
            <div class="items-grid" id="relatedGrid">
                <div class="add-btn" onclick="openLibrary()"><i class="fa-solid fa-plus"></i></div>
            </div>
        </div>
    </div>

    <script>
        let isEdit = false;
        let activeEp = null;
        let seasonCover = null;
        let pendingName = "";

        function toggleEditMode() {
            isEdit = !isEdit;
            document.body.classList.toggle('edit-mode');
            document.querySelectorAll('[contenteditable]').forEach(el => el.contentEditable = isEdit);
        }

        function triggerFile(target) {
            const input = document.getElementById('fileInput');
            input.onchange = (e) => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = ev.target.result;
                    if(target === 'poster') document.getElementById('poster').src = img;
                    if(target === 'bg') document.getElementById('heroSection').style.backgroundImage = `url(${img})`;
                    if(target === 'epFirst') {
                        seasonCover = img;
                        renderEpisode(pendingName, img);
                    }
                };
                reader.readAsDataURL(e.target.files[0]);
            };
            input.click();
        }

        function addSeason() {
            let num = prompt("رقم الموسم؟");
            if(!num) return;
            const grid = document.getElementById('seasonsGrid');
            const card = document.createElement('div');
            card.className = 'item-card';
            card.innerHTML = `<img src="https://via.placeholder.com/150x240"><div class="item-info">موسم ${num}</div>`;
            card.onclick = () => showEpisodes(num);
            grid.insertBefore(card, grid.lastElementChild);
        }

        function addEpisode() {
            let num = prompt("رقم الحلقة؟");
            if(!num) return;
            pendingName = num;
            const grid = document.getElementById('episodesGrid');
            
            if(grid.querySelectorAll('.item-card').length === 0) {
                alert("اختر صورة غلاف موحدة لهذا الموسم");
                triggerFile('epFirst');
            } else {
                renderEpisode(num, seasonCover);
            }
        }

        function renderEpisode(num, img) {
            const grid = document.getElementById('episodesGrid');
            const card = document.createElement('div');
            card.className = 'item-card';
            card.innerHTML = `<img src="${img}"><div class="item-info">حلقة ${num}</div>`;
            card.onclick = () => openEpModal(num);
            grid.insertBefore(card, grid.lastElementChild);
        }

        function showEpisodes(sn) {
            document.getElementById('episodesArea').style.display = 'block';
            document.getElementById('episodesArea').scrollIntoView({behavior:'smooth'});
        }

        function openEpModal(num) {
            activeEp = num;
            const modal = document.getElementById('episodeModal');
            document.getElementById('epModalTitle').innerText = `حلقة رقم ${num}`;
            modal.style.display = 'flex';
            document.getElementById('editEpLinks').style.display = isEdit ? 'block' : 'none';
            document.getElementById('userEpLinks').style.display = isEdit ? 'none' : 'block';
            if(isEdit) {
                document.getElementById('watchLink').value = localStorage.getItem(`ep_w_${num}`) || '';
                document.getElementById('downloadLink').value = localStorage.getItem(`ep_d_${num}`) || '';
            }
        }

        function saveEpLinks() {
            localStorage.setItem(`ep_w_${activeEp}`, document.getElementById('watchLink').value);
            localStorage.setItem(`ep_d_${activeEp}`, document.getElementById('downloadLink').value);
            alert("تم الحفظ");
            closeModals();
        }

        function openLink(type) {
            let link = localStorage.getItem(type === 'watch' ? `ep_w_${activeEp}` : `ep_d_${activeEp}`);
            if(link) window.open(link, '_blank'); else alert("الرابط غير متاح");
        }

        function openLibrary() {
            document.getElementById('libraryModal').style.display = 'flex';
            const grid = document.getElementById('libraryGrid');
            grid.innerHTML = '';
            for(let i=1; i<=8; i++) {
                grid.innerHTML += `<div class="lib-item" onclick="selectFromLib(${i})"><img src="https://via.placeholder.com/200/9b51e0/ffffff?text=Movie+${i}"></div>`;
            }
        }

        function selectFromLib(id) {
            const grid = document.getElementById('relatedGrid');
            const card = document.createElement('div');
            card.className = 'item-card';
            card.innerHTML = `<img src="https://via.placeholder.com/200/9b51e0/ffffff?text=Movie+${id}"><div class="item-info">عمل مقترح</div>`;
            grid.insertBefore(card, grid.lastElementChild);
            closeModals();
        }

        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

        function handleMainAction(type) {
            if(isEdit) {
                let url = prompt("أدخل الرابط:");
                if(url) localStorage.setItem(`main_${type}`, url);
            } else {
                let link = localStorage.getItem(`main_${type}`);
                if(link) window.open(link); else alert("الرابط غير متاح");
            }
        }
    </script>
</body>
</html>
