<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchGo - Premium Studio UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { 
            --primary: #9b51e0; 
            --bg: #050505; --text: #ffffff; 
            --glass: rgba(255, 255, 255, 0.05);
            --edit-border: #4caf50;
        }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; }

        /* الهيدر الصغير للتحكم */
        .studio-header { position: fixed; top: 20px; left: 20px; z-index: 9999; display: flex; gap: 10px; }
        .studio-btn { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--primary); color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .studio-btn:hover { background: var(--primary); transform: rotate(90deg); }

        .hero-section { position: relative; width: 100%; min-height: 100vh; background-size: cover; background-position: center; background-attachment: fixed; display: flex; flex-direction: column; align-items: center; padding: 40px 5%; }
        .hero-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(5,5,5,0.5) 0%, rgba(5,5,5,0.9) 70%, #050505 100%); z-index: 1; }

        .movie-layout { position: relative; z-index: 2; display: grid; grid-template-columns: 320px 1fr; gap: 40px; width: 100%; max-width: 1400px; margin-top: 20px; }
        .poster { width: 100%; border-radius: 15px; border: 2px solid var(--primary); cursor: pointer; transition: 0.3s; }
        
        .btn { padding: 15px; border-radius: 12px; text-align: center; font-weight: bold; cursor: pointer; border: none; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 16px; transition: 0.3s; color: white; margin-bottom: 10px; width: 100%; }
        .btn-watch { background: var(--primary); }
        .btn-download { background: #222; border: 1px solid #444; }

        .content-panel h1 { font-size: 48px; margin-bottom: 10px; outline: none; }
        .section-header { display: flex; align-items: center; gap: 12px; color: var(--primary); font-size: 22px; margin: 30px 0 15px; font-weight: bold; }
        .overview { font-size: 17px; color: #ccc; background: var(--glass); padding: 25px; border-radius: 15px; border-right: 5px solid var(--primary); outline: none; }

        .items-grid { display: grid; gap: 20px; margin-bottom: 20px; }
        #seasonsGrid, #relatedGrid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
        #episodesGrid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }

        .item-card { position: relative; background: #111; border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid #222; height: 250px; }
        .item-card img { width: 100%; height: 100%; object-fit: cover; }
        .item-info { padding: 10px; background: rgba(0,0,0,0.8); position: absolute; bottom: 0; width: 100%; text-align: center; font-size: 12px; }
        
        /* وضع التعديل */
        .edit-mode [contenteditable="true"] { border: 1px dashed var(--edit-border) !important; background: rgba(76, 175, 80, 0.1); }
        .add-btn-card { display: none; border: 2px dashed var(--primary); align-items: center; justify-content: center; font-size: 30px; color: var(--primary); }
        .edit-mode .add-btn-card { display: flex; }

        .details-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .detail-card { background: var(--glass); padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; }
        .detail-card span { outline: none; min-width: 50px; text-align: left; }

        #fileInput { display: none; }
    </style>
</head>
<body class="">

    <div class="studio-header">
        <div class="studio-btn" onclick="toggleEditMode()"><i class="fa-solid fa-gear"></i></div>
        <div class="studio-btn" onclick="saveAllData()" title="حفظ"><i class="fa-solid fa-floppy-disk"></i></div>
    </div>

    <input type="file" id="fileInput" accept="image/*">

    <div class="hero-section" id="heroSection">
        <div class="hero-overlay"></div>
        <div class="movie-layout">
            <div class="side-panel">
                <img src="" id="poster" class="poster" onclick="triggerImg('poster')">
                <button class="btn btn-watch" onclick="handleLink('watch')"><i class="fa-solid fa-play"></i> المشاهدة الآن</button>
                <button class="btn btn-download" onclick="handleLink('download')"><i class="fa-solid fa-download"></i> تحميل مباشر</button>
            </div>

            <div class="content-panel">
                <h1 id="movieTitle" contenteditable="false">اسم الفيلم</h1>
                <div class="section-header"><i class="fa-solid fa-align-right"></i> قصة العمل</div>
                <p id="movieOverview" class="overview" contenteditable="false">اكتب وصف العمل هنا...</p>

                <div id="seriesSection">
                    <div class="section-header"><i class="fa-solid fa-layer-group"></i> المواسم / الأجزاء</div>
                    <div class="items-grid" id="seasonsGrid">
                        <div class="item-card add-btn-card" onclick="addNewSeason()"><i class="fa-solid fa-plus"></i></div>
                    </div>
                </div>

                <div class="section-header"><i class="fa-solid fa-circle-info"></i> معلومات العمل</div>
                <div class="details-grid">
                    <div class="detail-card"><b>التقييم:</b> <span id="detRate" contenteditable="false">8.5</span></div>
                    <div class="detail-card"><b>السنة:</b> <span id="detYear" contenteditable="false">2026</span></div>
                    <div class="detail-card"><b>اللغة:</b> <span id="detLang" contenteditable="false">AR</span></div>
                </div>
            </div>
        </div>

        <div class="movie-layout" style="margin-top:50px;">
            <div style="grid-column: 1 / -1;">
                <div class="section-header"><i class="fa-solid fa-wand-magic-sparkles"></i> أعمال قد تعجبك</div>
                <div class="items-grid" id="relatedGrid">
                    <div class="item-card add-btn-card" onclick="addRelated()"><i class="fa-solid fa-plus"></i></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = 'https://script.google.com/macros/s/AKfycbw4GkkBMwuUqmeMBYUNV1u0LvQvMla1MgM6ActKpZsdhVvPUnUqdi1StaL_1KkEgniV2A/exec';
        let editMode = false;
        let currentTargetImg = null;
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const isNew = params.get('action') === 'add';

        // تطبيق اللون المفضل
        const savedColor = localStorage.getItem('watchgo_primary_color');
        if(savedColor) document.documentElement.style.setProperty('--primary', savedColor);

        async function init() {
            if(isNew) {
                document.getElementById('movieTitle').innerText = "فيلم جديد";
                setupBlankState();
            } else {
                fetchContent();
            }
        }

        function toggleEditMode() {
            editMode = !editMode;
            document.body.classList.toggle('edit-mode');
            const elements = ['movieTitle', 'movieOverview', 'detRate', 'detYear', 'detLang'];
            elements.forEach(id => document.getElementById(id).contentEditable = editMode);
            alert(editMode ? "وضع التعديل مفعل" : "تم إيقاف التعديل");
        }

        function triggerImg(target) {
            if(!editMode) return;
            currentTargetImg = target;
            document.getElementById('fileInput').click();
        }

        document.getElementById('fileInput').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                if(currentTargetImg === 'poster') {
                    document.getElementById('poster').src = event.target.result;
                } else if(currentTargetImg === 'hero') {
                    document.getElementById('heroSection').style.backgroundImage = `url(${event.target.result})`;
                } else if(typeof currentTargetImg === 'object') {
                    currentTargetImg.src = event.target.result;
                }
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function handleLink(type) {
            if(editMode) {
                const url = prompt(`أدخل رابط ${type === 'watch' ? 'المشاهدة' : 'التحميل'}:`);
                if(url) localStorage.setItem(`link_${type}_${id}`, url);
            } else {
                const savedLink = localStorage.getItem(`link_${type}_${id}`);
                if(savedLink) window.open(savedLink, '_blank');
                else alert("الرابط غير متوفر بعد.");
            }
        }

        async function fetchContent() {
            try {
                const res = await fetch(`${BASE_URL}?endpoint=movie/${id}&language=ar-SA`);
                const data = await res.json();
                document.getElementById('movieTitle').innerText = data.title || data.name;
                document.getElementById('movieOverview').innerText = data.overview;
                document.getElementById('poster').src = `https://image.tmdb.org/t/p/w500${data.poster_path}`;
                document.getElementById('heroSection').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${data.backdrop_path})`;
                document.getElementById('detRate').innerText = data.vote_average;
                document.getElementById('detYear').innerText = (data.release_date || "").split('-')[0];
                document.getElementById('detLang').innerText = data.original_language?.toUpperCase();
            } catch(e) { console.error(e); }
        }

        function addNewSeason() {
            const sGrid = document.getElementById('seasonsGrid');
            const num = sGrid.children.length;
            const card = document.createElement('div');
            card.className = 'item-card';
            card.innerHTML = `<img src="https://via.placeholder.com/150x220" onclick="triggerImg(this.querySelector('img'))"><div class="item-info">موسم ${num}</div>`;
            card.onclick = () => { if(!editMode) alert("سيتم فتح الحلقات"); };
            sGrid.insertBefore(card, sGrid.lastElementChild);
            
            if(confirm("هل تريد اختيار صورة موحدة لكل الحلقات في هذا الموسم؟")) {
                document.getElementById('fileInput').click();
                // هنا سيتم تخزين منطق الصورة الموحدة
            }
        }

        function addRelated() {
            const rGrid = document.getElementById('relatedGrid');
            const card = document.createElement('div');
            card.className = 'item-card';
            card.innerHTML = `<img src="https://via.placeholder.com/150x220"><div class="item-info">عمل مضاف</div>`;
            rGrid.insertBefore(card, rGrid.lastElementChild);
        }

        function saveAllData() {
            alert("تم حفظ التعديلات محلياً بنجاح!");
            toggleEditMode();
        }

        init();
    </script>
</body>
</html>
