<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchGo - Premium Cinematic UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="mobile-movie.css" media="screen and (max-width: 1024px)">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { 
            --primary: #9b51e0; 
            --bg: #050505; 
            --text: #ffffff; 
            --imdb-gold: #f5c518;
            --glass: rgba(255, 255, 255, 0.05);
            --transition: 0.3s ease-in-out;
        }
        
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; line-height: 1.6; }

        /* --- نظام البلور الشامل --- */
        .blur-container:hover .blur-item:not(:hover) { 
            filter: blur(5px) grayscale(0.5); 
            opacity: 0.4; 
            transform: scale(0.95);
        }

        .hero-section {
            position: relative; width: 100%; min-height: 100vh;
            background-size: cover; background-position: center; background-attachment: fixed;
            display: flex; flex-direction: column; align-items: center; padding: 40px 5%;
        }

        .hero-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(5,5,5,0.5) 0%, rgba(5,5,5,0.9) 70%, #050505 100%);
            z-index: 1;
        }

        .movie-layout { 
            position: relative; z-index: 2; display: grid; grid-template-columns: 320px 1fr; 
            gap: 40px; width: 100%; max-width: 1400px; margin-top: 20px;
        }

        /* الجانب الأيمن */
        .side-panel { display: flex; flex-direction: column; gap: 20px; }
        .poster { 
            width: 100%; border-radius: 15px; border: 2px solid var(--primary); 
            box-shadow: 0 0 30px rgba(155, 81, 224, 0.4); transition: var(--transition);
        }
        .poster:hover { transform: scale(1.02); box-shadow: 0 0 50px var(--primary); }

        .btn {
            padding: 15px; border-radius: 12px; text-align: center; font-weight: bold; cursor: pointer;
            border: none; display: flex; align-items: center; justify-content: center; gap: 10px;
            font-size: 16px; transition: var(--transition); color: white; text-decoration: none;
        }
        .btn-watch { background: var(--primary); }
        .btn-download { background: #222; border: 1px solid #444; }
        .btn-trailer { background: #ff0000; box-shadow: 0 0 10px rgba(255, 0, 0, 0.2); }
        .btn-trailer:hover { box-shadow: 0 0 30px #ff0000; transform: translateY(-5px); }
        .btn:hover { transform: translateY(-5px); filter: brightness(1.2); }

        /* الجانب الأيسر */
        .content-panel h1 { font-size: 48px; margin-bottom: 10px; color: #fff; }
        .section-header { display: flex; align-items: center; gap: 12px; color: var(--primary); font-size: 22px; margin: 30px 0 15px; font-weight: bold; }
        .overview { font-size: 17px; color: #ccc; background: var(--glass); padding: 25px; border-radius: 15px; border-right: 5px solid var(--primary); backdrop-filter: blur(10px); }

        /* كروت العرض */
        .items-grid { display: grid; gap: 20px; margin-bottom: 20px; }
        #seasonsGrid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
        #episodesGrid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
        #relatedGrid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }

        .item-card {
            position: relative; background: #111; border-radius: 12px; overflow: hidden;
            cursor: pointer; transition: var(--transition); border: 1px solid #222;
        }
        .item-card:hover { transform: scale(1.1) translateY(-10px); border-color: var(--primary); box-shadow: 0 0 25px var(--primary); z-index: 10; }
        
        .item-card img { width: 100%; display: block; object-fit: cover; }
        #seasonsGrid img, #relatedGrid img { height: 260px; }
        #episodesGrid img { height: 130px; }

        .item-badge { position: absolute; top: 10px; right: 10px; background: #e74c3c; color: white; padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; z-index: 2; }
        .item-info { padding: 12px; text-align: center; background: rgba(0,0,0,0.8); font-size: 14px; position: absolute; bottom: 0; width: 100%; }

        /* الممثلين والمعلومات */
        .details-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .detail-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; border: 1px solid var(--glass); display: flex; justify-content: space-between; }
        .detail-card b { color: var(--primary); }

        .cast-scroll { display: flex; gap: 20px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .cast-item { min-width: 90px; text-align: center; transition: var(--transition); }
        .cast-item:hover { transform: scale(1.2); }
        .cast-item img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }

        .related-section { position: relative; z-index: 2; width: 100%; max-width: 1400px; padding: 40px 0; }

        /* مودال التريلر مع تأثير الجلو والبلور */
        #trailerModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.92); z-index:10000; justify-content:center; align-items:center; backdrop-filter: blur(15px); }
        .modal-content { position:relative; width:90%; max-width:900px; box-shadow: 0 0 60px var(--primary); border-radius: 15px; background: #000; }

        @media (max-width: 1000px) {
            .movie-layout { grid-template-columns: 1fr; }
            .side-panel { align-items: center; }
            .poster { max-width: 280px; }
        }
    </style>
</head>
<body>

    <div class="hero-section" id="heroSection">
        <div class="hero-overlay"></div>
        <div class="movie-layout">
            <div class="side-panel">
                <img src="" id="poster" class="poster blur-item">
                <button class="btn btn-watch"><i class="fa-solid fa-play"></i> المشاهدة الآن</button>
                <button class="btn btn-download"><i class="fa-solid fa-download"></i> تحميل مباشر</button>
                <button id="openTrailer" class="btn btn-trailer"><i class="fa-brands fa-youtube"></i> العرض الدعائي</button>
            </div>

            <div class="content-panel">
                <h1 id="movieTitle">Loading...</h1>
                <div class="section-header"><i class="fa-solid fa-align-right"></i> قصة العمل</div>
                <p id="movieOverview" class="overview">جاري التحميل...</p>

                <div id="seriesSection" style="display:none;">
                    <div class="section-header"><i class="fa-solid fa-layer-group"></i> المواسم المتاحة</div>
                    <div class="blur-container">
                        <div class="items-grid" id="seasonsGrid"></div>
                    </div>
                    <div id="episodesArea" style="display:none; margin-top:20px;">
                        <div class="section-header"><i class="fa-solid fa-tv"></i> الحلقات</div>
                        <div class="blur-container"><div class="items-grid" id="episodesGrid"></div></div>
                    </div>
                </div>

                <div class="section-header"><i class="fa-solid fa-circle-info"></i> معلومات العمل</div>
                <div class="details-grid blur-container">
                    <div class="detail-card blur-item"><b>القسم:</b> <span id="detType">--</span></div>
                    <div class="detail-card blur-item"><b>التقييم:</b> <span id="detRate">--</span></div>
                    <div class="detail-card blur-item"><b>السنة:</b> <span id="detYear">----</span></div>
                    <div class="detail-card blur-item"><b>اللغة:</b> <span id="detLang">--</span></div>
                </div>

                <div class="section-header"><i class="fa-solid fa-users"></i> طاقم التمثيل</div>
                <div id="castContainer" class="cast-scroll blur-container"></div>
            </div>
        </div>

        <div class="related-section">
            <div class="section-header"><i class="fa-solid fa-wand-magic-sparkles"></i> أعمال قد تعجبك</div>
            <div class="blur-container">
                <div class="items-grid" id="relatedGrid"></div>
            </div>
        </div>
    </div>

    <div id="trailerModal">
        <div class="modal-content">
            <span id="closeTrailer" style="position:absolute; top:-40px; right:0; color:white; font-size:30px; cursor:pointer;"><i class="fa-solid fa-xmark"></i> إغلاق</span>
            <iframe id="trailerFrame" width="100%" height="500" src="" frameborder="0" allowfullscreen style="border-radius:15px; display: block;"></iframe>
        </div>
    </div>

    <script>
        // التعديل: شلنا الـ Key والـ URL المباشر
        const API_KEY = '480fd49f76a6c9ada2b91fc2297c6af7'; 
        const BASE_URL = 'https://script.google.com/macros/s/AKfycbw4GkkBMwuUqmeMBYUNV1u0LvQvMla1MgM6ActKpZsdhVvPUnUqdi1StaL_1KkEgniV2A/exec';

        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const type = params.get('type') || 'movie';

        async function fetchContent() {
            if(!id) return;
            try {
                // طلب البيانات عبر الباك إند (بدون الكشف عن الـ Key)
               const [resAR, resEN, resVid, resSim] = await Promise.all([
                  fetch(`${BASE_URL}?endpoint=${type}/${id}&language=ar-SA`),
                  fetch(`${BASE_URL}?endpoint=${type}/${id}&language=en-US&append_to_response=credits`),
                  fetch(`${BASE_URL}?endpoint=${type}/${id}/videos`),
                  fetch(`${BASE_URL}?endpoint=${type}/${id}/similar&language=ar-SA`)
                     ]);
                const dataAR = await resAR.json();
                const dataEN = await resEN.json();
                const vids = await resVid.json();
                const similar = await resSim.json();

                document.getElementById('movieOverview').innerText = (dataAR.overview && dataAR.overview.length > 5) ? dataAR.overview : (dataEN.overview || "الوصف غير متوفر حالياً.");
                document.getElementById('movieTitle').innerText = dataEN.title || dataEN.name || dataAR.title || dataAR.name;
                
                document.getElementById('poster').src = `https://image.tmdb.org/t/p/w500${dataEN.poster_path}`;
                document.getElementById('heroSection').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${dataEN.backdrop_path})`;
                
                document.getElementById('detType').innerText = type === 'tv' ? 'مسلسل' : 'فيلم';
                document.getElementById('detRate').innerText = (dataEN.vote_average || 0).toFixed(1) + ' / 10';
                document.getElementById('detYear').innerText = (dataEN.release_date || dataEN.first_air_date || '').split('-')[0];
                document.getElementById('detLang').innerText = dataEN.original_language?.toUpperCase();

                const castBox = document.getElementById('castContainer');
                dataEN.credits?.cast.slice(0, 10).forEach(c => {
                    if(c.profile_path) castBox.innerHTML += `<div class="cast-item blur-item"><img src="https://image.tmdb.org/t/p/w200${c.profile_path}"><p>${c.name}</p></div>`;
                });

                const relBox = document.getElementById('relatedGrid');
                similar.results?.slice(0, 6).forEach(item => {
                    relBox.innerHTML += `
                        <a href="?id=${item.id}&type=${type}" class="item-card blur-item" style="text-decoration:none; color:white;">
                            <img src="https://image.tmdb.org/t/p/w300${item.poster_path}">
                            <div class="item-info"><b>${item.title || item.name}</b></div>
                        </a>`;
                });

                if(type === 'tv') {
                    document.getElementById('seriesSection').style.display = 'block';
                    const sGrid = document.getElementById('seasonsGrid');
                    dataEN.seasons?.filter(s => s.season_number > 0).forEach(s => {
                        const card = document.createElement('div');
                        card.className = 'item-card blur-item';
                        card.innerHTML = `<div class="item-badge">Season ${s.season_number}</div><img src="https://image.tmdb.org/t/p/w300${s.poster_path || ''}"><div class="item-info"><b>Season ${s.season_number}</b></div>`;
                        card.onclick = () => loadEpisodes(s.season_number);
                        sGrid.appendChild(card);
                    });
                }

                const trailer = vids.results?.find(v => v.type === 'Trailer');
                if(trailer) {
                    document.getElementById('openTrailer').onclick = () => {
                        document.getElementById('trailerFrame').src = `https://www.youtube.com/embed/${trailer.key}?autoplay=1`;
                        document.getElementById('trailerModal').style.display = 'flex';
                    };
                } else { document.getElementById('openTrailer').style.display = 'none'; }

            } catch(e) { console.log(e); }
        }

        async function loadEpisodes(sn) {
            const area = document.getElementById('episodesArea');
            const grid = document.getElementById('episodesGrid');
            grid.innerHTML = '<p style="padding:20px; color:var(--primary);">Loading Episodes...</p>';
            area.style.display = 'block';
            area.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            
            // طلب الحلقات عبر الباك إند
            const res = await fetch(`${BASE_URL}/tv/${id}/season/${sn}?language=ar-SA`);
            const data = await res.json();
            
            const resBackup = await fetch(`${BASE_URL}/tv/${id}/season/${sn}?language=en-US`);
            const dataBackup = await resBackup.json();

            grid.innerHTML = '';
            dataBackup.episodes?.forEach((e, index) => {
                const epName = (data.episodes && data.episodes[index] && data.episodes[index].name) ? data.episodes[index].name : `الحلقة ${e.episode_number}`;
                grid.innerHTML += `<div class="item-card blur-item"><div class="item-badge">Episode ${e.episode_number}</div><img src="https://image.tmdb.org/t/p/w300${e.still_path || ''}"><div class="item-info"><b>${epName}</b></div></div>`;
            });
        }

        document.getElementById('closeTrailer').onclick = () => {
            document.getElementById('trailerModal').style.display = 'none';
            document.getElementById('trailerFrame').src = '';
        };

        fetchContent();
    </script>
</body>
</html>
