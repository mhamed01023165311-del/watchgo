<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchGo - النسخة الأصلية المستقرة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #9b51e0; --bg: #070707; --card: #111; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

        /* الهيدر الأصلي */
        .header { background: #000; padding: 0 40px; height: 70px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); sticky; top: 0; z-index: 1000; }
        .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo img { width: 40px; height: 40px; border-radius: 50%; border: 1.5px solid var(--primary); }

        /* السلايدر */
        .hero { width: 95%; height: 400px; margin: 20px auto; border-radius: 15px; position: relative; overflow: hidden; border: 1px solid #222; }
        .slide { width: 100%; height: 100%; background-size: cover; background-position: center; display: none; }
        .slide.active { display: block; }
        .slide-content { position: absolute; bottom: 0; padding: 40px; background: linear-gradient(transparent, #000); width: 100%; }

        /* الشبكة الأصلية 4x3 */
        .container { display: grid; grid-template-columns: 260px 1fr 260px; gap: 20px; padding: 20px 40px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .card { background: var(--card); border-radius: 8px; overflow: hidden; position: relative; transition: 0.3s; cursor: pointer; border: 1px solid #222; }
        .card:hover { transform: scale(1.03); border-color: var(--primary); }
        .card img { width: 100%; height: 220px; object-fit: cover; }
        .card-title { padding: 8px; font-size: 12px; text-align: center; }

        /* القوائم الجانبية */
        .side { background: #111; border: 1px solid #222; border-radius: 8px; height: fit-content; }
        .side-h { padding: 10px; border-bottom: 1px solid #333; color: var(--primary); font-weight: bold; text-align: center; }
        .side-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-bottom: 1px solid #222; }
        .side-item img { width: 40px; height: 55px; border-radius: 4px; }

        /* وضع المطور والقائمة الذكية */
        .dev-btn { background: var(--primary); color: #fff; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; margin-right: 10px; display: none; }
        .edit-enabled .dev-btn { display: inline-block; }
        
        /* قائمة اختيار الأفلام (الذكية) */
        #moviePicker { display: none; position: fixed; top: 10%; left: 10%; width: 80%; height: 80%; background: #151515; z-index: 9999; border: 2px solid var(--primary); border-radius: 15px; padding: 20px; overflow-y: auto; }
        .picker-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 15px; }

        .close-picker { position: absolute; top: 10px; left: 10px; font-size: 25px; cursor: pointer; color: red; }
        .pagination { display: flex; justify-content: center; gap: 5px; margin-top: 10px; }
        .page-btn { padding: 5px 10px; background: #222; border: none; color: #fff; cursor: pointer; border-radius: 3px; }
        .page-btn.active { background: var(--primary); }

        @media (max-width: 1000px) { .container { grid-template-columns: 1fr; } .side { display: none; } .grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<header class="header">
    <div class="logo" onclick="if(state.edit) editID()">
        <img id="mainLogo" src="https://i.ibb.co/5ggRsXdV/Red-Black-Modern-Movie-Cinema-Presentation-20260311-124846.jpg">
        <span id="siteName">WATCH<span style="color:var(--primary)">GO</span></span>
    </div>
    <div class="nav-icons">
        <i class="fa-solid fa-palette" onclick="changeColor()" style="cursor:pointer; margin-left:15px;"></i>
        <i class="fa-solid fa-gear" onclick="toggleDev()" style="cursor:pointer"></i>
    </div>
</header>

<div class="hero" id="slider">
    <div id="sliderContent"></div>
    <div style="position:absolute; top:10px; right:10px;">
        <button class="dev-btn" onclick="openPicker('slider')">تعديل السلايدر</button>
    </div>
</div>

<div class="container">
    <aside class="side">
        <div class="side-h">أعلى التقييمات</div>
        <div id="sideTop"></div>
    </aside>

    <main>
        <section class="sec">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <h3 id="t1">🌙 مسلسلات رمضان 2026</h3>
                <button class="dev-btn" onclick="openPicker('ramadan')">+ إضافة فيلم</button>
            </div>
            <div class="grid" id="grid_ramadan"></div>
            <div class="pagination" id="pag_ramadan"></div>
        </section>

        <section class="sec" style="margin-top:30px;">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <h3 id="t2">🎬 أفلام مصرية</h3>
                <button class="dev-btn" onclick="openPicker('egypt')">+ إضافة فيلم</button>
            </div>
            <div class="grid" id="grid_egypt"></div>
            <div class="pagination" id="pag_egypt"></div>
        </section>
    </main>

    <aside class="side">
        <div class="side-h">عالم الأنمي</div>
        <div id="sideAnime"></div>
    </aside>
</div>

<div id="moviePicker">
    <span class="close-picker" onclick="closePicker()">&times;</span>
    <h2 style="margin-bottom:20px; text-align:center;">اختر الفيلم المراد إضافته</h2>
    <div class="picker-grid" id="pickerGrid"></div>
</div>

<script>
    const API = 'https://script.google.com/macros/s/AKfycbw4GkkBMwuUqmeMBYUNV1u0LvQvMla1MgM6ActKpZsdhVvPUnUqdi1StaL_1KkEgniV2A/exec';
    let state = {
        edit: false,
        target: '',
        custom: JSON.parse(localStorage.getItem('wg_c')) || {},
        allMovies: [] // مخزن لكل الأفلام المتاحة
    };

    function init() {
        loadSection('ramadan', 'discover/tv', '&with_original_language=ar&first_air_date_year=2026');
        loadSection('egypt', 'discover/movie', '&with_origin_country=EG&with_original_language=ar');
        loadSlider();
        loadSidebars();
        fetchAllMovies(); // تحميل القائمة الذكية في الخلفية
    }

    async function loadSection(key, endpoint, params, page = 1) {
        const res = await fetch(`${API}?endpoint=${endpoint}${params}&page=${page}`);
        const data = await res.json();
        const grid = document.getElementById(`grid_${key}`);
        
        // دمج الأفلام المخصصة مع أفلام API
        let html = (state.custom[key] || []).map(m => createCard(m)).join('');
        data.results.slice(0, 12).forEach(m => html += createCard(m));
        grid.innerHTML = html;

        // صفحات بسيطة (1 2 3)
        document.getElementById(`pag_${key}`).innerHTML = `
            <button class="page-btn ${page==1?'active':''}" onclick="loadSection('${key}','${endpoint}','${params}',1)">1</button>
            <button class="page-btn ${page==2?'active':''}" onclick="loadSection('${key}','${endpoint}','${params}',2)">2</button>
            <button class="page-btn ${page==3?'active':''}" onclick="loadSection('${key}','${endpoint}','${params}',3)">3</button>
        `;
    }

    function createCard(m) {
        const img = m.poster_path ? `https://image.tmdb.org/t/p/w500${m.poster_path}` : m.img;
        return `
            <div class="card">
                <img src="${img}">
                <div class="card-title">${m.title || m.name}</div>
            </div>`;
    }

    async function fetchAllMovies() {
        const res = await fetch(`${API}?endpoint=movie/popular`);
        const data = await res.json();
        state.allMovies = data.results;
    }

    function openPicker(target) {
        state.target = target;
        const pGrid = document.getElementById('pickerGrid');
        pGrid.innerHTML = state.allMovies.map(m => `
            <div class="card" onclick="selectMovie(${JSON.stringify(m).replace(/"/g, '&quot;')})">
                <img src="https://image.tmdb.org/t/p/w200${m.poster_path}">
                <div class="card-title" style="font-size:10px">${m.title}</div>
            </div>
        `).join('');
        document.getElementById('moviePicker').style.display = 'block';
    }

    function selectMovie(movie) {
        if(state.target === 'slider') {
            state.custom.slider = movie;
        } else {
            if(!state.custom[state.target]) state.custom[state.target] = [];
            state.custom[state.target].unshift(movie);
        }
        localStorage.setItem('wg_c', JSON.stringify(state.custom));
        location.reload();
    }

    function toggleDev() {
        state.edit = !state.edit;
        document.body.classList.toggle('edit-enabled');
    }

    async function loadSlider() {
        const res = await fetch(`${API}?endpoint=movie/now_playing`);
        const data = await res.json();
        const movie = state.custom.slider || data.results[0];
        document.getElementById('sliderContent').innerHTML = `
            <div class="slide active" style="background-image:url(https://image.tmdb.org/t/p/original${movie.backdrop_path})">
                <div class="slide-content"><h2>${movie.title}</h2></div>
            </div>`;
    }

    function closePicker() { document.getElementById('moviePicker').style.display = 'none'; }

    async function loadSidebars() {
        const res = await fetch(`${API}?endpoint=movie/top_rated`);
        const data = await res.json();
        document.getElementById('sideTop').innerHTML = data.results.slice(0,5).map(m => `
            <div class="side-item"><img src="https://image.tmdb.org/t/p/w200${m.poster_path}"><span>${m.title}</span></div>
        `).join('');
    }

    init();
</script>
</body>
</html>
