<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchGo - Developer Mode</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --primary: #9b51e0; 
            --bg-dark: #070707; 
            --card-bg: #111;
            --border-color: #222;
            --netflix-red: #e50914;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; scroll-behavior: smooth; }

        /* --- الهيدر --- */
        .header { 
            background: #000; padding: 0 40px; height: 75px;
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 2000;
        }
        .logo-ctn { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; flex-shrink: 0; }
        .logo-ctn img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--primary); }

        /* --- إضافات المطور (Visual Editor) --- */
        .edit-pen { cursor: pointer; color: var(--primary); margin-right: 10px; font-size: 14px; transition: 0.3s; }
        .edit-pen:hover { transform: scale(1.2); filter: brightness(1.2); }
        
        .add-card-btn {
            border: 2px dashed #444; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; min-height: 260px; 
            border-radius: 8px; cursor: pointer; color: #777; transition: 0.3s;
            background: rgba(155, 81, 224, 0.02); margin-top: 10px;
        }
        .add-card-btn:hover { border-color: var(--primary); color: var(--primary); background: rgba(155, 81, 224, 0.1); }
        .add-card-btn i { font-size: 40px; margin-bottom: 10px; }

        .admin-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(10px); }
        .modal-content { background: #111; padding: 30px; border-radius: 15px; border: 1px solid var(--primary); width: 90%; max-width: 500px; }
        .modal-content input, .modal-content textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 5px; outline: none; }
        .save-btn { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* --- باقي الاستايلات الأصلية الخاصة بك كما هي --- */
        .main-nav { display: flex; list-style: none; height: 100%; align-items: center; gap: 5px; }
        .nav-item { position: relative; height: 100%; display: flex; align-items: center; }
        .nav-link { color: #eee; text-decoration: none; font-size: 14px; font-weight: 600; padding: 0 15px; cursor: pointer; display: flex; align-items: center; gap: 6px; height: 100%; transition: 0.3s; }
        .nav-link:hover { color: var(--primary); background: rgba(155, 81, 224, 0.05); }

        .dropdown { position: absolute; top: 75px; right: 0; background: #0a0a0a; min-width: 220px; border-top: 3px solid var(--primary); display: none; flex-direction: column; box-shadow: 0 15px 30px rgba(0,0,0,0.9); z-index: 3000; }
        .nav-item:hover .dropdown { display: flex; }
        .dropdown a { color: #ccc; padding: 12px 20px; text-decoration: none; font-size: 13px; border-bottom: 1px solid #1a1a1a; text-align: right; transition: 0.2s; }
        .dropdown a:hover { background: #151515; color: var(--primary); padding-right: 25px; }
        .nav-netflix { color: var(--netflix-red) !important; font-weight: bold !important; }

        .header-icons { display: flex; align-items: center; gap: 15px; }
        .icon-btn { color: #ccc; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .icon-btn:hover { color: var(--primary); }

        #searchBox { background: rgba(0,0,0,0.95); padding: 20px; display: none; position: fixed; top: 75px; left: 0; width: 100%; z-index: 1500; border-bottom: 1px solid var(--primary); backdrop-filter: blur(10px); }
        #searchBox input { width: 80%; max-width: 800px; padding: 15px 25px; background: #111; border: 2px solid var(--border-color); color: #fff; border-radius: 50px; outline: none; font-size: 18px; transition: 0.3s; }
        #searchBox input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(155, 81, 224, 0.3); }

        .slider-container { max-width: 1620px; margin: 20px auto; padding: 0 40px; }
        #heroSection { width: 100%; height: 420px; position: relative; overflow: hidden; border-radius: 15px; border: 1px solid var(--border-color); background: #000; }
        .slider-wrapper { display: flex; width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide { min-width: 100%; height: 100%; background-size: cover; background-position: center 20%; position: relative; }
        .slide-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(7,7,7,1) 5%, transparent 70%); display: flex; flex-direction: column; justify-content: flex-end; padding: 40px; }
        .slide-title { font-size: 32px; font-weight: 900; margin-bottom: 15px; text-shadow: 2px 2px 10px #000; }

        .grid-display { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .item-card { background: var(--card-bg); border-radius: 8px; overflow: visible; border: 1px solid var(--border-color); transition: 0.4s ease; cursor: pointer; position: relative; z-index: 1; }
        .item-card:hover { transform: scale(1.1); z-index: 100; box-shadow: 0 10px 40px rgba(0,0,0,0.9); border-color: var(--primary); }
        .item-card img { width: 100%; height: 260px; object-fit: cover; border-radius: 8px 8px 0 0; }
        
        .hover-details { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(15, 15, 15, 0.98); padding: 15px 12px; opacity: 0; visibility: hidden; transition: 0.3s; border-top: 1px solid var(--primary); border-radius: 0 0 8px 8px; max-height: 100%; overflow: hidden; }
        .item-card:hover .hover-details { opacity: 1; visibility: visible; }
        .item-name { font-size: 13px; font-weight: bold; margin-bottom: 8px; color: #fff; text-align: center; }
        .item-name:hover { color: var(--primary); }
        .item-story { font-size: 11px; color: #ccc; line-height: 1.5; margin-bottom: 10px; height: 50px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; text-align: center; direction: rtl; }
        .meta-info { display: flex; justify-content: center; gap: 8px; font-size: 10px; color: #aaa; margin-bottom: 10px; }
        .meta-info span { border: 1px solid #333; padding: 2px 6px; border-radius: 3px; background: #000; }
        .watch-btn { background: var(--primary); color: #fff; font-size: 12px; padding: 8px; border-radius: 4px; font-weight: bold; display: block; text-align: center; text-decoration: none; }

        .pagination-container { display: flex; justify-content: center; gap: 8px; margin-top: 25px; margin-bottom: 10px; }
        .page-btn { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; transition: 0.3s; min-width: 35px; }
        .page-btn:hover, .page-btn.active { background: var(--primary); border-color: var(--primary); box-shadow: 0 0 8px var(--primary); }

        .container { padding: 20px 40px; display: grid; grid-template-columns: 280px 1fr 280px; gap: 25px; max-width: 1700px; margin: 0 auto; }
        .section-box { margin-bottom: 50px; }
        .section-title { background: #111; padding: 12px 20px; font-size: 17px; font-weight: bold; margin-bottom: 20px; border-right: 5px solid var(--primary); display: flex; align-items: center; gap: 10px; }
        .sidebar { background: #111; border: 1px solid var(--border-color); border-radius: 8px; height: fit-content; position: sticky; top: 90px; }
        .side-title { background: #1a1a1a; color: var(--primary); font-size: 13px; font-weight: bold; padding: 12px; border-bottom: 1px solid var(--border-color); text-align: center; }
        .side-list { padding: 10px; }
        .side-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-bottom: 1px solid #1a1a1a; cursor: pointer; transition: 0.2s; }
        .side-item:hover { background: #181818; }
        .side-item img { width: 45px; height: 65px; border-radius: 4px; object-fit: cover; }
        .side-item .txt { font-size: 11px; color: #ccc; }

        .no-results { text-align: center; padding: 50px; font-size: 20px; color: #777; width: 100%; }
        .hidden { display: none !important; }

        @media (max-width: 1200px) { .container { grid-template-columns: 1fr; } .sidebar { display: none; } .main-nav { display: none; } }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-ctn">
            <a href="index.html" class="logo-ctn">
                <img src="https://i.ibb.co/5ggRsXdV/Red-Black-Modern-Movie-Cinema-Presentation-20260311-124846.jpg">
                <span id="siteTitleText" style="font-weight: bold; font-size: 22px;">WATCH<span style="color: var(--primary);">GO</span></span>
            </a>
            <i class="fa-solid fa-pen-to-square edit-pen" onclick="editSiteTitle()" title="تعديل اسم الموقع"></i>
        </div>
        
        <nav class="main-nav">
            <div class="nav-item"><a class="nav-link" href="index.html">الرئيسية</a></div>
            <div class="nav-item">
                <span class="nav-link">الأفلام <i class="fa-solid fa-chevron-down" style="font-size: 10px;"></i></span>
                <div class="dropdown">
                    <a href="#" onclick="showFull('discover/movie', 'أفلام مصرية', 'egypt')">أفلام مصرية</a>
                    <a href="#" onclick="showFull('discover/movie', 'أفلام عربية', 'arabic_only')">أفلام عربية</a>
                    <a href="#" onclick="showFull('discover/movie', 'أفلام أجنبية', 'en')">أفلام أجنبية</a>
                </div>
            </div>
            <div class="nav-item"><a class="nav-link" href="#" onclick="showFull('discover/movie', 'عالم الأنمي', '16')">أنمي</a></div>
        </nav>

        <div class="header-icons">
            <input type="color" onchange="changeMainTheme(this.value)" style="width:25px; height:25px; cursor:pointer; background:none; border:none;" title="تغيير لون الموقع">
            <i class="fa-solid fa-magnifying-glass icon-btn" onclick="toggleSearch()"></i>
        </div>
    </header>

    <div id="searchBox">
        <center>
            <input type="text" id="searchInput" placeholder="ابحث عن اسم الفيلم أو المسلسل..." onkeyup="smartSearch(this.value)">
        </center>
    </div>
    
    <div class="slider-container" id="sliderArea">
        <div id="heroSection"><div class="slider-wrapper" id="sliderWrapper"></div></div>
    </div>

    <div class="container">
        <aside class="sidebar">
            <div class="side-title">أعلى التقييمات</div>
            <div id="bestMoviesSide" class="side-list"></div>
        </aside>

        <main class="main-col">
            <div id="mainDisplay">
                <section class="section-box">
                    <div class="section-title">
                        <span id="devSectionName"><i class="fa-solid fa-code" style="color: var(--primary);"></i> أفلام المطور المضافة</span>
                        <i class="fa-solid fa-pen edit-pen" onclick="editSectionTitle('devSectionName')"></i>
                    </div>
                    <div class="grid-display" id="developerGrid">
                        <div class="add-card-btn" onclick="openAdminModal()">
                            <i class="fa-solid fa-plus-circle"></i>
                            <span>إضافة عمل جديد</span>
                        </div>
                    </div>
                </section>

                <section class="section-box">
                    <div class="section-title"><span><i class="fa-solid fa-moon" style="color: #f1c40f;"></i> مسلسلات رمضان 2026</span></div>
                    <div class="grid-display" id="ramadanGrid"></div>
                    <div class="pagination-container" id="ramadanPag"></div>
                </section>

                <section class="section-box">
                    <div class="section-title"><span><i class="fa-solid fa-star" style="color: #e74c3c;"></i> أحدث الأفلام المصرية</span></div>
                    <div class="grid-display" id="egyptGrid"></div>
                    <div class="pagination-container" id="egyptPag"></div>
                </section>
            </div>

            <div id="fullView" class="hidden">
                <div class="section-box">
                    <div class="section-title" id="fullTitle">تصفح الكل</div>
                    <div class="grid-display" id="fullGrid"></div>
                    <div class="pagination-container" id="fullPag"></div>
                </div>
            </div>
        </main>

        <aside class="sidebar">
            <div class="side-title">عالم الأنمي</div>
            <div id="animeSide" class="side-list"></div>
        </aside>
    </div>

    <div id="adminModal" class="admin-modal">
        <div class="modal-content">
            <h3 style="color: var(--primary); margin-bottom: 15px; text-align: center;">إضافة محتوى إلى BaqrDB</h3>
            <input type="text" id="mTitle" placeholder="عنوان الفيلم">
            <textarea id="mDesc" placeholder="وصف الفيلم..." rows="3"></textarea>
            <input type="text" id="mImg" placeholder="رابط صورة البوستر">
            <input type="text" id="mRate" placeholder="التقييم (مثلاً 8.9)">
            <button class="save-btn" onclick="saveToBaqr()">حفظ ونشر فوراً</button>
            <button onclick="closeAdminModal()" style="width:100%; background:none; border:none; color:#555; margin-top:10px; cursor:pointer;">إلغاء</button>
        </div>
    </div>

    <script>
        const BASE_URL = 'https://script.google.com/macros/s/AKfycbw4GkkBMwuUqmeMBYUNV1u0LvQvMla1MgM6ActKpZsdhVvPUnUqdi1StaL_1KkEgniV2A/exec';

        /* --- وظائف المطور الجديدة --- */
        function editSiteTitle() {
            const current = document.getElementById('siteTitleText').innerText;
            const newTitle = prompt("ادخل اسم الموقع الجديد:", current);
            if(newTitle) {
                document.getElementById('siteTitleText').innerHTML = `${newTitle}<span style="color: var(--primary);">GO</span>`;
                // هنا مستقبلاً تربط بـ BaqrDB لحفظ الاسم
            }
        }

        function editSectionTitle(id) {
            const el = document.getElementById(id);
            const newTitle = prompt("تعديل عنوان القسم:", el.innerText);
            if(newTitle) el.innerText = newTitle;
        }

        function changeMainTheme(color) {
            document.documentElement.style.setProperty('--primary', color);
        }

        function openAdminModal() { document.getElementById('adminModal').style.display = 'flex'; }
        function closeAdminModal() { document.getElementById('adminModal').style.display = 'none'; }

        async function saveToBaqr() {
            const title = document.getElementById('mTitle').value;
            const img = document.getElementById('mImg').value;
            if(!title || !img) return alert("يرجى إدخال البيانات الأساسية!");
            
            alert("جاري الإرسال لـ BaqrDB...");
            // كود الإرسال للـ Apps Script الخاص بك
            closeAdminModal();
        }

        /* --- الكود الأصلي الخاص بك (بدون أي حذف) --- */
        function toggleSearch() { 
            const s = document.getElementById("searchBox");
            const isVisible = s.style.display === "block";
            s.style.display = isVisible ? "none" : "block";
            if(!isVisible) document.getElementById("searchInput").focus();
        }

        async function createCard(m, type) {
            const isArabic = m.original_language === 'ar';
            const date = m.release_date || m.first_air_date || '2026';
            const year = date.split('-')[0];
            const resAr = await fetch(`${BASE_URL}?endpoint=${type}/${m.id}`);
            const arData = await resAr.json();
            const displayName = isArabic ? (arData.title || arData.name || m.title || m.name) : (m.title || m.name);
            const displayStory = arData.overview || "لا يوجد وصف عربي حالياً.";

            return `
                <div class="item-card" onclick="location.href='movie.html?id=${m.id}&type=${type}'">
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" alt="${displayName}" onerror="this.src='https://via.placeholder.com/500x750?text=No+Image'">
                    <div class="hover-details">
                        <div class="item-name" style="direction: ${isArabic ? 'rtl' : 'ltr'}">${displayName}</div>
                        <p class="item-story">${displayStory}</p>
                        <div class="meta-info">
                            <span>${year}</span>
                            <span style="color: #f1c40f;"><i class="fa-solid fa-star"></i> ${m.vote_average.toFixed(1)}</span>
                        </div>
                        <div class="watch-btn">مشاهدة الآن</div>
                    </div>
                </div>`;
        }

        let searchTimer;
        function smartSearch(query) {
            clearTimeout(searchTimer);
            if (query.length < 2) return;
            searchTimer = setTimeout(() => executeSmartSearch(query), 500);
        }

        async function executeSmartSearch(query) {
            document.getElementById('mainDisplay').classList.add('hidden');
            document.getElementById('sliderArea').classList.add('hidden');
            document.getElementById('fullView').classList.remove('hidden');
            document.getElementById('fullTitle').innerHTML = `<i class="fa-solid fa-magnifying-glass"></i> نتائج البحث عن: ${query}`;
            document.getElementById('fullGrid').innerHTML = '<div class="no-results">جاري البحث...</div>';
            try {
                const [movieRes, tvRes] = await Promise.all([
                    fetch(`${BASE_URL}?endpoint=search/movie&query=${query}&language=ar-SA`),
                    fetch(`${BASE_URL}?endpoint=search/tv&query=${query}&language=ar-SA`)
                ]);
                const movieData = await movieRes.json();
                const tvData = await tvRes.json();
                let combinedResults = [
                    ...(movieData.results || []).map(i => ({...i, media_type: 'movie'})),
                    ...(tvData.results || []).map(i => ({...i, media_type: 'tv'}))
                ].filter(item => item.poster_path).sort((a, b) => b.popularity - a.popularity);
                if (combinedResults.length === 0) {
                    document.getElementById('fullGrid').innerHTML = '<div class="no-results">عذراً، لم نجد نتائج.</div>';
                    return;
                }
                const cards = await Promise.all(combinedResults.map(m => createCard(m, m.media_type)));
                document.getElementById('fullGrid').innerHTML = cards.join('');
            } catch (err) { document.getElementById('fullGrid').innerHTML = '<div class="no-results">حدث خطأ.</div>'; }
        }

        async function loadSection(urlPath, gridId, pagId, type, cat = '', pageNum = 1) {
            const sortParam = type === 'movie' ? '&sort_by=primary_release_date.desc' : '&sort_by=first_air_date.desc';
            let finalUrl = `${BASE_URL}?endpoint=${urlPath}${sortParam}&page=${pageNum}`;
            if(cat === 'egypt') finalUrl += `&with_origin_country=EG&with_original_language=ar`;
            else if(cat === 'arabic_only') finalUrl += `&with_original_language=ar&without_origin_country=EG`;
            else if(cat === 'ramadan') finalUrl += `&with_original_language=ar&first_air_date_year=2026`;
            try {
                const res = await fetch(finalUrl);
                const data = await res.json();
                const movies = data.results || []; 
                const cards = await Promise.all(movies.slice(0, 12).map(m => createCard(m, type)));
                document.getElementById(gridId).innerHTML = (gridId === 'developerGrid' ? document.getElementById(gridId).innerHTML : '') + cards.join('');
                let pagHtml = '';
                for(let i=1; i<=Math.min(data.total_pages || 1, 5); i++) {
                    pagHtml += `<button class="page-btn ${i === pageNum ? 'active' : ''}" onclick="loadSection('${urlPath}', '${gridId}', '${pagId}', '${type}', '${cat}', ${i})">${i}</button>`;
                }
                document.getElementById(pagId).innerHTML = pagHtml;
            } catch(e) { console.error(e); }
        }

        async function init() {
            loadSection('discover/tv', 'ramadanGrid', 'ramadanPag', 'tv', 'ramadan');
            loadSection('discover/movie', 'egyptGrid', 'egyptPag', 'movie', 'egypt');
            try {
                const pop = await fetch(`${BASE_URL}?endpoint=movie/now_playing&language=en-US`);
                const pData = await pop.json();
                renderSlider(pData.results.slice(0, 5));
                const top = await fetch(`${BASE_URL}?endpoint=movie/top_rated&language=ar-SA`);
                const tData = await top.json();
                document.getElementById('bestMoviesSide').innerHTML = tData.results.slice(0, 8).map(m => `
                    <div class="side-item" onclick="location.href='movie.html?id=${m.id}&type=movie'">
                        <img src="https://image.tmdb.org/t/p/w200${m.poster_path}">
                        <div class="txt" style="margin-right:10px">${m.title}</div>
                    </div>`).join('');
            } catch(e) { console.error(e); }
        }

        function renderSlider(movies) {
            const wrapper = document.getElementById('sliderWrapper');
            wrapper.innerHTML = movies.map(m => `
                <div class="slide" style="background-image: url('https://image.tmdb.org/t/p/original${m.backdrop_path}')">
                    <div class="slide-overlay">
                        <h2 class="slide-title">${m.title}</h2>
                        <a href="movie.html?id=${m.id}&type=movie" class="watch-btn" style="width:120px;">شاهد الآن</a>
                    </div>
                </div>`).join('');
            let i = 0; setInterval(() => { i = (i + 1) % movies.length; wrapper.style.transform = `translateX(${i * 100}%)`; }, 5000);
        }

        init();
    </script>
</body>
</html>
