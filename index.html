<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchGo - Master Admin Mode</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --primary: #9b51e0; 
            --bg-dark: #070707; 
            --card-bg: #111;
            --border-color: #222;
            --netflix-red: #e50914;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; scroll-behavior: smooth; }

        /* --- الهيدر (المطور) --- */
        .header { 
            background: #000; padding: 0 40px; height: 75px;
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 2000;
        }
        .logo-ctn { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; flex-shrink: 0; position: relative; }
        .logo-ctn img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; cursor: pointer; }
        
        /* --- لوحة تحكم الإضافة المتقدمة (Admin UI) طبق الأصل --- */
        .admin-modal-full {
            position: fixed; inset: 0; background: var(--bg-dark); 
            display: none; flex-direction: column; z-index: 5000; overflow-y: auto; padding-bottom: 50px;
        }
        .preview-header {
            height: 380px; position: relative; background-size: cover; background-position: center;
            border-bottom: 3px solid var(--primary); background-color: #1a1a1a;
            display: flex; align-items: center; justify-content: center;
        }
        .edit-overlay-btn {
            position: absolute; background: rgba(155, 81, 224, 0.8);
            color: white; border: none; padding: 8px 15px; border-radius: 5px;
            cursor: pointer; font-size: 12px; transition: 0.3s; z-index: 20;
        }
        .edit-overlay-btn:hover { background: var(--primary); }
        .preview-content { padding: 20px 40px; max-width: 1200px; margin: 0 auto; width: 100%; }
        .preview-poster {
            width: 200px; height: 300px; border-radius: 10px; border: 2px solid var(--primary);
            margin-top: -150px; position: relative; background: #222; overflow: hidden;
            background-size: cover; background-position: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8); z-index: 10;
        }
        .input-minimal {
            background: rgba(255,255,255,0.05); border: 1px solid #333;
            color: white; width: 100%; margin: 10px 0; padding: 12px; border-radius: 8px;
            transition: 0.3s;
        }
        .input-minimal:focus { border-color: var(--primary); outline: none; background: rgba(255,255,255,0.1); }

        /* الألوان */
        .color-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 10px; margin: 20px 0; }
        .color-dot { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .color-dot:hover { transform: scale(1.2); border-color: white; }

        /* زر الإضافة في كل قسم */
        .section-add-btn {
            background: #1a1a1a; border: 2px dashed #444; color: #777;
            padding: 20px; border-radius: 8px; cursor: pointer; text-align: center;
            transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-bottom: 40px;
        }
        .section-add-btn:hover { border-color: var(--primary); color: var(--primary); background: rgba(155,81,224,0.1); }

        /* الشبكة الأصلية المظبوطة */
        .grid-display { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 20px; 
            margin-bottom: 20px; 
        }
        
        .item-card { background: var(--card-bg); border-radius: 8px; border: 1px solid var(--border-color); transition: 0.4s; cursor: pointer; position: relative; overflow: hidden; }
        .item-card:hover { transform: scale(1.05); border-color: var(--primary); z-index: 5; box-shadow: 0 10px 25px rgba(155,81,224,0.3); }
        .item-card img { width: 100%; height: 260px; object-fit: cover; }
        
        .hover-details { 
            position: absolute; bottom: 0; left: 0; width: 100%; 
            background: rgba(0,0,0,0.95); padding: 15px; opacity: 0; 
            transition: 0.3s; border-top: 1px solid var(--primary);
            transform: translateY(100%);
        }
        .item-card:hover .hover-details { opacity: 1; transform: translateY(0); }

        .container { padding: 20px 40px; display: grid; grid-template-columns: 280px 1fr 280px; gap: 25px; max-width: 1700px; margin: 0 auto; }
        .section-box { margin-bottom: 40px; }
        .section-title { background: #111; padding: 12px 20px; font-size: 17px; font-weight: bold; margin-bottom: 20px; border-right: 5px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        .edit-pen { cursor: pointer; color: var(--primary); font-size: 14px; margin-right: 10px; transition: 0.3s; }
        .edit-pen:hover { transform: scale(1.1); }
        .hidden { display: none !important; }
        
        /* سلايدر */
        .slider-container { padding: 20px 40px; }
        #heroSection { height: 400px; background: #000; overflow: hidden; border-radius: 15px; position: relative; }
        .slider-wrapper { display: flex; height: 100%; transition: 0.5s ease-in-out; }
        .slide-item { min-width: 100%; height: 100%; position: relative; }
        .slide-item img { width: 100%; height: 100%; object-fit: cover; }
        .slide-content { position: absolute; bottom: 80px; left: 40px; background: linear-gradient(90deg, rgba(0,0,0,0.8), transparent); padding: 20px; border-radius: 10px; max-width: 50%; }
        .slider-nav { position: absolute; top: 50%; transform: translateY(-50%); width: 100%; display: flex; justify-content: space-between; padding: 0 20px; z-index: 10; }
        .slider-btn { background: rgba(0,0,0,0.6); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; transition: 0.3s; }
        .slider-btn:hover { background: var(--primary); }

        /* سايد بار */
        .sidebar { position: sticky; top: 90px; height: fit-content; }
        .side-title { padding: 15px; background: #111; border-bottom: 2px solid var(--primary); font-weight: bold; margin-bottom: 15px; }
        .side-item { display: flex; gap: 10px; margin-bottom: 15px; padding: 10px; background: #0a0a0a; border-radius: 8px; transition: 0.3s; cursor: pointer; }
        .side-item:hover { background: #1a1a1a; transform: translateX(-5px); }
        .side-item img { width: 60px; height: 80px; object-fit: cover; border-radius: 5px; }
        .side-item-info { flex: 1; }
        .side-item-title { font-size: 14px; font-weight: bold; margin-bottom: 5px; }
        .side-item-rate { color: var(--primary); font-size: 12px; }

        @media (max-width: 1200px) { 
            .container { grid-template-columns: 1fr; } 
            .sidebar { display: none; }
            .slide-content { max-width: 80%; bottom: 40px; left: 20px; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-ctn">
            <label>
                <img id="siteLogo" src="https://i.ibb.co/5ggRsXdV/Red-Black-Modern-Movie-Cinema-Presentation-20260311-124846.jpg" style="width: 45px; height: 45px;">
                <input type="file" hidden accept="image/*" onchange="uploadImage(this, 'siteLogo', false, true)">
            </label>
            <span id="siteTitleText" style="font-weight: bold; font-size: 22px; margin-right:10px;">WATCH<span style="color: var(--primary);">GO</span></span>
            <i class="fa-solid fa-pen-to-square edit-pen" onclick="editSiteTitle()"></i>
        </div>
        
        <nav style="display:flex; list-style:none; gap:20px;">
            <a href="#" style="text-decoration:none; color:white;" onclick="scrollToTop()">الرئيسية</a>
            <a href="#" style="text-decoration:none; color:var(--primary); font-weight:bold;" onclick="addNewSection()">+ إضافة قسم</a>
        </nav>

        <div class="header-icons" style="display:flex; align-items:center; gap:15px;">
            <div style="position:relative;">
                <i class="fa-solid fa-palette icon-btn" style="cursor:pointer;" onclick="toggleColorPicker()"></i>
                <div id="colorPickerDropdown" style="padding: 15px; min-width: 250px; position:absolute; top:40px; left:0; background:#000; border:1px solid var(--primary); display:none; border-radius: 10px; z-index: 100;">
                    <div class="color-grid" id="themeColors">
                        <div class="color-dot" style="background:#9b51e0;" onclick="changeTheme('#9b51e0')"></div>
                        <div class="color-dot" style="background:#e50914;" onclick="changeTheme('#e50914')"></div>
                        <div class="color-dot" style="background:#00b4d8;" onclick="changeTheme('#00b4d8')"></div>
                        <div class="color-dot" style="background:#f4a261;" onclick="changeTheme('#f4a261')"></div>
                        <div class="color-dot" style="background:#2a9d8f;" onclick="changeTheme('#2a9d8f')"></div>
                        <div class="color-dot" style="background:#e76f51;" onclick="changeTheme('#e76f51')"></div>
                        <div class="color-dot" style="background:#8338ec;" onclick="changeTheme('#8338ec')"></div>
                        <div class="color-dot" style="background:#3a86ff;" onclick="changeTheme('#3a86ff')"></div>
                        <div class="color-dot" style="background:#ff006e;" onclick="changeTheme('#ff006e')"></div>
                        <div class="color-dot" style="background:#fb5607;" onclick="changeTheme('#fb5607')"></div>
                    </div>
                </div>
            </div>
            <i class="fa-solid fa-magnifying-glass icon-btn" onclick="toggleSearch()" style="cursor:pointer;"></i>
            <i class="fa-solid fa-download" onclick="exportData()" style="cursor:pointer;"></i>
        </div>
    </header>

    <div id="searchBox" style="display:none; padding:20px; background:#111; margin: 0 40px; border-radius: 10px;">
        <input type="text" id="searchInput" placeholder="ابحث عن فيلم أو مسلسل..." onkeyup="smartSearch(this.value)" style="width:100%; padding:12px; border-radius:8px; border:none; background:#222; color:white;">
        <div id="searchResults" style="margin-top: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px;"></div>
    </div>

    <div class="slider-container">
        <div id="heroSection" style="height:400px; background:#000; overflow:hidden; border-radius:15px; position:relative;">
            <div class="slider-wrapper" id="sliderWrapper" style="display:flex; height:100%; transition:0.5s;"></div>
            <div class="slider-nav">
                <button class="slider-btn" onclick="prevSlide()"><i class="fas fa-chevron-right"></i></button>
                <button class="slider-btn" onclick="nextSlide()"><i class="fas fa-chevron-left"></i></button>
            </div>
        </div>
    </div>

    <div class="container">
        <aside class="sidebar">
            <div class="side-title">🏆 أعلى التقييمات</div>
            <div id="bestMoviesSide"></div>
        </aside>

        <main class="main-col" id="sectionsContainer"></main>

        <aside class="sidebar">
            <div class="side-title">🎬 عالم الأنمي</div>
            <div id="animeSide"></div>
        </aside>
    </div>

    <div id="adminModal" class="admin-modal-full">
        <div class="preview-header" id="preBackdrop" style="background-image: url('https://via.placeholder.com/1920x1080');">
            <button class="edit-overlay-btn" style="top:20px; right:20px;" onclick="document.getElementById('bgUpload').click()">📷 تغيير الغلاف</button>
            <input type="file" id="bgUpload" hidden accept="image/*" onchange="uploadImage(this, 'preBackdrop', true)">
            <input type="text" id="mTitle" class="input-minimal" style="font-size:35px; font-weight:900; background:none; border:none; border-bottom:2px solid var(--primary); width:60%; text-align:center;" placeholder="اسم الفيلم هنا">
        </div>

        <div class="preview-content">
            <div style="display:flex; gap:40px; flex-wrap:wrap;">
                <div class="preview-poster" id="prePoster" style="background-image: url('https://via.placeholder.com/500x750');">
                    <button class="edit-overlay-btn" style="bottom:0; width:100%; border-radius:0;" onclick="document.getElementById('posterUpload').click()">تغيير البوستر</button>
                    <input type="file" id="posterUpload" hidden accept="image/*" onchange="uploadImage(this, 'prePoster', true)">
                </div>
                <div style="flex:1; padding-top:20px;">
                    <div style="display:flex; gap:10px; flex-wrap:wrap;">
                        <input type="text" id="mRate" class="input-minimal" style="width:120px;" placeholder="التقييم ⭐" value="8.5">
                        <input type="text" id="mYear" class="input-minimal" style="width:120px;" placeholder="السنة" value="2024">
                        <select id="mType" class="input-minimal" style="width:140px;">
                            <option value="movie">🎬 فيلم</option>
                            <option value="series">📺 مسلسل</option>
                            <option value="anime">🍥 أنمي</option>
                        </select>
                    </div>
                    <textarea id="mDesc" class="input-minimal" rows="5" placeholder="اكتب قصة العمل هنا..."></textarea>
                </div>
            </div>

            <div class="section-title" style="margin-top:40px;">
                <span>📺 المواسم والحلقات</span>
                <button onclick="addSeason()" style="background:var(--primary); color:white; border:none; padding:8px 20px; border-radius:5px; cursor:pointer;">+ إضافة حلقة</button>
            </div>
            <div id="seasonsBox" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap:15px; margin-top:15px;"></div>

            <div style="margin-top:50px; display:flex; gap:20px;">
                <button onclick="confirmSaveMovie()" style="flex:2; height:60px; background:var(--primary); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer; font-size:16px;">💾 حفظ ونشر العمل</button>
                <button onclick="closeAdminModal()" style="flex:1; background:#333; color:white; border:none; border-radius:8px; cursor:pointer;">❌ إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        // البيانات الرئيسية
        let sections = [];
        let currentTargetGrid = '';
        let slideIndex = 0;
        let sliderInterval;

        // تهيئة البيانات
        function initData() {
            if(!localStorage.getItem('watchgo_sections')) {
                sections = [
                    { id: 'ramadan', name: 'مسلسلات رمضان 2026', movies: [
                        { title: 'معاوية', poster: 'https://via.placeholder.com/300x450', rate: '9.2', year: '2026', type: 'series' },
                        { title: 'الكبير أوي 8', poster: 'https://via.placeholder.com/300x450', rate: '8.9', year: '2026', type: 'series' }
                    ]},
                    { id: 'egypt', name: 'أفلام مصرية حديثة', movies: [
                        { title: 'الملحد', poster: 'https://via.placeholder.com/300x450', rate: '8.7', year: '2025', type: 'movie' },
                        { title: 'فاصل من اللحظات', poster: 'https://via.placeholder.com/300x450', rate: '8.5', year: '2025', type: 'movie' }
                    ]}
                ];
                saveToLocal();
            } else {
                sections = JSON.parse(localStorage.getItem('watchgo_sections'));
            }
            renderAll();
        }

        function saveToLocal() {
            localStorage.setItem('watchgo_sections', JSON.stringify(sections));
        }

        function renderAll() {
            const container = document.getElementById('sectionsContainer');
            container.innerHTML = '';
            sections.forEach(section => {
                renderSection(section.name, section.id, section.movies);
            });
            updateSidebars();
            updateSlider();
        }

        function renderSection(name, id, movies) {
            const html = `
                <section class="section-box" id="sec_${id}">
                    <div class="section-title">
                        <span id="title_${id}">${name}</span>
                        <div>
                            <i class="fa-solid fa-pen edit-pen" onclick="editSectionName('${id}')"></i>
                            <i class="fa-solid fa-trash" style="cursor:pointer; color:#555; margin-right:10px;" onclick="deleteSection('${id}')"></i>
                        </div>
                    </div>
                    <div class="grid-display" id="grid_${id}">
                        ${movies.map(movie => `
                            <div class="item-card" onclick="viewMovieDetails('${movie.title}', '${movie.poster}', '${movie.rate}', '${movie.year}', '${movie.desc || ''}')">
                                <img src="${movie.poster}" onerror="this.src='https://via.placeholder.com/300x450'">
                                <div class="hover-details">
                                    <div style="font-weight:bold; text-align:center;">${movie.title}</div>
                                    <div style="text-align:center; color:var(--primary); margin-top:5px;">⭐ ${movie.rate}</div>
                                    <div style="background:var(--primary); color:white; text-align:center; padding:5px; border-radius:4px; margin-top:10px; font-size:12px;">▶ مشاهدة</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="section-add-btn" onclick="openAdminModal('grid_${id}', '${id}')">
                        <i class="fa-solid fa-plus-circle"></i> إضافة فيلم لـ "${name}"
                    </div>
                </section>`;
            document.getElementById('sectionsContainer').insertAdjacentHTML('beforeend', html);
        }

        function addNewSection() {
            const name = prompt("ادخل اسم القسم الجديد:");
            if(name) {
                const id = Date.now().toString();
                sections.push({ id: id, name: name, movies: [] });
                saveToLocal();
                renderAll();
            }
        }

        function editSectionName(id) {
            const section = sections.find(s => s.id === id);
            const newName = prompt("اسم القسم الجديد:", section.name);
            if(newName) {
                section.name = newName;
                saveToLocal();
                renderAll();
            }
        }

        function deleteSection(id) {
            if(confirm("هل أنت متأكد من حذف هذا القسم وجميع محتوياته؟")) {
                sections = sections.filter(s => s.id !== id);
                saveToLocal();
                renderAll();
            }
        }

        function openAdminModal(gridId, sectionId) {
            currentTargetGrid = gridId;
            currentSectionId = sectionId;
            document.getElementById('adminModal').style.display = 'flex';
            document.getElementById('mTitle').value = '';
            document.getElementById('mRate').value = '8.5';
            document.getElementById('mYear').value = '2024';
            document.getElementById('mDesc').value = '';
            document.getElementById('seasonsBox').innerHTML = '';
            document.getElementById('prePoster').style.backgroundImage = "url('https://via.placeholder.com/500x750')";
            document.getElementById('preBackdrop').style.backgroundImage = "url('https://via.placeholder.com/1920x1080')";
        }

        function closeAdminModal() { 
            document.getElementById('adminModal').style.display = 'none'; 
        }

        function addSeason() {
            const box = document.getElementById('seasonsBox');
            const seasonNum = box.children.length + 1;
            box.insertAdjacentHTML('beforeend', `
                <div style="background:#1a1a1a; padding:10px; border-radius:8px;">
                    <input type="text" class="input-minimal" placeholder="الموسم ${seasonNum} - رابط الحلقة" style="margin:0;">
                </div>
            `);
        }

        let currentSectionId = '';

        function confirmSaveMovie() {
            const title = document.getElementById('mTitle').value;
            const poster = document.getElementById('prePoster').style.backgroundImage.slice(5, -2);
            const rate = document.getElementById('mRate').value;
            const year = document.getElementById('mYear').value;
            const desc = document.getElementById('mDesc').value;
            const type = document.getElementById('mType').value;
            
            if(!title) return alert("ادخل اسم الفيلم!");
            
            const newMovie = { title, poster, rate, year, desc, type };
            
            const section = sections.find(s => `grid_${s.id}` === currentTargetGrid);
            if(section) {
                section.movies.push(newMovie);
                saveToLocal();
                renderAll();
            }
            closeAdminModal();
        }

        function viewMovieDetails(title, poster, rate, year, desc) {
            alert(`🎬 ${title}\n⭐ ${rate}\n📅 ${year}\n📝 ${desc || 'لا يوجد وصف'}`);
        }

        function updateSidebars() {
            const allMovies = sections.flatMap(s => s.movies);
            const bestMovies = [...allMovies].sort((a,b) => parseFloat(b.rate) - parseFloat(a.rate)).slice(0,5);
            const animes = allMovies.filter(m => m.type === 'anime').slice(0,5);
            
            document.getElementById('bestMoviesSide').innerHTML = bestMovies.map(m => `
                <div class="side-item" onclick="viewMovieDetails('${m.title}', '${m.poster}', '${m.rate}', '${m.year}', '${m.desc || ''}')">
                    <img src="${m.poster}" onerror="this.src='https://via.placeholder.com/60x80'">
                    <div class="side-item-info">
                        <div class="side-item-title">${m.title}</div>
                        <div class="side-item-rate">⭐ ${m.rate}</div>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('animeSide').innerHTML = animes.length ? animes.map(m => `
                <div class="side-item" onclick="viewMovieDetails('${m.title}', '${m.poster}', '${m.rate}', '${m.year}', '${m.desc || ''}')">
                    <img src="${m.poster}" onerror="this.src='https://via.placeholder.com/60x80'">
                    <div class="side-item-info">
                        <div class="side-item-title">${m.title}</div>
                        <div class="side-item-rate">⭐ ${m.rate}</div>
                    </div>
                </div>
            `).join('') : '<div style="padding:20px; text-align:center;">لا يوجد أنمي</div>';
        }

        function updateSlider() {
            const allMovies = sections.flatMap(s => s.movies);
            const sliderWrapper = document.getElementById('sliderWrapper');
            sliderWrapper.innerHTML = allMovies.slice(0,5).map(movie => `
                <div class="slide-item">
                    <img src="${movie.poster}" onerror="this.src='https://via.placeholder.com/1920x400'">
                    <div class="slide-content">
                        <h2>${movie.title}</h2>
                        <p>⭐ ${movie.rate} | 📅 ${movie.year}</p>
                    </div>
                </div>
            `).join('');
            startSlider();
        }

        function startSlider() {
            if(sliderInterval) clearInterval(sliderInterval);
            sliderInterval = setInterval(nextSlide, 5000);
        }

        function nextSlide() {
            const wrapper = document.getElementById('sliderWrapper');
            const slides = document.querySelectorAll('.slide-item');
            if(slides.length <= 1) return;
            slideIndex = (slideIndex + 1) % slides.length;
            wrapper.style.transform = `translateX(-${slideIndex * 100}%)`;
        }

        function prevSlide() {
            const wrapper = document.getElementById('sliderWrapper');
            const slides = document.querySelectorAll('.slide-item');
            if(slides.length <= 1) return;
            slideIndex = (slideIndex - 1 + slides.length) % slides.length;
            wrapper.style.transform = `translateX(-${slideIndex * 100}%)`;
        }

        function uploadImage(input, targetId, isBg = false, isImg = false) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const el = document.getElementById(targetId);
                    if(isBg) el.style.backgroundImage = `url(${e.target.result})`;
                    else if(isImg) el.src = e.target.result;
                    else el.style.backgroundImage = `url(${e.target.result})`;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function editSiteTitle() {
            const n = prompt("اسم الموقع الجديد:");
            if(n) document.getElementById('siteTitleText').innerHTML = n;
        }

        function toggleSearch() {
            const s = document.getElementById('searchBox');
            s.style.display = s.style.display === 'none' ? 'block' : 'none';
        }

        function smartSearch(query) {
            if(!query.trim()) {
                document.getElementById('searchResults').innerHTML = '';
                return;
            }
            const allMovies = sections.flatMap(s => s.movies);
            const results = allMovies.filter(m => m.title.includes(query));
            document.getElementById('searchResults').innerHTML = results.map(m => `
                <div class="item-card" onclick="viewMovieDetails('${m.title}', '${m.poster}', '${m.rate}', '${m.year}', '${m.desc || ''}')">
                    <img src="${m.poster}" onerror="this.src='https://via.placeholder.com/150x220'">
                    <div class="hover-details">
                        <div style="font-weight:bold; text-align:center;">${m.title}</div>
                        <div style="text-align:center; color:var(--primary);">⭐ ${m.rate}</div>
                    </div>
                </div>
            `).join('');
        }

        function changeTheme(color) {
            document.documentElement.style.setProperty('--primary', color);
        }

        function toggleColorPicker() {
            const dropdown = document.getElementById('colorPickerDropdown');
            dropdown.style.display = dropdown.style.display === 'none' ? 'block' : 'none';
        }

        function exportData() {
            const dataStr = JSON.stringify(sections, null, 2);
            const blob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'watchgo_backup.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        function scrollToTop() {
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        // بدء التطبيق
        initData();
    </script>
</body>
                </html>
