<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchGo - Smart Cinema Hub (مطور)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #9b51e0; 
            --bg-dark: #070707; 
            --card-bg: #111;  
            --border-color: #222;  
            --netflix-red: #e50914;  
            --edit-border: #4caf50;
            --edit-glow: rgba(76, 175, 80, 0.4);
        }  

        * { box-sizing: border-box; margin: 0; padding: 0; }  
        body { background: var(--bg-dark); color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; scroll-behavior: smooth; }  

        /* --- الهيدر --- */  
        .header {   
            background: #000; padding: 0 40px; height: 75px;  
            display: flex; justify-content: space-between; align-items: center;   
            border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 2000;  
        }  
        .logo-ctn { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; flex-shrink: 0; }  
        .logo-ctn img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--primary); transition: 0.3s; }  
        /* تأثير وضع التعديل على اللوجو */
        .edit-mode-enabled .logo-ctn img { cursor: pointer; border: 2px dashed var(--edit-border); position: relative; opacity: 0.8; }
        .edit-mode-enabled .logo-ctn img:hover { opacity: 1; transform: scale(1.05); }

        .main-nav { display: flex; list-style: none; height: 100%; align-items: center; gap: 5px; }  
        .nav-item { position: relative; height: 100%; display: flex; align-items: center; }  
        .nav-link {   
            color: #eee; text-decoration: none; font-size: 14px; font-weight: 600;   
            padding: 0 15px; cursor: pointer; display: flex; align-items: center; gap: 6px;  
            height: 100%; transition: 0.3s;  
        }  
        .nav-link:hover { color: var(--primary); background: rgba(155, 81, 224, 0.05); }  

        .dropdown {   
            position: absolute; top: 75px; right: 0; background: #0a0a0a; min-width: 220px;   
            border-top: 3px solid var(--primary); display: none; flex-direction: column;   
            box-shadow: 0 15px 30px rgba(0,0,0,0.9); z-index: 3000;  
        }  
        .nav-item:hover .dropdown { display: flex; }  
        .dropdown a { color: #ccc; padding: 12px 20px; text-decoration: none; font-size: 13px; border-bottom: 1px solid #1a1a1a; text-align: right; transition: 0.2s; }  
        .dropdown a:hover { background: #151515; color: var(--primary); padding-right: 25px; }  
        .nav-netflix { color: var(--netflix-red) !important; font-weight: bold !important; }  

        .header-icons { display: flex; align-items: center; gap: 15px; }  
        .icon-btn { color: #ccc; cursor: pointer; font-size: 18px; transition: 0.3s; }  
        .icon-btn:hover { color: var(--primary); }  

        /* باليتة الألوان */
        .color-picker-container { display: none; position: absolute; top: 75px; left: 40px; background: #111; border: 1px solid var(--primary); padding: 15px; border-radius: 12px; grid-template-columns: repeat(6, 1fr); gap: 8px; z-index: 4000; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .color-swatch { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .color-swatch:hover { transform: scale(1.2); border-color: #fff; }

        /* --- باقي التنسيقات الأصلية --- */
        #searchBox { background: rgba(0,0,0,0.95); padding: 20px; display: none; position: fixed; top: 75px; left: 0; width: 100%; z-index: 1500; border-bottom: 1px solid var(--primary); backdrop-filter: blur(10px); }  
        #searchBox input { width: 80%; max-width: 800px; padding: 15px 25px; background: #111; border: 2px solid var(--border-color); color: #fff; border-radius: 50px; outline: none; font-size: 18px; transition: 0.3s; }  
        #searchBox input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(155, 81, 224, 0.3); }  

        .slider-container { max-width: 1620px; margin: 20px auto; padding: 0 40px; position: relative; }  
        #heroSection { width: 100%; height: 420px; position: relative; overflow: hidden; border-radius: 15px; border: 1px solid var(--border-color); background: #000; }  
        .slider-wrapper { display: flex; width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); } 
        .slide { min-width: 100%; height: 100%; background-size: cover; background-position: center 20%; position: relative; }  
        .slide-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(7,7,7,1) 5%, transparent 70%); display: flex; flex-direction: column; justify-content: flex-end; padding: 40px; }  
        .slide-title { font-size: 32px; font-weight: 900; margin-bottom: 15px; text-shadow: 2px 2px 10px #000; }  
        
        .manage-slider-btn { position: absolute; top: 15px; right: 55px; background: var(--primary); color: white; padding: 8px 15px; border-radius: 20px; font-size: 12px; cursor: pointer; z-index: 2001; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 5000; padding: 20px; }
        .modal-content { background: #111; border: 1px solid var(--primary); border-radius: 15px; width: 100%; max-width: 900px; max-height: 85vh; overflow-y: auto; padding: 25px; position: relative; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .manager-grid, .library-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .m-card { position: relative; background: #000; border-radius: 8px; overflow: hidden; height: 210px; border: 1px solid #222; }
        .m-card img { width: 100%; height: 100%; object-fit: cover; }
        .m-card .remove-x { position: absolute; top: 5px; right: 5px; background: var(--netflix-red); color: #fff; width: 25px; height: 25px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid #000; font-weight: bold; }
        .add-slot-card { border: 2px dashed var(--primary); display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--primary); cursor: pointer; }
        .lib-item { cursor: pointer; position: relative; height: 200px; border-radius: 8px; overflow: hidden; border: 2px solid transparent; transition: 0.3s; }
        .lib-item:hover { border-color: var(--primary); transform: scale(1.05); }
        .lib-item img { width: 100%; height: 100%; object-fit: cover; }
        .lib-item .p-title { position: absolute; bottom: 0; background: rgba(0,0,0,0.85); width: 100%; font-size: 10px; padding: 6px; text-align: center; }

        .grid-display { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }  
        .item-card { background: var(--card-bg); border-radius: 8px; overflow: visible; border: 1px solid var(--border-color); transition: 0.4s ease; cursor: pointer; position: relative; z-index: 1; }  
        .item-card:hover { transform: scale(1.1); z-index: 100; box-shadow: 0 10px 40px rgba(0,0,0,0.9); border-color: var(--primary); }  
        .item-card img { width: 100%; height: 260px; object-fit: cover; border-radius: 8px 8px 0 0; }  
          
        .hover-details { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(15, 15, 15, 0.98); padding: 15px 12px; opacity: 0; visibility: hidden; transition: 0.3s; border-top: 1px solid var(--primary); border-radius: 0 0 8px 8px; max-height: 100%; overflow: hidden; }  
        .item-card:hover .hover-details { opacity: 1; visibility: visible; }  
        .item-name { font-size: 13px; font-weight: bold; margin-bottom: 8px; color: #fff; text-align: center; }  
        .item-story { font-size: 11px; color: #ccc; line-height: 1.5; margin-bottom: 10px; height: 50px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; text-align: center; direction: rtl; }  
        .meta-info { display: flex; justify-content: center; gap: 8px; font-size: 10px; color: #aaa; margin-bottom: 10px; }  
        .meta-info span { border: 1px solid #333; padding: 2px 6px; border-radius: 3px; background: #000; }  
        .watch-btn { background: var(--primary); color: #fff; font-size: 12px; padding: 8px; border-radius: 4px; font-weight: bold; display: block; text-align: center; text-decoration: none; }  

        .pagination-container { display: flex; justify-content: center; gap: 8px; margin-top: 25px; margin-bottom: 10px; }  
        .page-btn { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; transition: 0.3s; min-width: 35px; }  
        .page-btn:hover, .page-btn.active { background: var(--primary); border-color: var(--primary); box-shadow: 0 0 8px var(--primary); }  

        .container { padding: 20px 40px; display: grid; grid-template-columns: 280px 1fr 280px; gap: 25px; max-width: 1700px; margin: 0 auto; }  
        .section-box { margin-bottom: 50px; position: relative; }  
        .section-title { background: #111; padding: 12px 20px; font-size: 17px; font-weight: bold; margin-bottom: 20px; border-right: 5px solid var(--primary); display: flex; align-items: center; gap: 10px; }  
        .sidebar { background: #111; border: 1px solid var(--border-color); border-radius: 8px; height: fit-content; position: sticky; top: 90px; }  
        .side-title { background: #1a1a1a; color: var(--primary); font-size: 13px; font-weight: bold; padding: 12px; border-bottom: 1px solid var(--border-color); text-align: center; }  
        .side-list { padding: 10px; }  
        .side-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-bottom: 1px solid #1a1a1a; cursor: pointer; transition: 0.2s; }  
        .side-item img { width: 45px; height: 65px; border-radius: 4px; object-fit: cover; }  
        .side-item .txt { font-size: 11px; color: #ccc; }  

        .edit-mode-enabled [contenteditable="true"] { outline: 2px dashed var(--edit-border); background-color: rgba(76, 175, 80, 0.1); cursor: text; }  
        .edit-mode-enabled .add-movie-btn, .add-section-btn { display: inline-block; background: var(--primary); padding: 6px 12px; margin: 10px 0; border-radius: 20px; font-size: 12px; cursor: pointer; }  

        @media (max-width: 1200px) { .container { grid-template-columns: 1fr; } .sidebar { display: none; } .main-nav { display: none; } }  
    </style>
</head>  
<body>  

<div class="modal-overlay" id="sliderManagerModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fa-solid fa-images"></i> تعديل محتوى السلايدر</h3>
            <i class="fa-solid fa-xmark close-modal" onclick="closeModal('sliderManagerModal')" style="cursor:pointer; font-size:24px;"></i>
        </div>
        <div class="manager-grid" id="managerGrid"></div>
    </div>
</div>

<div class="modal-overlay" id="libraryPickerModal" style="z-index: 6000;">
    <div class="modal-content" style="max-width: 800px;">
        <div class="modal-header">
            <h3><i class="fa-solid fa-layer-group"></i> اختر من المكتبة</h3>
            <i class="fa-solid fa-xmark close-modal" onclick="closeModal('libraryPickerModal')" style="cursor:pointer; font-size:24px;"></i>
        </div>
        <div class="library-grid" id="libraryGrid"></div>
    </div>
</div>

<header class="header">  
    <div class="logo-ctn">  
        <input type="file" id="logoInput" hidden accept="image/*" onchange="changeLogo(this)">
        <img src="https://i.ibb.co/5ggRsXdV/Red-Black-Modern-Movie-Cinema-Presentation-20260311-124846.jpg" id="mainLogo" onclick="triggerLogoUpload()">  
        <span style="font-weight: bold; font-size: 22px;"><span id="siteName">WATCH</span><span style="color: var(--primary);">GO</span></span>  
    </div>  
    <nav class="main-nav">  
        <div class="nav-item"><a class="nav-link" href="#">الرئيسية</a></div>  
        <div class="nav-item">  
            <span class="nav-link">الأفلام <i class="fa-solid fa-chevron-down" style="font-size: 10px;"></i></span>  
            <div class="dropdown">  
                <a href="#" onclick="showFull('discover/movie', 'أفلام مصرية', 'egypt')">أفلام مصرية</a>  
                <a href="#" onclick="showFull('discover/movie', 'أفلام عربية', 'arabic_only')">أفلام عربية</a>  
                <a href="#" onclick="showFull('discover/movie', 'أفلام أجنبية', 'en')">أفلام أجنبية</a>  
            </div>  
        </div>  
        <div class="nav-item">  
            <span class="nav-link">المسلسلات <i class="fa-solid fa-chevron-down" style="font-size: 10px;"></i></span>  
            <div class="dropdown">  
                <a href="#" onclick="showFull('discover/tv', 'مسلسلات رمضان 2026', 'ramadan')">مسلسلات رمضان 2026</a>  
                <a href="#" onclick="showFull('discover/tv', 'مسلسلات Netflix', 'netflix')" class="nav-netflix">مسلسلات Netflix</a>  
            </div>  
        </div>  
    </nav>  
    <div class="header-icons">  
        <i class="fa-solid fa-palette icon-btn" onclick="toggleColorPicker()" title="تغيير اللون"></i>
        <i class="fa-solid fa-magnifying-glass icon-btn" onclick="toggleSearch()"></i>  
        <i class="fa-solid fa-gear icon-btn" id="toggleEditModeBtn"></i>  
    </div>

    <div class="color-picker-container" id="colorPicker"></div>
</header>  

<div id="searchBox">  
    <center><input type="text" id="searchInput" placeholder="ابحث هنا..." onkeyup="smartSearch(this.value)"></center>  
</div>  

<div class="slider-container" id="sliderArea">  
    <div id="heroSection"><div class="slider-wrapper" id="sliderWrapper"></div></div>  
</div>  

<div class="container">  
    <aside class="sidebar">  
        <div class="side-title">أعلى التقييمات</div>  
        <div class="side-list" id="bestMoviesSide"></div>  
    </aside>  

    <main class="main-col" id="mainCol">  
        <div id="mainDisplay">  
            <section class="section-box" data-section-key="ramadan">  
                <div class="section-title"><span><i class="fa-solid fa-moon"></i> <span class="section-title-text">مسلسلات رمضان 2026</span></span></div>  
                <div class="grid-display" id="ramadanGrid"></div>  
                <div class="pagination-container" id="ramadanPag"></div>  
            </section>  

            <section class="section-box" data-section-key="egypt">  
                <div class="section-title"><span><i class="fa-solid fa-star"></i> <span class="section-title-text">أحدث الأفلام المصرية</span></span></div>  
                <div class="grid-display" id="egyptGrid"></div>  
                <div class="pagination-container" id="egyptPag"></div>  
            </section>  

            <section class="section-box" data-section-key="arabic">  
                <div class="section-title"><span><i class="fa-solid fa-flag"></i> <span class="section-title-text">أفلام عربية منوعة</span></span></div>  
                <div class="grid-display" id="arabicGrid"></div>  
                <div class="pagination-container" id="arabicPag"></div>  
            </section>  

            <section class="section-box" data-section-key="global">  
                <div class="section-title"><span><i class="fa-solid fa-globe"></i> <span class="section-title-text">أحدث الأفلام العالمية</span></span></div>  
                <div class="grid-display" id="moviesGrid"></div>  
                <div class="pagination-container" id="moviesPag"></div>  
            </section>  
        </div>  

        <div id="fullView" class="hidden">  
            <div class="section-box">  
                <div class="section-title" id="fullTitle">تصفح الكل</div>  
                <div class="grid-display" id="fullGrid"></div>  
                <div class="pagination-container" id="fullPag"></div>  
            </div>  
        </div>  
        <div id="extraSectionsContainer"></div>  
    </main>  

    <aside class="sidebar">  
        <div class="side-title">عالم الأنمي</div>  
        <div class="side-list" id="animeSide"></div>  
    </aside>  
</div>  

<script>  
    const BASE_URL = 'https://script.google.com/macros/s/AKfycbw4GkkBMwuUqmeMBYUNV1u0LvQvMla1MgM6ActKpZsdhVvPUnUqdi1StaL_1KkEgniV2A/exec';  
    let editMode = false;  
    let customMovies = {}; 
    let extraSections = []; 
    let apiSliderMovies = []; 

    // --- وظائف الهيدر الجديدة ---
    const colors = ['#9b51e0', '#e50914', '#27ae60', '#2980b9', '#f1c40f', '#e67e22', '#1abc9c', '#fd79a8', '#6c5ce7', '#fab1a0', '#00b894', '#00cec9', '#ff7675', '#74b9ff', '#a29bfe', '#ffeaa7', '#55efc4', '#81ecec', '#ff9f43', '#ee5253', '#0abde3', '#10ac84', '#5f27cd', '#ff6b6b', '#48dbfb', '#1dd1a1', '#feca57', '#54a0ff', '#00d2d3', '#c0392b'];

    function initColorPicker() {
        const picker = document.getElementById('colorPicker');
        picker.innerHTML = colors.map(c => `<div class="color-swatch" style="background:${c}" onclick="updateThemeColor('${c}')"></div>`).join('');
    }

    function toggleColorPicker() {
        const p = document.getElementById('colorPicker');
        p.style.display = p.style.display === 'grid' ? 'none' : 'grid';
    }

    function updateThemeColor(color) {
        document.documentElement.style.setProperty('--primary', color);
        localStorage.setItem('watchgo_primary_color', color);
        toggleColorPicker();
    }

    function triggerLogoUpload() { if(editMode) document.getElementById('logoInput').click(); }

    function changeLogo(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('mainLogo').src = e.target.result;
                localStorage.setItem('watchgo_logo', e.target.result);
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // --- وظيفة السلايدر المدمجة ---
    function renderSlider() {
        const wrapper = document.getElementById('sliderWrapper');
        const customS = JSON.parse(localStorage.getItem('wg_slider_custom')) || [];
        const finalSlides = customS.length > 0 ? customS : apiSliderMovies;

        wrapper.innerHTML = finalSlides.map(m => `
            <div class="slide" style="background-image: url('https://image.tmdb.org/t/p/original${m.backdrop_path}')">
                <div class="slide-overlay">
                    <h2 class="slide-title">${m.title || m.name}</h2>
                    <a href="movie.html?id=${m.id}&type=movie" class="watch-btn" style="width:120px;">شاهد الآن</a>
                </div>
            </div>
        `).join('');

        if(editMode && !document.getElementById('manageSliderBtn')) {
            const btn = document.createElement('div');
            btn.id = 'manageSliderBtn';
            btn.className = 'manage-slider-btn';
            btn.innerHTML = '⚙️ إدارة السلايدر';
            btn.onclick = openSliderManager;
            document.getElementById('sliderArea').appendChild(btn);
        } else if(!editMode && document.getElementById('manageSliderBtn')) {
            document.getElementById('manageSliderBtn').remove();
        }
        startAutoSlide();
    }

    function openSliderManager() {
        document.getElementById('sliderManagerModal').style.display = 'flex';
        const grid = document.getElementById('managerGrid');
        const customS = JSON.parse(localStorage.getItem('wg_slider_custom')) || [];
        grid.innerHTML = customS.map((m, idx) => `
            <div class="m-card">
                <div class="remove-x" onclick="removeFromSlider(${idx})">✕</div>
                <img src="https://image.tmdb.org/t/p/w400${m.poster_path}">
            </div>
        `).join('') + `
            <div class="m-card add-slot-card" onclick="openLibraryPicker()">
                <i class="fa-solid fa-plus-circle" style="font-size:25px; margin-bottom:8px;"></i>
                <span style="font-size:10px;">إضافة من المكتبة</span>
            </div>`;
    }

    async function openLibraryPicker() {
        document.getElementById('libraryPickerModal').style.display = 'flex';
        const grid = document.getElementById('libraryGrid');
        grid.innerHTML = '<div style="grid-column:1/-1; text-align:center;">جاري التحميل...</div>';
        const res = await fetch(`${BASE_URL}?endpoint=movie/popular&language=ar-SA`);
        const data = await res.json();
        grid.innerHTML = data.results.map(m => `
            <div class="lib-item" onclick='confirmAddToSlider(${JSON.stringify(m).replace(/'/g, "&apos;")})'>
                <img src="https://image.tmdb.org/t/p/w300${m.poster_path}">
                <div class="p-title">${m.title}</div>
            </div>`).join('');
    }

    function confirmAddToSlider(movie) {
        let customS = JSON.parse(localStorage.getItem('wg_slider_custom')) || [];
        if(!customS.some(x => x.id === movie.id)) {
            customS.push(movie);
            localStorage.setItem('wg_slider_custom', JSON.stringify(customS));
            closeModal('libraryPickerModal'); openSliderManager(); renderSlider();
        }
    }

    window.removeFromSlider = function(idx) {
        let customS = JSON.parse(localStorage.getItem('wg_slider_custom')) || [];
        customS.splice(idx, 1);
        localStorage.setItem('wg_slider_custom', JSON.stringify(customS));
        openSliderManager(); renderSlider();
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function loadStoredData() {  
        const stored = localStorage.getItem('watchgo_dev_custom');  
        if(stored) { try { const data = JSON.parse(stored); customMovies = data.customMovies || {}; extraSections = data.extraSections || []; } catch(e) {} }  
        
        // استعادة إعدادات الهيدر
        const sColor = localStorage.getItem('watchgo_primary_color');
        if(sColor) document.documentElement.style.setProperty('--primary', sColor);
        const sLogo = localStorage.getItem('watchgo_logo');
        if(sLogo) document.getElementById('mainLogo').src = sLogo;
        const sName = localStorage.getItem('watchgo_name');
        if(sName) document.getElementById('siteName').innerText = sName;
    }  

    async function createCard(m, type, isCustom = false) {
        const date = m.release_date || m.first_air_date || '2026';
        const year = date.split('-')[0];
        return `<div class="item-card" onclick="location.href='movie.html?id=${m.id}&type=${type}'">
            <img src="https://image.tmdb.org/t/p/w500${m.poster_path}">
            <div class="hover-details">
                <div class="item-name">${m.title || m.name}</div>
                <p class="item-story">${m.overview || "لا يوجد وصف عربي."}</p>
                <div class="meta-info"><span>${year}</span><span>★ ${m.vote_average || '0'}</span></div>
                <div class="watch-btn">مشاهدة الآن</div>
            </div></div>`;
    }

    async function loadSection(urlPath, gridId, pagId, type, cat = '', pageNum = 1, sectionKey) {  
        let finalUrl = `${BASE_URL}?endpoint=${urlPath}&page=${pageNum}`;  
        if(cat === 'egypt') finalUrl += `&with_origin_country=EG&with_original_language=ar`;  
        else if(cat === 'arabic_only') finalUrl += `&with_original_language=ar&without_origin_country=EG`;
        else if(cat === 'ramadan') finalUrl += `&with_original_language=ar&first_air_date_year=2026`;
        const res = await fetch(finalUrl);  
        const data = await res.json();  
        const cards = await Promise.all(data.results.slice(0, 12).map(m => createCard(m, type)));
        document.getElementById(gridId).innerHTML = cards.join('');
        
        let pagHtml = '';
        for(let i=1; i<=Math.min(data.total_pages, 5); i++) {
            pagHtml += `<button class="page-btn ${i===pageNum?'active':''}" onclick="loadSection('${urlPath}','${gridId}','${pagId}','${type}','${cat}',${i},'${sectionKey}')">${i}</button>`;
        }
        if(document.getElementById(pagId)) document.getElementById(pagId).innerHTML = pagHtml;
    }  

    function initSections() {  
        loadSection('discover/tv', 'ramadanGrid', 'ramadanPag', 'tv', 'ramadan', 1, 'ramadan');  
        loadSection('discover/movie', 'egyptGrid', 'egyptPag', 'movie', 'egypt', 1, 'egypt');  
        loadSection('discover/movie', 'arabicGrid', 'arabicPag', 'movie', 'arabic_only', 1, 'arabic');
        loadSection('discover/movie', 'moviesGrid', 'moviesPag', 'movie', '', 1, 'global');  
    }  

    async function init() {  
        loadStoredData(); initSections(); initColorPicker();
        try {  
            const pop = await fetch(`${BASE_URL}?endpoint=movie/now_playing&language=ar-SA`);  
            const pData = await pop.json(); apiSliderMovies = pData.results.slice(0, 5); renderSlider();  
            const top = await fetch(`${BASE_URL}?endpoint=movie/top_rated&language=ar-SA`);  
            const tData = await top.json();  
            document.getElementById('bestMoviesSide').innerHTML = tData.results.slice(0, 8).map(m => `<div class="side-item"><img src="https://image.tmdb.org/t/p/w200${m.poster_path}"><div class="txt">${m.title}</div></div>`).join('');  
            const ani = await fetch(`${BASE_URL}?endpoint=discover/movie&with_genres=16`);  
            const aniData = await ani.json();  
            document.getElementById('animeSide').innerHTML = aniData.results.slice(0, 8).map(m => `<div class="side-item"><img src="https://image.tmdb.org/t/p/w200${m.poster_path}"><div class="txt">${m.title}</div></div>`).join('');  
        } catch(e) {}  
        renderExtraSections();  
    }  

    function enableEditMode(enable) {  
        editMode = enable; document.body.classList.toggle('edit-mode-enabled', enable);  
        renderSlider();
        document.querySelectorAll('.section-title-text, .nav-link').forEach(el => el.setAttribute('contenteditable', enable));
        // تفعيل تعديل اسم الموقع
        const sName = document.getElementById('siteName');
        sName.contentEditable = enable;
        if(enable) {
            sName.onblur = () => localStorage.setItem('watchgo_name', sName.innerText);
        }
    }  

    document.getElementById('toggleEditModeBtn').onclick = () => enableEditMode(!editMode);  
    function toggleSearch() { const s = document.getElementById("searchBox"); s.style.display = s.style.display === "block" ? "none" : "block"; }

    window.showFull = async function(endpoint, title, cat) {
        document.getElementById('mainDisplay').classList.add('hidden');
        document.getElementById('sliderArea').classList.add('hidden');
        document.getElementById('fullView').classList.remove('hidden');
        document.getElementById('fullTitle').innerText = title;
        loadSection(endpoint, 'fullGrid', 'fullPag', endpoint.includes('tv')?'tv':'movie', cat);
    };

    function renderExtraSections() {  
        const container = document.getElementById('extraSectionsContainer');  
        extraSections.forEach(sec => {  
            const div = document.createElement('section'); div.className = 'section-box';  
            div.innerHTML = `<div class="section-title"><span><i class="fa-solid fa-film"></i> ${sec.title}</span></div><div class="grid-display" id="grid_${sec.key}"></div>`;  
            container.appendChild(div); loadSection('discover/movie', `grid_${sec.key}`, '', 'movie');  
        });  
    }

    init();

    let currentSlide = 0;
    let slideInterval;
    function startAutoSlide() {
        clearInterval(slideInterval); 
        slideInterval = setInterval(() => {
            const wrapper = document.getElementById('sliderWrapper');
            const slides = document.querySelectorAll('.slide');
            if (slides && slides.length > 1) {
                currentSlide = (currentSlide + 1) % slides.length;
                wrapper.style.transform = `translateX(${currentSlide * 100}%)`;
            }
        }, 5000); 
    }
</script>  
</body>  
</html>
