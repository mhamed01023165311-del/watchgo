<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WatchGo - Developer Mode</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
--primary: #9b51e0;
--bg-dark: #070707;
--card-bg: #111;
--border-color: #222;
--netflix-red: #e50914;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
background:var(--bg-dark);
color:#fff;
font-family:'Segoe UI',Tahoma,sans-serif;
overflow-x:hidden;
scroll-behavior:smooth;
}

/* header */

.header{
background:#000;
padding:0 40px;
height:75px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid var(--primary);
position:sticky;
top:0;
z-index:2000;
}

.logo-ctn{
display:flex;
align-items:center;
gap:10px;
text-decoration:none;
color:white;
}

.logo-ctn img{
width:45px;
height:45px;
border-radius:50%;
border:2px solid var(--primary);
cursor:pointer;
}

.edit-pen{
cursor:pointer;
color:var(--primary);
margin-right:10px;
font-size:14px;
}

.admin-controls{
position:fixed;
bottom:30px;
left:30px;
display:flex;
flex-direction:column;
gap:15px;
z-index:9999;
}

.master-btn{
width:60px;
height:60px;
border-radius:50%;
border:none;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
color:white;
box-shadow:0 5px 15px rgba(0,0,0,0.5);
}

.save-all-btn{
background:#27ae60;
}

.add-section-btn{
background:var(--primary);
}

.grid-display{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:20px;
}

.item-card{
background:var(--card-bg);
border-radius:8px;
overflow:hidden;
border:1px solid var(--border-color);
cursor:pointer;
position:relative;
}

.item-card img{
width:100%;
height:260px;
object-fit:cover;
}

.delete-btn{
position:absolute;
top:5px;
left:5px;
background:rgba(0,0,0,.8);
color:#fff;
padding:4px 6px;
font-size:12px;
border-radius:4px;
cursor:pointer;
display:none;
}

.item-card:hover .delete-btn{
display:block;
}

.add-card-btn{
border:2px dashed #444;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:260px;
border-radius:8px;
cursor:pointer;
color:#777;
}

.add-card-btn:hover{
border-color:var(--primary);
color:var(--primary);
}

.color-palette{
position:fixed;
right:20px;
bottom:120px;
background:#000;
padding:10px;
border-radius:10px;
display:grid;
grid-template-columns:repeat(6,1fr);
gap:6px;
z-index:9999;
border:1px solid #333;
}

.color-palette div{
width:22px;
height:22px;
border-radius:50%;
cursor:pointer;
}

</style>
</head>

<body>

<header class="header">

<div class="logo-ctn">
<img id="mainLogo" src="https://i.ibb.co/5ggRsXdV/Red-Black-Modern-Movie-Cinema-Presentation-20260311-124846.jpg">
<span id="siteTitleText" contenteditable="true" style="font-weight:bold;font-size:22px;">
WATCH<span style="color:var(--primary);">GO</span>
</span>
</div>

</header>

<div class="container">

<section class="section-box">

<div class="section-title">
أفلام مضافة
</div>

<div class="grid-display" id="developerGrid">

<div class="add-card-btn" onclick="openAdminModal()">
<i class="fa-solid fa-plus-circle"></i>
<span>إضافة عمل</span>
</div>

</div>

</section>

</div>
    <div class="admin-controls">

<button class="master-btn add-section-btn" onclick="createNewSection()">
<i class="fa-solid fa-folder-plus"></i>
</button>

<button class="master-btn save-all-btn" onclick="saveAuto()">
<i class="fa-solid fa-cloud-upload-alt"></i>
</button>

</div>


<div id="adminModal" class="admin-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);align-items:center;justify-content:center;z-index:9999;">

<div style="background:#111;padding:20px;border-radius:10px;width:90%;max-width:400px">

<input id="mTitle" placeholder="عنوان الفيلم" style="width:100%;padding:10px;margin:5px 0;background:#000;border:1px solid #333;color:#fff">

<input id="mImg" placeholder="رابط الصورة" style="width:100%;padding:10px;margin:5px 0;background:#000;border:1px solid #333;color:#fff">

<button onclick="addCustomMovie()" style="width:100%;padding:10px;background:var(--primary);border:none;color:#fff">
إضافة
</button>

<button onclick="closeAdminModal()" style="width:100%;padding:10px;background:#222;border:none;color:#fff;margin-top:5px">
إلغاء
</button>

</div>
</div>


<script>

const presetColors = [
"#9b51e0","#e50914","#27ae60","#3498db","#f39c12",
"#e74c3c","#1abc9c","#2ecc71","#8e44ad","#2980b9",
"#16a085","#c0392b","#d35400","#2c3e50","#f1c40f",
"#ff4757","#3742fa","#2ed573","#ffa502","#ff6b81",
"#7bed9f","#70a1ff","#5352ed","#ff6348","#48dbfb",
"#10ac84","#5f27cd","#ee5253","#0abde3","#222f3e"
];

function renderColors(){

const box=document.createElement("div");
box.className="color-palette";

presetColors.forEach(c=>{
const d=document.createElement("div");
d.style.background=c;
d.onclick=()=>changeMainTheme(c);
box.appendChild(d);
});

document.body.appendChild(box);

}

renderColors();


function changeMainTheme(color){
document.documentElement.style.setProperty('--primary',color);
saveAuto();
}


function openAdminModal(){
document.getElementById("adminModal").style.display="flex";
}

function closeAdminModal(){
document.getElementById("adminModal").style.display="none";
}


function addCustomMovie(){

const title=document.getElementById("mTitle").value;
const img=document.getElementById("mImg").value;

if(!title || !img) return;

const card=`
<div class="item-card">

<div class="delete-btn" onclick="this.parentElement.remove();saveAuto()">X</div>

<img src="${img}">

<div style="padding:10px;text-align:center;font-size:13px">
${title}
</div>

</div>
`;

document.getElementById("developerGrid")
.insertAdjacentHTML("afterbegin",card);

closeAdminModal();
saveAuto();

}
    /* =========================
   Auto Save
========================= */

function saveAuto(){
localStorage.setItem("watchgo_save",document.body.innerHTML);
}

function loadAuto(){

const data=localStorage.getItem("watchgo_save");

if(data){
document.body.innerHTML=data;
attachEvents();
}

}

window.addEventListener("load",loadAuto);



/* =========================
   add section
========================= */

function createNewSection(){

const name=prompt("اسم القسم");

if(!name) return;

const id="sec_"+Date.now();

const html=`

<section class="section-box" id="${id}">

<div class="section-title">
${name}
</div>

<div class="grid-display">

<div class="add-card-btn" onclick="openAdminModal()">
<i class="fa-solid fa-plus-circle"></i>
<span>إضافة عمل</span>
</div>

</div>

</section>

`;

document.querySelector(".container")
.insertAdjacentHTML("beforeend",html);

saveAuto();

}


/* =========================
delete hover inject
========================= */

document.addEventListener("mouseover",e=>{

const card=e.target.closest(".item-card");

if(!card) return;

if(card.querySelector(".delete-btn")) return;

const btn=document.createElement("div");

btn.className="delete-btn";
btn.innerText="X";

btn.onclick=(ev)=>{
ev.stopPropagation();
card.remove();
saveAuto();
};

card.appendChild(btn);

});


/* =========================
rebind after load
========================= */

function attachEvents(){

document.querySelectorAll(".add-card-btn").forEach(btn=>{
btn.onclick=openAdminModal;
});

}



/* =========================
init
========================= */

attachEvents();

</script>
</body>
</html>
