<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchGo - Smart Cinema Hub (مطور متكامل)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #9b51e0; 
            --bg-dark: #070707; 
            --card-bg: #111;  
            --border-color: #222;  
            --netflix-red: #e50914;  
            --edit-border: #4caf50;
            --edit-glow: rgba(76, 175, 80, 0.4);
        }  

        * { box-sizing: border-box; margin: 0; padding: 0; }  
        body { background: var(--bg-dark); color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; scroll-behavior: smooth; }  

        /* --- الهيدر --- */  
        .header {   
            background: #000; padding: 0 40px; height: 75px;  
            display: flex; justify-content: space-between; align-items: center;   
            border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 2000;  
        }  
        .logo-ctn { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; flex-shrink: 0; }  
        .logo-ctn img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--primary); }  

        .main-nav { display: flex; list-style: none; height: 100%; align-items: center; gap: 5px; }  
        .nav-item { position: relative; height: 100%; display: flex; align-items: center; }  
        .nav-link {   
            color: #eee; text-decoration: none; font-size: 14px; font-weight: 600;   
            padding: 0 15px; cursor: pointer; display: flex; align-items: center; gap: 6px;  
            height: 100%; transition: 0.3s;  
        }  
        .nav-link:hover { color: var(--primary); background: rgba(155, 81, 224, 0.05); }  

        .dropdown {   
            position: absolute; top: 75px; right: 0; background: #0a0a0a; min-width: 220px;   
            border-top: 3px solid var(--primary); display: none; flex-direction: column;   
            box-shadow: 0 15px 30px rgba(0,0,0,0.9); z-index: 3000;  
        }  
        .nav-item:hover .dropdown { display: flex; }  
        .dropdown a { color: #ccc; padding: 12px 20px; text-decoration: none; font-size: 13px; border-bottom: 1px solid #1a1a1a; text-align: right; transition: 0.2s; }  
        .dropdown a:hover { background: #151515; color: var(--primary); padding-right: 25px; }  
        .nav-netflix { color: var(--netflix-red) !important; font-weight: bold !important; }  

        .header-icons { display: flex; align-items: center; gap: 15px; }  
        .icon-btn { color: #ccc; cursor: pointer; font-size: 18px; transition: 0.3s; }  
        .icon-btn:hover { color: var(--primary); }  

        /* --- شريط البحث --- */  
        #searchBox {   
            background: rgba(0,0,0,0.95); padding: 20px; display: none;   
            position: fixed; top: 75px; left: 0; width: 100%; z-index: 1500;  
            border-bottom: 1px solid var(--primary); backdrop-filter: blur(10px);  
        }  
        #searchBox input {   
            width: 80%; max-width: 800px; padding: 15px 25px; background: #111;   
            border: 2px solid var(--border-color); color: #fff; border-radius: 50px;   
            outline: none; font-size: 18px; transition: 0.3s;  
        }  
        #searchBox input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(155, 81, 224, 0.3); }  

        /* --- السلايدر --- */  
        .slider-container { max-width: 1620px; margin: 20px auto; padding: 0 40px; position: relative; }  
        #heroSection { width: 100%; height: 420px; position: relative; overflow: hidden; border-radius: 15px; border: 1px solid var(--border-color); background: #000; }  
        .slider-wrapper { display: flex; width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); }  
        .slide { min-width: 100%; height: 100%; background-size: cover; background-position: center 20%; position: relative; }  
        .slide-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(7,7,7,1) 5%, transparent 70%); display: flex; flex-direction: column; justify-content: flex-end; padding: 40px; }  
        .slide-title { font-size: 32px; font-weight: 900; margin-bottom: 15px; text-shadow: 2px 2px 10px #000; }  

        /* --- كارت المحتوى --- */  
        .grid-display { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }  
        .item-card { background: var(--card-bg); border-radius: 8px; overflow: visible; border: 1px solid var(--border-color); transition: 0.4s ease; cursor: pointer; position: relative; z-index: 1; }  
        .item-card:hover { transform: scale(1.1); z-index: 100; box-shadow: 0 10px 40px rgba(0,0,0,0.9); border-color: var(--primary); }  
        .item-card img { width: 100%; height: 260px; object-fit: cover; border-radius: 8px 8px 0 0; }  
          
        .hover-details { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(15, 15, 15, 0.98); padding: 15px 12px; opacity: 0; visibility: hidden; transition: 0.3s; border-top: 1px solid var(--primary); border-radius: 0 0 8px 8px; max-height: 100%; overflow: hidden; }  
        .item-card:hover .hover-details { opacity: 1; visibility: visible; }  
        .item-name { font-size: 13px; font-weight: bold; margin-bottom: 8px; color: #fff; text-align: center; }  
        .item-name:hover { color: var(--primary); }  
        .item-story { font-size: 11px; color: #ccc; line-height: 1.5; margin-bottom: 10px; height: 50px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; text-align: center; direction: rtl; }  
        .meta-info { display: flex; justify-content: center; gap: 8px; font-size: 10px; color: #aaa; margin-bottom: 10px; }  
        .meta-info span { border: 1px solid #333; padding: 2px 6px; border-radius: 3px; background: #000; }  
        .watch-btn { background: var(--primary); color: #fff; font-size: 12px; padding: 8px; border-radius: 4px; font-weight: bold; display: block; text-align: center; text-decoration: none; }  

        /* --- الحاويات --- */  
        .container { padding: 20px 40px; display: grid; grid-template-columns: 280px 1fr 280px; gap: 25px; max-width: 1700px; margin: 0 auto; }  
        .section-box { margin-bottom: 50px; position: relative; }  
        .section-title { background: #111; padding: 12px 20px; font-size: 17px; font-weight: bold; margin-bottom: 20px; border-right: 5px solid var(--primary); display: flex; align-items: center; gap: 10px; }  
        .sidebar { background: #111; border: 1px solid var(--border-color); border-radius: 8px; height: fit-content; position: sticky; top: 90px; }  
        .side-title { background: #1a1a1a; color: var(--primary); font-size: 13px; font-weight: bold; padding: 12px; border-bottom: 1px solid var(--border-color); text-align: center; }  
        .side-list { padding: 10px; }  
        .side-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-bottom: 1px solid #1a1a1a; cursor: pointer; transition: 0.2s; }  
        .side-item:hover { background: #181818; }  
        .side-item img { width: 45px; height: 65px; border-radius: 4px; object-fit: cover; }  
        .side-item .txt { font-size: 11px; color: #ccc; }  

        .no-results { text-align: center; padding: 50px; font-size: 20px; color: #777; width: 100%; }  
        .hidden { display: none !important; }  
        .loading-indicator { text-align: center; padding: 20px; color: var(--primary); }  

        /* وضع التحرير */  
        .edit-mode-enabled [contenteditable="true"] {  
            outline: 2px dashed var(--edit-border);  
            background-color: rgba(76, 175, 80, 0.1);  
            cursor: text;  
        }  
        .delete-item-btn, .delete-slide-btn {  
            position: absolute; top: -10px; right: -10px; background: #e50914; color: white;  
            border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center;  
            justify-content: center; font-size: 12px; cursor: pointer; z-index: 200;  
        }  
        .edit-slider-btn { position: absolute; top: 15px; left: 15px; background: var(--primary); padding: 6px 12px; border-radius: 20px; cursor: pointer; z-index: 100; font-size: 12px; }  
        .add-movie-btn, .add-section-btn { background: var(--primary); padding: 6px 12px; margin-top: 10px; border-radius: 20px; font-size:12px; cursor:pointer; width:fit-content; }  

        /* مودال */  
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 10000; display: flex; align-items: center; justify-content: center; }  
        .modal-content { background: #111; border-radius: 12px; width: 90%; max-width: 500px; padding: 25px; border-top: 4px solid var(--primary); }  
        .modal-content input, .modal-content select { width:100%; padding: 12px; margin: 10px 0; background: #1a1a1a; border:1px solid #333; color:white; border-radius: 8px; }  
        .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }  
        .modal-buttons button { padding: 8px 16px; border-radius: 6px; cursor: pointer; }  

        @media (max-width: 1200px) { .container { grid-template-columns: 1fr; } .sidebar { display: none; } .main-nav { display: none; } }  
    </style>
</head>  
<body>  
<header class="header">  
    <a href="#" class="logo-ctn" id="logoLink">  
        <img src="https://i.ibb.co/5ggRsXdV/Red-Black-Modern-Movie-Cinema-Presentation-20260311-124846.jpg" id="logoImg">  
        <span style="font-weight: bold; font-size: 22px;">WATCH<span style="color: var(--primary);">GO</span></span>  
    </a>  
    <nav class="main-nav" id="mainNav">  
        <div class="nav-item"><a class="nav-link" href="#" data-nav-original="الرئيسية">الرئيسية</a></div>  
        <div class="nav-item"><span class="nav-link">الأفلام <i class="fa-solid fa-chevron-down"></i></span><div class="dropdown" data-dropdown="movies"><a href="#" onclick="showFull('discover/movie', 'أفلام مصرية', 'egypt')">أفلام مصرية</a><a href="#" onclick="showFull('discover/movie', 'أفلام عربية', 'arabic_only')">أفلام عربية</a><a href="#" onclick="showFull('discover/movie', 'أفلام أجنبية', 'en')">أفلام أجنبية</a><a href="#" onclick="showFull('discover/movie', 'أفلام رعب', '27')">أفلام رعب</a><a href="#" onclick="showFull('discover/movie', 'أفلام أكشن', '28')">أفلام أكشن</a></div></div>  
        <div class="nav-item"><span class="nav-link">المسلسلات <i class="fa-solid fa-chevron-down"></i></span><div class="dropdown" data-dropdown="tv"><a href="#" onclick="showFull('discover/tv', 'مسلسلات رمضان 2026', 'ramadan')">مسلسلات رمضان 2026</a><a href="#" onclick="showFull('discover/tv', 'مسلسلات Netflix', 'netflix')" class="nav-netflix">مسلسلات Netflix</a><a href="#" onclick="showFull('discover/tv', 'مسلسلات مصرية', 'eg-tv')">مسلسلات مصرية</a><a href="#" onclick="showFull('discover/tv', 'مسلسلات أجنبية', 'en-tv')">مسلسلات أجنبية</a></div></div>  
        <div class="nav-item"><a class="nav-link" href="#" onclick="showFull('discover/movie', 'عالم الأنمي', '16')">أنمي</a></div>  
    </nav>  
    <div class="header-icons">  
        <i class="fa-solid fa-magnifying-glass icon-btn" onclick="toggleSearch()"></i>  
        <i class="fa-solid fa-palette icon-btn" id="colorPickerBtn"></i>  
        <i class="fa-solid fa-gear icon-btn" id="toggleEditModeBtn"></i>  
    </div>  
</header>  

<div id="searchBox"><center><input type="text" id="searchInput" placeholder="ابحث..." onkeyup="smartSearch(this.value)"><p style="margin-top:10px; font-size:12px; color:var(--primary);">اكتب حرفين على الأقل</p></center></div>  

<div class="slider-container" id="sliderArea">  
    <div id="heroSection"><div class="slider-wrapper" id="sliderWrapper"></div></div>  
</div>  

<div class="container">  
    <aside class="sidebar"><div class="side-title" id="bestSideTitle">أعلى التقييمات</div><div class="side-list" id="bestMoviesSide"></div></aside>  
    <main class="main-col" id="mainCol">  
        <div id="mainDisplay">  
            <section class="section-box" data-section-key="ramadan" data-type="tv" data-cat="ramadan" data-url="discover/tv"><div class="section-title"><span><i class="fa-solid fa-moon"></i> <span class="section-title-text">مسلسلات رمضان 2026</span></span></div><div class="grid-display" id="ramadanGrid"></div><div class="infinite-scroll-trigger" data-section="ramadan"></div></section>  
            <section class="section-box" data-section-key="egypt" data-type="movie" data-cat="egypt" data-url="discover/movie"><div class="section-title"><span><i class="fa-solid fa-star"></i> <span class="section-title-text">أحدث الأفلام المصرية</span></span></div><div class="grid-display" id="egyptGrid"></div><div class="infinite-scroll-trigger" data-section="egypt"></div></section>  
            <section class="section-box" data-section-key="arabic" data-type="movie" data-cat="arabic_only" data-url="discover/movie"><div class="section-title"><span><i class="fa-solid fa-flag"></i> <span class="section-title-text">أفلام عربية منوعة</span></span></div><div class="grid-display" id="arabicGrid"></div><div class="infinite-scroll-trigger" data-section="arabic"></div></section>  
            <section class="section-box" data-section-key="global" data-type="movie" data-cat="" data-url="discover/movie"><div class="section-title"><span><i class="fa-solid fa-globe"></i> <span class="section-title-text">أحدث الأفلام العالمية</span></span></div><div class="grid-display" id="moviesGrid"></div><div class="infinite-scroll-trigger" data-section="global"></div></section>  
        </div>  
        <div id="fullView" class="hidden"><div class="section-box"><div class="section-title" id="fullTitle"></div><div class="grid-display" id="fullGrid"></div><div class="infinite-scroll-trigger" data-section="full"></div></div></div>  
        <div id="extraSectionsContainer"></div>  
    </main>  
    <aside class="sidebar"><div class="side-title" id="animeSideTitle">عالم الأنمي</div><div class="side-list" id="animeSide"></div></aside>  
</div>  

<script>  
    const BASE_URL = 'https://script.google.com/macros/s/AKfycbw4GkkBMwuUqmeMBYUNV1u0LvQvMla1MgM6ActKpZsdhVvPUnUqdi1StaL_1KkEgniV2A/exec';  
    let editMode = false;  
    let customMovies = {}; let extraSections = []; let hiddenMovies = {};  
    let infiniteState = {}; // page, loading, hasMore  
    let currentFullState = null;  
    let sliderMovies = []; let sliderInterval;  

    // تحميل وحفظ البيانات  
    function loadStored() {  
        const stored = localStorage.getItem('watchgo_dev_data');  
        if(stored) { try { const d=JSON.parse(stored); customMovies=d.customMovies||{}; extraSections=d.extraSections||[]; hiddenMovies=d.hiddenMovies||{}; sliderMovies=d.sliderMovies||[]; if(d.primaryColor) document.documentElement.style.setProperty('--primary', d.primaryColor); } catch(e){} }  
        applyStoredTexts();  
    }  
    function saveStored() { localStorage.setItem('watchgo_dev_data', JSON.stringify({ customMovies, extraSections, hiddenMovies, sliderMovies, primaryColor: getComputedStyle(document.documentElement).getPropertyValue('--primary') })); }  
    function applyStoredTexts() { const stored=JSON.parse(localStorage.getItem('watchgo_edited_texts')||'{}'); for(const [sel, txt] of Object.entries(stored)){ const el=document.querySelector(sel); if(el) el.innerText=txt; } }  
    function saveText(selector, newText){ let st=JSON.parse(localStorage.getItem('watchgo_edited_texts')||'{}'); st[selector]=newText; localStorage.setItem('watchgo_edited_texts',JSON.stringify(st)); }  

    // إنشاء كارد  
    async function createCard(m, type, isCustom=false, uniqueId=null){  
        if(isCustom){  
            return `<div class="item-card" data-unique-id="${uniqueId}" data-custom="true"><img src="${m.image}" onerror="this.src='https://via.placeholder.com/500x750'"><div class="hover-details"><div class="item-name">${m.title}</div><p class="item-story">${m.story}</p><div class="meta-info"><span>${m.year}</span><span><i class="fa-solid fa-star"></i> ${m.rating}</span></div><div class="watch-btn">مشاهدة</div></div></div>`;  
        }  
        const isArabic=m.original_language==='ar'; const date=m.release_date||m.first_air_date||'2026'; const year=date.split('-')[0];  
        const resAr=await fetch(`${BASE_URL}?endpoint=${type}/${m.id}`); const arData=await resAr.json();  
        const displayName=isArabic?(arData.title||arData.name||m.title||m.name):(m.title||m.name);  
        const displayStory=arData.overview||"لا يوجد وصف";  
        return `<div class="item-card" data-id="${m.id}" data-type="${type}" data-unique-id="${m.id}_${type}"><img src="https://image.tmdb.org/t/p/w500${m.poster_path}"><div class="hover-details"><div class="item-name">${displayName}</div><p class="item-story">${displayStory}</p><div class="meta-info"><span>${year}</span><span><i class="fa-solid fa-star"></i> ${m.vote_average.toFixed(1)}</span></div><div class="watch-btn">مشاهدة</div></div></div>`;  
    }  

    // تحميل قسم مع لانهائي  
    async function loadSectionInfinite(sectionKey, type, urlPath, cat, page, append=true){  
        const state=infiniteState[sectionKey]||{page:1, loading:false, hasMore:true};  
        if(state.loading || (!append && page!==1)) return;  
        state.loading=true; if(!append) state.page=page; else state.page++;  
        infiniteState[sectionKey]=state;  
        const gridId=sectionKey==='full'?'fullGrid':(sectionKey+'_grid');  
        const container=document.getElementById(gridId); if(!container && sectionKey!=='full') return;  
        if(!append && container) container.innerHTML='';  
        let url=`${BASE_URL}?endpoint=${urlPath}&page=${state.page}`;  
        if(type==='movie') url+='&sort_by=primary_release_date.desc'; else url+='&sort_by=first_air_date.desc';  
        if(cat==='egypt') url+='&with_origin_country=EG&with_original_language=ar';  
        else if(cat==='arabic_only') url+='&with_original_language=ar&without_origin_country=EG';  
        else if(cat==='ramadan') url+='&with_original_language=ar&first_air_date_year=2026';  
        try{  
            const res=await fetch(url); const data=await res.json();  
            let movies=data.results||[]; const hiddenSet=new Set(hiddenMovies[sectionKey]||[]);  
            movies=movies.filter(m=>!hiddenSet.has(`${m.id}_${type}`));  
            const customList=customMovies[sectionKey]||[];  
            let allItems=[...customList.map(c=>createCard(c,type,true,c.id)), ...movies.map(m=>createCard(m,type))];  
            const cards=await Promise.all(allItems);  
            if(container){  
                if(append) container.insertAdjacentHTML('beforeend', cards.join(''));  
                else container.innerHTML=cards.join('');  
            }  
            state.hasMore = data.page < data.total_pages;  
            if(editMode) attachDeleteButtonsToGrid(gridId, sectionKey, type);  
        } catch(e){}  
        state.loading=false; infiniteState[sectionKey]=state;  
    }  

    function attachDeleteButtonsToGrid(gridId, sectionKey, type){  
        const grid=document.getElementById(gridId); if(!grid) return;  
        grid.querySelectorAll('.item-card').forEach(card=>{  
            if(card.querySelector('.delete-item-btn')) return;  
            const btn=document.createElement('div'); btn.className='delete-item-btn'; btn.innerHTML='×';  
            btn.onclick=(e)=>{ e.stopPropagation(); const unique=card.dataset.uniqueId||(card.dataset.id+'_'+card.dataset.type); if(unique){ if(!hiddenMovies[sectionKey]) hiddenMovies[sectionKey]=[]; hiddenMovies[sectionKey].push(unique); saveStored(); card.remove(); } };  
            card.style.position='relative'; card.appendChild(btn);  
        });  
    }  

    function initInfiniteScroll(){  
        const observer=new IntersectionObserver((entries)=>{  
            entries.forEach(entry=>{ if(entry.isIntersecting){ const trigger=entry.target; const sectionKey=trigger.dataset.section; if(sectionKey && infiniteState[sectionKey] && infiniteState[sectionKey].hasMore && !infiniteState[sectionKey].loading){  
                if(sectionKey==='full' && currentFullState){ loadSectionInfinite('full', currentFullState.type, currentFullState.urlPath, currentFullState.cat, null, true); }  
                else{ const secBox=document.querySelector(`.section-box[data-section-key="${sectionKey}"]`); if(secBox){ const type=secBox.dataset.type, url=secBox.dataset.url, cat=secBox.dataset.cat||''; loadSectionInfinite(sectionKey, type, url, cat, null, true); } }  
            } } });  
        }, {threshold:0.5});  
        document.querySelectorAll('.infinite-scroll-trigger').forEach(t=>observer.observe(t));  
    }  

    async function initSections(){  
        const sections=[{key:'ramadan',type:'tv',url:'discover/tv',cat:'ramadan'},{key:'egypt',type:'movie',url:'discover/movie',cat:'egypt'},{key:'arabic',type:'movie',url:'discover/movie',cat:'arabic_only'},{key:'global',type:'movie',url:'discover/movie',cat:''}];  
        for(const s of sections){ infiniteState[s.key]={page:1,loading:false,hasMore:true}; await loadSectionInfinite(s.key, s.type, s.url, s.cat, 1, false); }  
    }  

    async function initSlider(){  
        if(sliderMovies.length===0){  
            const pop=await fetch(`${BASE_URL}?endpoint=movie/now_playing&language=en-US`); const data=await pop.json(); sliderMovies=data.results.slice(0,5).map(m=>({id:m.id,title:m.title,backdrop:m.backdrop_path,type:'movie'}));  
            saveStored();  
        }  
        renderSlider();  
    }  
    function renderSlider(){  
        const wrapper=document.getElementById('sliderWrapper'); if(!wrapper) return;  
        wrapper.innerHTML=sliderMovies.map(m=>`<div class="slide" style="background-image: url('https://image.tmdb.org/t/p/original${m.backdrop}')"><div class="slide-overlay"><h2 class="slide-title">${m.title}</h2><a href="movie.html?id=${m.id}&type=${m.type}" class="watch-btn" style="width:120px;">شاهد</a></div></div>`).join('');  
        if(sliderInterval) clearInterval(sliderInterval); let i=0; sliderInterval=setInterval(()=>{ i=(i+1)%sliderMovies.length; wrapper.style.transform=`translateX(-${i*100}%)`; },5000);  
    }  

    // مودال مخصص  
    function showModal(title, fields, onSubmit){  
        const modal=document.createElement('div'); modal.className='modal-overlay';  
        let html=`<div class="modal-content"><h3>${title}</h3>`;  
        fields.forEach(f=>{ html+=`<input type="${f.type||'text'}" id="modal_${f.name}" placeholder="${f.placeholder}" ${f.value?`value="${f.value}"`:''}>`; });  
        html+=`<div class="modal-buttons"><button id="modalCancel">إلغاء</button><button id="modalConfirm" style="background:var(--primary);color:white">تأكيد</button></div></div>`;  
        modal.innerHTML=html; document.body.appendChild(modal);  
        document.getElementById('modalCancel').onclick=()=>modal.remove();  
        document.getElementById('modalConfirm').onclick=()=>{ const data={}; fields.forEach(f=>{ data[f.name]=document.getElementById(`modal_${f.name}`).value; }); modal.remove(); onSubmit(data); };  
    }  

    // إضافة قسم جديد  
    function addNewSection(){  
        showModal('إضافة قسم جديد', [{name:'title',placeholder:'عنوان القسم',type:'text'}], (data)=>{ if(data.title){ extraSections.push({key:'extra_'+Date.now(), title:data.title, icon:'fa-film'}); saveStored(); renderExtraSections(); } });  
    }  

    function renderExtraSections(){  
        const container=document.getElementById('extraSectionsContainer'); container.innerHTML='';  
        extraSections.forEach(sec=>{  
            const div=document.createElement('section'); div.className='section-box'; div.dataset.sectionKey=sec.key; div.dataset.type='movie'; div.dataset.url='discover/movie'; div.dataset.cat='';  
            div.innerHTML=`<div class="section-title"><span><i class="fa-solid ${sec.icon}"></i> <span class="section-title-text">${sec.title}</span></span></div><div class="grid-display" id="${sec.key}_grid"></div><div class="infinite-scroll-trigger" data-section="${sec.key}"></div>`;  
            container.appendChild(div);  
            infiniteState[sec.key]={page:1,loading:false,hasMore:true};  
            loadSectionInfinite(sec.key, 'movie', 'discover/movie', '', 1, false);  
        });  
        initInfiniteScroll();  
    }  

    // إدارة السلايدر  
    function editSlider(){  
        let slidesHtml=sliderMovies.map((s,i)=>`<div style="display:flex; justify-content:space-between; margin:10px 0; background:#222; padding:10px;"><span>${s.title}</span><button class="delete-slide-btn" data-index="${i}" style="background:#e50914; border:none; color:white; border-radius:20px;">✖</button></div>`).join('');  
        const modalDiv=document.createElement('div'); modalDiv.className='modal-overlay';  
        modalDiv.innerHTML=`<div class="modal-content" style="max-width:600px;"><h3>تعديل السلايدر</h3><div id="slidesList">${slidesHtml}</div><input type="text" id="searchMovieForSlider" placeholder="ابحث عن فيلم/مسلسل لإضافته"><button id="searchMovieBtn" style="margin:10px 0; background:var(--primary);">بحث</button><div id="searchResults"></div><div class="modal-buttons"><button id="closeSliderModal">إغلاق</button></div></div>`;  
        document.body.appendChild(modalDiv);  
        modalDiv.querySelectorAll('.delete-slide-btn').forEach(btn=>{ btn.onclick=()=>{ const idx=parseInt(btn.dataset.index); sliderMovies.splice(idx,1); saveStored(); modalDiv.remove(); editSlider(); }; });  
        modalDiv.querySelector('#searchMovieBtn').onclick=async()=>{ const q=modalDiv.querySelector('#searchMovieForSlider').value; if(q.length<2) return; const res=await fetch(`${BASE_URL}?endpoint=search/multi&query=${q}&language=en-US`); const data=await res.json(); const results=data.results.filter(r=>r.media_type==='movie'||r.media_type==='tv').slice(0,5); let html=''; for(const r of results){ html+=`<div style="display:flex; gap:10px; margin:10px; align-items:center;"><img src="https://image.tmdb.org/t/p/w92${r.poster_path}" width="40"><span>${r.title||r.name}</span><button class="addSlideBtn" data-id="${r.id}" data-type="${r.media_type}" data-title="${r.title||r.name}" data-backdrop="${r.backdrop_path||r.poster_path}">إضافة</button></div>`; }  
            modalDiv.querySelector('#searchResults').innerHTML=html;  
            modalDiv.querySelectorAll('.addSlideBtn').forEach(btn=>{ btn.onclick=()=>{ sliderMovies.push({id:btn.dataset.id,title:btn.dataset.title,backdrop:btn.dataset.backdrop,type:btn.dataset.type}); saveStored(); renderSlider(); modalDiv.remove(); editSlider(); }; });  
        };  
        modalDiv.querySelector('#closeSliderModal').onclick=()=>modalDiv.remove();  
    }  

    window.showFull=async function(endpoint, title, cat, page=1){  
        document.getElementById('mainDisplay').classList.add('hidden'); document.getElementById('sliderArea').classList.add('hidden'); document.getElementById('fullView').classList.remove('hidden'); document.getElementById('fullTitle').innerText=title;  
        currentFullState={urlPath:endpoint, cat:cat, type:endpoint.includes('tv')?'tv':'movie'};  
        infiniteState['full']={page:1,loading:false,hasMore:true};  
        await loadSectionInfinite('full', currentFullState.type, endpoint, cat, 1, false);  
        window.scrollTo(0,0);  
    };  

    function toggleSearch(){ const s=document.getElementById("searchBox"); s.style.display=s.style.display==="block"?"none":"block"; if(s.style.display==="block") document.getElementById("searchInput").focus(); }  
    async function smartSearch(query){ if(query.length<2) return; document.getElementById('mainDisplay').classList.add('hidden'); document.getElementById('sliderArea').classList.add('hidden'); document.getElementById('fullView').classList.remove('hidden'); document.getElementById('fullTitle').innerHTML=`نتائج: ${query}`;  
        const [movieRes,tvRes]=await Promise.all([fetch(`${BASE_URL}?endpoint=search/movie&query=${query}&language=ar-SA`), fetch(`${BASE_URL}?endpoint=search/tv&query=${query}&language=ar-SA`)]);  
        const movieData=await movieRes.json(), tvData=await tvRes.json();  
        let results=[...(movieData.results||[]).map(i=>({...i,media_type:'movie'})),...(tvData.results||[]).map(i=>({...i,media_type:'tv'}))].filter(i=>i.poster_path);  
        currentFullState={urlPath:'search', cat:'', type:'movie'};  
        infiniteState['full']={page:1,loading:false,hasMore:false};  
        const cards=await Promise.all(results.map(m=>createCard(m,m.media_type)));  
        document.getElementById('fullGrid').innerHTML=cards.join('');  
    }  

    function enableEditMode(enable){ editMode=enable; if(enable) document.body.classList.add('edit-mode-enabled'); else document.body.classList.remove('edit-mode-enabled'); attachEditFeatures(); }  
    function attachEditFeatures(){  
        if(editMode){  
            if(!document.querySelector('.edit-slider-btn')){ const btn=document.createElement('div'); btn.className='edit-slider-btn'; btn.innerHTML='✏️ تعديل السلايدر'; btn.onclick=editSlider; document.querySelector('.slider-container').appendChild(btn); }  
            document.querySelectorAll('.section-box').forEach(sec=>{ if(!sec.querySelector('.add-movie-btn')){ const btn=document.createElement('div'); btn.className='add-movie-btn'; btn.innerText='+ إضافة فيلم'; btn.onclick=()=>{ showModal('إضافة فيلم مخصص',[{name:'title',placeholder:'العنوان'},{name:'story',placeholder:'القصة'},{name:'year',placeholder:'السنة'},{name:'rating',placeholder:'التقييم'},{name:'image',placeholder:'رابط الصورة'}], data=>{ if(data.title){ const key=sec.dataset.sectionKey; if(!customMovies[key]) customMovies[key]=[]; customMovies[key].unshift({id:Date.now(),title:data.title,story:data.story,year:data.year,rating:data.rating,image:data.image}); saveStored(); loadSectionInfinite(key, sec.dataset.type, sec.dataset.url, sec.dataset.cat||'', 1, false); } }); }; sec.appendChild(btn); } });  
            if(!document.getElementById('globalAddSection')){ const addSecBtn=document.createElement('div'); addSecBtn.id='globalAddSection'; addSecBtn.className='add-section-btn'; addSecBtn.innerText='➕ إضافة قسم جديد'; addSecBtn.onclick=addNewSection; document.getElementById('mainCol').appendChild(addSecBtn); }  
            ['ramadanGrid','egyptGrid','arabicGrid','moviesGrid','fullGrid'].forEach(gridId=>{ const secKey=gridId.replace('_grid',''); attachDeleteButtonsToGrid(gridId, secKey, 'movie'); });  
        } else { document.querySelectorAll('.add-movie-btn, .edit-slider-btn, #globalAddSection').forEach(el=>el.remove()); }  
    }  

    // إعدادات اللون  
    document.getElementById('colorPickerBtn').onclick=()=>{ const input=document.createElement('input'); input.type='color'; input.value=getComputedStyle(document.documentElement).getPropertyValue('--primary').trim(); input.onchange=e=>{ document.documentElement.style.setProperty('--primary', e.target.value); saveStored(); }; input.click(); };  
    document.getElementById('toggleEditModeBtn').onclick=()=>enableEditMode(!editMode);  
    loadStored(); initSections(); initSlider(); initInfiniteScroll();  
    fetch(`${BASE_URL}?endpoint=movie/top_rated&language=ar-SA`).then(r=>r.json()).then(d=>{ document.getElementById('bestMoviesSide').innerHTML=d.results.slice(0,8).map(m=>`<div class="side-item" onclick="location.href='movie.html?id=${m.id}&type=movie'"><img src="https://image.tmdb.org/t/p/w200${m.poster_path}"><div class="txt">${m.title}</div></div>`).join(''); });  
    fetch(`${BASE_URL}?endpoint=discover/movie&with_genres=16&language=en-US`).then(r=>r.json()).then(d=>{ document.getElementById('animeSide').innerHTML=d.results.slice(0,8).map(m=>`<div class="side-item" onclick="location.href='movie.html?id=${m.id}&type=movie'"><img src="https://image.tmdb.org/t/p/w200${m.poster_path}"><div class="txt">${m.title}</div></div>`).join(''); });  
</script>  
</body>
