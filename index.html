<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>WatchGo - Studio Edition | تعديل مباشر</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- خط Tajawal احترافي -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #070707;
            color: #fff;
            font-family: 'Tajawal', 'Segoe UI', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        :root {
            --primary: #9b51e0;
            --bg-dark: #070707;
            --card-bg: #111;
            --border-color: #222;
            --netflix-red: #e50914;
            --shadow-strong: 0 20px 35px -10px rgba(0,0,0,0.8);
        }

        /* تعديل الكلاسيكيات مع الاحتفاظ بالروح */
        .header { background: #000; padding: 0 40px; height: 75px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 2000; }
        .logo-ctn { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; flex-shrink: 0; }
        .logo-ctn img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; cursor: pointer; transition: 0.2s; }
        .logo-ctn img:hover { filter: brightness(0.9); }
        .edit-pen { cursor: pointer; color: var(--primary); margin-right: 8px; font-size: 14px; transition: 0.2s; }
        .edit-pen:hover { transform: scale(1.2); text-shadow: 0 0 5px var(--primary); }
        
        /* أزرار التحكم على الكروت */
        .card-controls { position: absolute; top: 8px; left: 8px; display: flex; gap: 8px; z-index: 25; opacity: 0; transition: 0.2s; }
        .item-card:hover .card-controls { opacity: 1; }
        .ctrl-btn { background: rgba(0,0,0,0.8); border: none; color: white; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; backdrop-filter: blur(4px); font-size: 12px; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; }
        .ctrl-btn.delete-btn { color: #ff5e5e; }
        .ctrl-btn.delete-btn:hover { background: #ff2e2e; color: white; transform: scale(1.05); }
        .ctrl-btn.edit-img-btn:hover { background: var(--primary); color: white; }
        
        /* زر إضافة سريع داخل القسم */
        .add-section-btn { background: rgba(155,81,224,0.1); border: 2px dashed #444; border-radius: 12px; padding: 12px; text-align: center; cursor: pointer; color: #aaa; transition: 0.3s; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; }
        .add-section-btn:hover { border-color: var(--primary); color: var(--primary); background: rgba(155,81,224,0.2); }
        
        /* المحتوى القابل للتعديل */
        [contenteditable="true"] { outline: none; border-bottom: 1px dashed rgba(155,81,224,0.5); transition: 0.2s; display: inline-block; min-width: 40px; }
        [contenteditable="true"]:focus { border-bottom-color: var(--primary); background: rgba(155,81,224,0.1); border-radius: 6px; }
        
        /* البطاقات */
        .item-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color); transition: transform 0.3s cubic-bezier(0.2,0.9,0.4,1.1), box-shadow 0.3s; cursor: pointer; position: relative; z-index: 1; }
        .item-card:hover { transform: scale(1.05); z-index: 100; box-shadow: var(--shadow-strong); border-color: var(--primary); }
        .item-card img { width: 100%; height: 260px; object-fit: cover; display: block; transition: 0.2s; cursor: pointer; }
        .hover-details { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(10,10,10,0.96); padding: 14px 12px; opacity: 0; visibility: hidden; transition: 0.25s ease; border-top: 1px solid var(--primary); border-radius: 0 0 12px 12px; backdrop-filter: blur(8px); }
        .item-card:hover .hover-details { opacity: 1; visibility: visible; }
        .item-name { font-size: 14px; font-weight: 800; margin-bottom: 6px; color: #fff; text-align: center; }
        .item-story { font-size: 11px; color: #ccc; line-height: 1.4; height: 50px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; text-align: center; margin-bottom: 8px; }
        .meta-info { display: flex; justify-content: center; gap: 6px; font-size: 10px; margin-bottom: 8px; flex-wrap: wrap; }
        .meta-info span { background: #1a1a1a; padding: 3px 8px; border-radius: 20px; }
        .watch-btn { background: var(--primary); color: #fff; font-size: 12px; padding: 8px 12px; border-radius: 40px; font-weight: bold; display: inline-block; text-align: center; text-decoration: none; width: 100%; border: none; cursor: pointer; transition: 0.2s; }
        .watch-btn:hover { background: #b77ef0; letter-spacing: 0.5px; }
        
        /* سلايدر */
        .slider-container { max-width: 1620px; margin: 20px auto; padding: 0 40px; }
        #heroSection { width: 100%; height: 420px; position: relative; overflow: hidden; border-radius: 20px; border: 1px solid #2a2a2a; background: #000; }
        .slider-wrapper { display: flex; width: 100%; height: 100%; transition: transform 0.7s cubic-bezier(0.2,0.9,0.4,1); }
        .slide { min-width: 100%; height: 100%; background-size: cover; background-position: center 20%; position: relative; cursor: pointer; }
        .slide-overlay { position: absolute; inset: 0; background: linear-gradient(to top, #070707 10%, transparent 80%); display: flex; flex-direction: column; justify-content: flex-end; padding: 40px; }
        .slide-title { font-size: 32px; font-weight: 900; margin-bottom: 12px; text-shadow: 2px 2px 12px black; }
        .edit-slide-btn { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7); border-radius: 30px; padding: 6px 12px; z-index: 30; cursor: pointer; font-size: 12px; backdrop-filter: blur(5px); }
        
        /* الشبكة والتخطيط */
        .container { padding: 20px 40px; display: grid; grid-template-columns: 280px 1fr 280px; gap: 30px; max-width: 1700px; margin: 0 auto; }
        .section-box { margin-bottom: 50px; }
        .section-title { background: #111; padding: 12px 20px; font-size: 18px; font-weight: bold; margin-bottom: 20px; border-right: 5px solid var(--primary); display: flex; align-items: center; gap: 10px; justify-content: space-between; }
        .grid-display { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 24px; }
        .sidebar { background: #111; border: 1px solid var(--border-color); border-radius: 16px; height: fit-content; position: sticky; top: 90px; }
        .side-title { background: #1a1a1a; color: var(--primary); padding: 12px; font-weight: bold; text-align: center; border-radius: 16px 16px 0 0; display: flex; justify-content: space-between; align-items: center; }
        .side-list { padding: 8px; }
        .side-item { display: flex; align-items: center; gap: 12px; padding: 10px; border-bottom: 1px solid #222; cursor: pointer; transition: 0.2s; }
        .side-item img { width: 45px; height: 65px; border-radius: 8px; object-fit: cover; cursor: pointer; }
        
        /* مودال متقدم للحلقات والسيرفرات */
        .admin-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 10000; backdrop-filter: blur(12px); }
        .modal-content { background: #111; padding: 25px; border-radius: 24px; border: 1px solid var(--primary); width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; }
        .modal-content input, .modal-content textarea { width: 100%; padding: 12px; margin: 8px 0; background: #1e1e1e; border: 1px solid #333; color: white; border-radius: 12px; font-family: inherit; }
        .servers-group { background: #0a0a0a; padding: 12px; border-radius: 16px; margin: 15px 0; }
        .episode-item { display: flex; gap: 8px; margin: 8px 0; align-items: center; }
        .save-btn { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 40px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        
        .hidden { display: none !important; }
        .pagination-container { display: flex; justify-content: center; gap: 8px; margin-top: 25px; }
        .page-btn { background: #1a1a1a; border: 1px solid #333; padding: 6px 12px; border-radius: 8px; cursor: pointer; }
        .page-btn.active { background: var(--primary); }
        
        @media (max-width: 1000px) { .container { grid-template-columns: 1fr; } .sidebar { display: none; } .header { padding: 0 20px; } }
    </style>
</head>
<body>

<header class="header">
    <div class="logo-ctn">
        <img id="siteLogo" src="https://i.ibb.co/5ggRsXdV/Red-Black-Modern-Movie-Cinema-Presentation-20260311-124846.jpg" alt="logo" onclick="changeImageDirectly(this)">
        <span id="siteTitleText" style="font-weight: bold; font-size: 22px;" contenteditable="true">WATCH<span style="color: var(--primary);">GO</span></span>
        <i class="fa-solid fa-pen-to-square edit-pen" onclick="focusEditTitle()"></i>
    </div>
    <nav class="main-nav" style="display: flex; list-style: none; gap: 5px;">
        <div class="nav-item"><a class="nav-link" href="#" onclick="return false;">الرئيسية</a></div>
        <div class="nav-item"><a class="nav-link" href="#" onclick="return false;">الأفلام</a></div>
        <div class="nav-item"><a class="nav-link" href="#" onclick="return false;">أنمي</a></div>
    </nav>
    <div class="header-icons"><i class="fa-solid fa-magnifying-glass icon-btn" onclick="alert('بحث متقدم قريباً')"></i></div>
</header>

<!-- سلايدر تفاعلي -->
<div class="slider-container"><div id="heroSection"><div class="slider-wrapper" id="sliderWrapper"></div></div></div>

<div class="container">
    <aside class="sidebar" id="rightSidebar">
        <div class="side-title">⭐ أعلى التقييمات <i class="fa-regular fa-pen-to-square edit-pen" onclick="editSidebarTitle(this)"></i></div>
        <div id="bestMoviesSide" class="side-list"></div>
        <div class="add-section-btn" onclick="addSideItem('bestMoviesSide')"><i class="fa-solid fa-plus"></i> إضافة فيلم للسايد بار</div>
    </aside>

    <main class="main-col">
        <!-- قسم المطور (المحتوى القابل للإدارة) -->
        <section class="section-box" id="devSection">
            <div class="section-title"><span id="devSectionName" contenteditable="true"><i class="fa-solid fa-code"></i> 📀 إضافاتي الشخصية</span><i class="fa-regular fa-pen-to-square edit-pen" onclick="focusEditable('devSectionName')"></i></div>
            <div class="grid-display" id="developerGrid"></div>
            <div class="add-section-btn" onclick="addCustomMovie()"><i class="fa-solid fa-plus-circle"></i> إضافة عمل جديد +</div>
        </section>

        <section class="section-box">
            <div class="section-title"><span contenteditable="true">🌙 مسلسلات رمضان 2026</span><i class="fa-regular fa-pen-to-square edit-pen"></i></div>
            <div class="grid-display" id="ramadanGrid"></div>
            <div class="pagination-container" id="ramadanPag"></div>
            <div class="add-section-btn" onclick="addMovieToSection('ramadan')"><i class="fa-solid fa-tv"></i> إضافة مسلسل رمضاني</div>
        </section>

        <section class="section-box">
            <div class="section-title"><span contenteditable="true">🇪🇬 أحدث الأفلام المصرية</span></div>
            <div class="grid-display" id="egyptGrid"></div>
            <div class="pagination-container" id="egyptPag"></div>
            <div class="add-section-btn" onclick="addMovieToSection('egypt')"><i class="fa-solid fa-film"></i> إضافة فيلم مصري</div>
        </section>
    </main>

    <aside class="sidebar" id="leftSidebar">
        <div class="side-title">🎌 عالم الأنمي <i class="fa-regular fa-pen-to-square edit-pen" onclick="editSidebarTitle(this)"></i></div>
        <div id="animeSide" class="side-list"></div>
        <div class="add-section-btn" onclick="addSideItem('animeSide')"><i class="fa-solid fa-plus"></i> إضافة أنمي</div>
    </aside>
</div>

<!-- مودال تفاصيل كامل (حلقات + سيرفرات + قصة) -->
<div id="detailModal" class="admin-modal">
    <div class="modal-content">
        <h3 style="color:var(--primary);">📽️ تحرير التفاصيل: <span id="modalItemTitle"></span></h3>
        <label>القصة الطويلة:</label><textarea id="modalStory" rows="3" placeholder="أدخل القصة ..."></textarea>
        <label>روابط السيرفرات (يفصل بينها بفاصلة):</label><input id="modalServers" placeholder="https://server1.com, https://server2.com">
        <label>الحلقات (للمسلسلات):</label><div id="episodesList"></div>
        <button onclick="addEpisodeField()" style="background:#222; border:none; padding:6px; margin:5px 0; border-radius:20px; color:var(--primary); cursor:pointer;">+ إضافة حلقة جديدة</button>
        <button class="save-btn" onclick="saveItemDetails()">💾 حفظ التفاصيل وإغلاق</button>
        <button onclick="closeModal()" style="background:none; border:none; color:#aaa; margin-top:10px;">إلغاء</button>
    </div>
</div>

<script>
    // ------------------- النظام الأساسي لتخزين البيانات (localStorage) ------------------
    let appData = {
        customMovies: [],     // { id, title, image, rating, year, story, servers, episodes, sectionType }
        ramadanSeries: [],
        egyptMovies: [],
        sliderItems: [],
        sideBest: [],
        sideAnime: []
    };
    
    // تحميل البيانات أو تهيئة افتراضية
    function loadData() {
        const saved = localStorage.getItem('WatchGoStudioData');
        if(saved) {
            try { appData = JSON.parse(saved); } catch(e){}
        }
        if(!appData.customMovies || !appData.customMovies.length) {
            appData.customMovies = [
                { id: 'c1', title: 'المطور: عالم الظل', image: 'https://image.tmdb.org/t/p/w500/7IiTTgloJzvGI1TAYymCfbfl3vT.jpg', rating: '9.2', year: '2025', story: 'دراما خيالية عن المبرمج الخارق', servers: 'https://embed.su/1', episodes: [] },
                { id: 'c2', title: 'BaqrVerse', image: 'https://image.tmdb.org/t/p/w500/8cdWjvZcEx2wgYjKjNgGixPcYf9.jpg', rating: '8.7', year: '2026', story: 'مغامرة في عالم البيكسلات', servers: 'https://example.com/stream', episodes: [] }
            ];
        }
        if(!appData.ramadanSeries || !appData.ramadanSeries.length) {
            appData.ramadanSeries = [
                { id: 'r1', title: 'الكبير أوي 8', image: 'https://image.tmdb.org/t/p/w500/9cJX7mwh6yA2DstE4Ze4YqXQq9C.jpg', rating: '8.5', year: '2026', story: 'كوميديا رمضانية', servers: '', episodes: ['ح1', 'ح2'] },
                { id: 'r2', title: 'عتاله 2026', image: 'https://image.tmdb.org/t/p/w500/2Sns5oMbYJRLZpZ7QtWHThCYLvf.jpg', rating: '9.0', year: '2026', story: 'أكشن دراما', servers: '', episodes: [] }
            ];
        }
        if(!appData.egyptMovies || !appData.egyptMovies.length) {
            appData.egyptMovies = [
                { id: 'e1', title: 'ولاد رزق 4', image: 'https://image.tmdb.org/t/p/w500/1E5pt8CwFpQy9lLqLmGjzXlZ9k.jpg', rating: '8.3', year: '2025', story: 'فيلم أكشن مصري', servers: '', episodes: [] },
                { id: 'e2', title: 'الفيل الأزرق 3', image: 'https://image.tmdb.org/t/p/w500/4xjRzK0E7q3WqRcQnZK5vMqUeRc.jpg', rating: '9.1', year: '2025', story: 'غموض وإثارة', servers: '', episodes: [] }
            ];
        }
        if(!appData.sliderItems || !appData.sliderItems.length) {
            appData.sliderItems = [
                { image: 'https://image.tmdb.org/t/p/original/6oom5QYQ2yQTMJIbnvbkBL9cHo6.jpg', title: 'أفلام حصرية 2026' },
                { image: 'https://image.tmdb.org/t/p/original/7RyHsO4yDXtBv1zUU3mTpHeQ0d5.jpg', title: 'مسلسلات رمضان' }
            ];
        }
        if(!appData.sideBest || !appData.sideBest.length) {
            appData.sideBest = [{ title: 'Inception', img: 'https://image.tmdb.org/t/p/w200/9gk7adHYeDvHkCSEqAvQNLV5UY4.jpg' }, { title: 'The Dark Knight', img: 'https://image.tmdb.org/t/p/w200/qJ2tW6WMUDux911r6m7haRef0WH.jpg' }];
        }
        if(!appData.sideAnime || !appData.sideAnime.length) {
            appData.sideAnime = [{ title: 'Attack on Titan', img: 'https://image.tmdb.org/t/p/w200/zqkmTX5y2sU0dR1jfFdYkz5cRgM.jpg' }, { title: 'Demon Slayer', img: 'https://image.tmdb.org/t/p/w200/3Y9e4qV6Q9VwqXJ3jQJYz8kQnV.jpg' }];
        }
        saveToLocal();
    }
    function saveToLocal() { localStorage.setItem('WatchGoStudioData', JSON.stringify(appData)); }
    
    // أدوات عامة
    let currentEditItem = null;
    function openDetailModal(item, sectionKey, idx) {
        currentEditItem = { sectionKey, idx, item };
        document.getElementById('modalItemTitle').innerText = item.title;
        document.getElementById('modalStory').value = item.story || '';
        document.getElementById('modalServers').value = (item.servers || '').join ? item.servers.join(',') : (item.servers || '');
        renderEpisodesUI(item.episodes || []);
        document.getElementById('detailModal').style.display = 'flex';
    }
    function renderEpisodesUI(episodes) {
        const container = document.getElementById('episodesList');
        container.innerHTML = '';
        episodes.forEach((ep, i) => {
            const div = document.createElement('div');
            div.className = 'episode-item';
            div.innerHTML = `<input type="text" value="${ep}" placeholder="اسم الحلقة" style="flex:1;" data-ep-index="${i}"><button onclick="removeEpisode(${i})" style="background:#c00; border:none; color:white; border-radius:30px; padding:4px 10px;">✖</button>`;
            container.appendChild(div);
        });
    }
    window.addEpisodeField = function() {
        if(!currentEditItem) return;
        const eps = currentEditItem.item.episodes || [];
        eps.push('حلقة جديدة');
        currentEditItem.item.episodes = eps;
        renderEpisodesUI(eps);
    };
    window.removeEpisode = function(idx) {
        if(!currentEditItem) return;
        currentEditItem.item.episodes.splice(idx,1);
        renderEpisodesUI(currentEditItem.item.episodes);
    };
    function saveItemDetails() {
        if(!currentEditItem) return;
        const { sectionKey, idx, item } = currentEditItem;
        item.story = document.getElementById('modalStory').value;
        const serversRaw = document.getElementById('modalServers').value;
        item.servers = serversRaw.split(',').map(s=>s.trim());
        // تحديث الحلقات من واجهة المستخدم
        const newEps = [];
        document.querySelectorAll('#episodesList input').forEach(inp => newEps.push(inp.value));
        item.episodes = newEps;
        // حفظ في القسم
        if(sectionKey === 'custom') appData.customMovies[idx] = item;
        else if(sectionKey === 'ramadan') appData.ramadanSeries[idx] = item;
        else if(sectionKey === 'egypt') appData.egyptMovies[idx] = item;
        saveToLocal();
        renderAllSections();
        closeModal();
    }
    function closeModal() { document.getElementById('detailModal').style.display = 'none'; currentEditItem = null; }
    
    // عرض البطاقات مع أزرار حذف وتعديل الصورة
    function generateCard(item, sectionKey, idx) {
        return `<div class="item-card" data-idx="${idx}" data-section="${sectionKey}">
            <div class="card-controls">
                <button class="ctrl-btn edit-img-btn" onclick="event.stopPropagation(); changeCardImage(this, '${sectionKey}', ${idx})"><i class="fa-regular fa-image"></i></button>
                <button class="ctrl-btn delete-btn" onclick="event.stopPropagation(); deleteCardItem('${sectionKey}', ${idx})"><i class="fa-regular fa-trash-can"></i></button>
            </div>
            <img src="${item.image}" onerror="this.src='https://via.placeholder.com/300x450?text=Poster'" onclick="event.stopPropagation(); changeCardImageDirect(this, '${sectionKey}', ${idx})">
            <div class="hover-details">
                <div class="item-name" contenteditable="true" onblur="updateItemField('${sectionKey}',${idx},'title',this.innerText)">${item.title}</div>
                <p class="item-story" contenteditable="true" onblur="updateItemField('${sectionKey}',${idx},'story',this.innerText)">${item.story || 'قصة العمل...'}</p>
                <div class="meta-info"><span>${item.year || '2026'}</span><span>⭐ ${item.rating || '7.5'}</span></div>
                <button class="watch-btn" onclick="event.stopPropagation(); openDetailModalForItem('${sectionKey}', ${idx})"><i class="fa-regular fa-circle-play"></i> مشاهدة (سيرفرات/حلقات)</button>
            </div>
        </div>`;
    }
    
    window.updateItemField = (section, idx, field, value) => {
        let targetArr;
        if(section === 'custom') targetArr = appData.customMovies;
        else if(section === 'ramadan') targetArr = appData.ramadanSeries;
        else targetArr = appData.egyptMovies;
        if(targetArr[idx]) targetArr[idx][field] = value;
        saveToLocal();
    };
    window.deleteCardItem = (section, idx) => {
        if(section === 'custom') appData.customMovies.splice(idx,1);
        else if(section === 'ramadan') appData.ramadanSeries.splice(idx,1);
        else if(section === 'egypt') appData.egyptMovies.splice(idx,1);
        saveToLocal();
        renderAllSections();
    };
    window.changeCardImage = (btn, section, idx) => {
        let newUrl = prompt('أدخل رابط الصورة الجديد (Poster):');
        if(newUrl) {
            let targetArr;
            if(section === 'custom') targetArr = appData.customMovies;
            else if(section === 'ramadan') targetArr = appData.ramadanSeries;
            else targetArr = appData.egyptMovies;
            if(targetArr[idx]) targetArr[idx].image = newUrl;
            saveToLocal();
            renderAllSections();
        }
    };
    window.changeCardImageDirect = (imgElem, section, idx) => {
        let newUrl = prompt('رابط البوستر الجديد:', imgElem.src);
        if(newUrl) {
            let targetArr;
            if(section === 'custom') targetArr = appData.customMovies;
            else if(section === 'ramadan') targetArr = appData.ramadanSeries;
            else targetArr = appData.egyptMovies;
            if(targetArr[idx]) targetArr[idx].image = newUrl;
            saveToLocal();
            renderAllSections();
        }
    };
    window.openDetailModalForItem = (section, idx) => {
        let item, arr;
        if(section === 'custom') arr = appData.customMovies;
        else if(section === 'ramadan') arr = appData.ramadanSeries;
        else arr = appData.egyptMovies;
        item = arr[idx];
        if(item) openDetailModal(item, section, idx);
    };
    
    // إضافة محتوى جديد
    window.addCustomMovie = () => {
        const newId = 'c'+Date.now();
        appData.customMovies.push({ id:newId, title:'فيلم جديد', image:'https://image.tmdb.org/t/p/w500/3jOoD8jX6KzO0jZvjM9W3jYwZ.jpg', rating:'7.0', year:'2026', story:'أضف القصة', servers:[] });
        saveToLocal();
        renderAllSections();
    };
    window.addMovieToSection = (type) => {
        if(type === 'ramadan') appData.ramadanSeries.push({ id:'r'+Date.now(), title:'مسلسل رمضاني', image:'https://image.tmdb.org/t/p/w500/8s6hU9jGkZcM7QpY3vFqY9nLw.jpg', rating:'8', year:'2026', story:'وصف', servers:[] });
        else if(type === 'egypt') appData.egyptMovies.push({ id:'e'+Date.now(), title:'فيلم مصري', image:'https://image.tmdb.org/t/p/w500/5z1Fj7Z6QpX8Y3lKvRrP2tWcM.jpg', rating:'7.5', year:'2026', story:'وصف', servers:[] });
        saveToLocal();
        renderAllSections();
    };
    // السايد بار editable
    window.addSideItem = (targetId) => {
        let newTitle = prompt('اسم الفيلم/المسلسل:');
        if(!newTitle) return;
        let newImg = prompt('رابط الصورة:','https://image.tmdb.org/t/p/w200/placeholder.jpg');
        if(targetId === 'bestMoviesSide') appData.sideBest.push({ title:newTitle, img:newImg });
        else appData.sideAnime.push({ title:newTitle, img:newImg });
        saveToLocal();
        renderSidebars();
    };
    function renderSidebars() {
        const bestDiv = document.getElementById('bestMoviesSide');
        bestDiv.innerHTML = appData.sideBest.map((item,i)=>`<div class="side-item" onclick="openDetailModalForSideItem('best',${i})"><img src="${item.img}" onclick="event.stopPropagation(); changeSideImage('best',${i})"><div class="txt" contenteditable="true" onblur="updateSideField('best',${i},this.innerText)">${item.title}</div><i class="fa-regular fa-trash-can" style="margin-right:auto; color:#ff5e5e;" onclick="event.stopPropagation(); deleteSideItem('best',${i})"></i></div>`).join('');
        const animeDiv = document.getElementById('animeSide');
        animeDiv.innerHTML = appData.sideAnime.map((item,i)=>`<div class="side-item"><img src="${item.img}" onclick="event.stopPropagation(); changeSideImage('anime',${i})"><div class="txt" contenteditable="true" onblur="updateSideField('anime',${i},this.innerText)">${item.title}</div><i class="fa-regular fa-trash-can" style="margin-right:auto; color:#ff5e5e;" onclick="event.stopPropagation(); deleteSideItem('anime',${i})"></i></div>`).join('');
    }
    window.updateSideField = (type, idx, val) => { if(type==='best') appData.sideBest[idx].title=val; else appData.sideAnime[idx].title=val; saveToLocal(); };
    window.deleteSideItem = (type, idx) => { if(type==='best') appData.sideBest.splice(idx,1); else appData.sideAnime.splice(idx,1); saveToLocal(); renderSidebars(); };
    window.changeSideImage = (type, idx) => { let newUrl=prompt('رابط الصورة'); if(newUrl){ if(type==='best') appData.sideBest[idx].img=newUrl; else appData.sideAnime[idx].img=newUrl; saveToLocal(); renderSidebars(); } };
    
    // سلايدر
    function renderSlider() {
        const wrapper = document.getElementById('sliderWrapper');
        wrapper.innerHTML = appData.sliderItems.map((slide,i)=>`<div class="slide" style="background-image: url('${slide.image}');"><div class="slide-overlay"><div class="slide-title" contenteditable="true" onblur="updateSliderField(${i},'title',this.innerText)">${slide.title}</div><button class="watch-btn" style="width:120px;" onclick="event.stopPropagation(); alert('سيتم التشغيل')">مشاهدة</button></div><div class="edit-slide-btn" onclick="event.stopPropagation(); changeSlideImage(${i})"><i class="fa-regular fa-pen-to-square"></i> تغيير الصورة</div></div>`).join('');
        let index=0; setInterval(()=>{ index=(index+1)%appData.sliderItems.length; wrapper.style.transform=`translateX(-${index*100}%)`; },5000);
    }
    window.updateSliderField = (idx,field,val) => { if(appData.sliderItems[idx]) appData.sliderItems[idx][field]=val; saveToLocal(); };
    window.changeSlideImage = (idx) => { let newUrl=prompt('رابط خلفية السلايدر:'); if(newUrl){ appData.sliderItems[idx].image=newUrl; renderSlider(); saveToLocal(); } };
    
    function renderAllSections() {
        document.getElementById('developerGrid').innerHTML = appData.customMovies.map((item,i)=>generateCard(item,'custom',i)).join('');
        document.getElementById('ramadanGrid').innerHTML = appData.ramadanSeries.map((item,i)=>generateCard(item,'ramadan',i)).join('');
        document.getElementById('egyptGrid').innerHTML = appData.egyptMovies.map((item,i)=>generateCard(item,'egypt',i)).join('');
        renderSidebars();
        renderSlider();
    }
    
    // تعديلات إضافية
    window.changeImageDirectly = (imgElement) => { let url=prompt('رابط الشعار الجديد:'); if(url) imgElement.src=url; saveToLocal(); };
    window.focusEditTitle = () => { document.getElementById('siteTitleText').focus(); };
    window.editSidebarTitle = (btn) => { const titleSpan = btn.parentElement.querySelector('.side-title span') || btn.parentElement; const newT=prompt('عنوان جديد', titleSpan.innerText); if(newT) titleSpan.innerText=newT; saveToLocal(); };
    window.focusEditable = (id) => { document.getElementById(id).focus(); };
    
    // بدء التشغيل
    loadData();
    renderAllSections();
</script>
</body>
</html>
