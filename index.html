<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchGo - Master Admin Mode</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --primary: #9b51e0; 
            --bg-dark: #070707; 
            --card-bg: #111;
            --border-color: #222;
            --netflix-red: #e50914;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; scroll-behavior: smooth; }

        /* --- الهيدر (المطور) --- */
        .header { 
            background: #000; padding: 0 40px; height: 75px;
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 2000;
        }
        .logo-ctn { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; flex-shrink: 0; position: relative; }
        .logo-ctn img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; cursor: pointer; }
        
        /* --- لوحة تحكم الإضافة المتقدمة (طبق الأصل) --- */
        .admin-modal-full {
            position: fixed; inset: 0; background: var(--bg-dark); 
            display: none; flex-direction: column; z-index: 5000; overflow-y: auto; padding-bottom: 50px;
        }
        .preview-header {
            height: 380px; position: relative; background-size: cover; background-position: center;
            border-bottom: 3px solid var(--primary); background-color: #1a1a1a;
            display: flex; align-items: flex-end; padding: 40px;
        }
        .edit-overlay-btn {
            position: absolute; background: rgba(155, 81, 224, 0.8);
            color: white; border: none; padding: 8px 15px; border-radius: 5px;
            cursor: pointer; font-size: 12px; transition: 0.3s;
        }

        .preview-content { padding: 20px 40px; max-width: 1200px; margin: 0 auto; width: 100%; }
        .preview-poster {
            width: 200px; height: 300px; border-radius: 10px; border: 2px solid var(--primary);
            margin-top: -150px; position: relative; background: #222; overflow: hidden;
            background-size: cover; background-position: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .input-minimal {
            background: rgba(255,255,255,0.05); border: 1px solid #333;
            color: white; width: 100%; margin: 10px 0; padding: 12px; border-radius: 8px;
        }

        /* --- التصميم الأساسي والشبكة --- */
        .container { padding: 20px 40px; display: grid; grid-template-columns: 280px 1fr 280px; gap: 25px; max-width: 1700px; margin: 0 auto; }
        .section-title { background: #111; padding: 12px 20px; font-size: 17px; font-weight: bold; margin-bottom: 20px; border-right: 5px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        .grid-display { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; margin-bottom: 20px; }
        
        /* كارت الفيلم (الأصلي مع أزرار شاهد وحمل) */
        .item-card { background: var(--card-bg); border-radius: 8px; border: 1px solid var(--border-color); transition: 0.4s; cursor: pointer; position: relative; overflow: hidden; }
        .item-card:hover { transform: scale(1.05); border-color: var(--primary); }
        .item-card img { width: 100%; height: 260px; object-fit: cover; }
        
        .hover-details { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 15px; opacity: 0; transition: 0.3s; border-top: 1px solid var(--primary); }
        .item-card:hover .hover-details { opacity: 1; }

        .btn-group { display: flex; gap: 5px; margin-top: 10px; }
        .btn-action { flex: 1; padding: 5px; font-size: 11px; border: none; border-radius: 3px; color: white; cursor: pointer; }

        /* الشريط الجانبي */
        .sidebar { background: #0a0a0a; border-radius: 10px; padding: 15px; align-self: start; }
        .side-list { display: flex; flex-direction: column; gap: 15px; }
        .side-item { display: flex; gap: 10px; text-decoration: none; color: #ccc; transition: 0.3s; }
        .side-item img { width: 60px; height: 80px; border-radius: 4px; object-fit: cover; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-ctn">
            <label><img id="siteLogo" src="https://i.ibb.co/5ggRsXdV/Red-Black-Modern-Movie-Cinema-Presentation-20260311-124846.jpg"><input type="file" hidden onchange="uploadImage(this, 'siteLogo')"></label>
            <span id="siteTitleText" style="font-weight: bold; font-size: 22px;">WATCH<span style="color: var(--primary);">GO</span></span>
        </div>
        <nav style="display:flex; gap:20px;">
            <a href="#" class="nav-link" style="color:white; text-decoration:none;">الرئيسية</a>
            <a href="#" onclick="addNewSection()" style="color:var(--primary); text-decoration:none; font-weight:bold;">+ إضافة قسم</a>
        </nav>
    </header>

    <div class="container">
        <aside class="sidebar">
            <div class="section-title">أعلى التقييمات</div>
            <div id="bestMoviesSide" class="side-list"></div>
        </aside>

        <main class="main-col" id="sectionsContainer"></main>

        <aside class="sidebar">
            <div class="section-title">عالم الأنمي</div>
            <div id="animeSide" class="side-list"></div>
        </aside>
    </div>
        <div id="adminModal" class="admin-modal-full">
        <div class="preview-header" id="preBackdrop">
            <button class="edit-overlay-btn" style="top:20px; left:20px;" onclick="document.getElementById('bgUpload').click()">تغيير الغلاف</button>
            <input type="file" id="bgUpload" hidden onchange="uploadImage(this, 'preBackdrop', true)">
            <input type="text" id="mTitle" class="input-minimal" style="font-size:30px; border:none; border-bottom:2px solid var(--primary); background:none; text-align:center;" placeholder="اسم العمل">
        </div>

        <div class="preview-content">
            <div style="display:flex; gap:30px;">
                <div class="preview-poster" id="prePoster">
                    <button class="edit-overlay-btn" style="bottom:0; width:100%; border-radius:0;" onclick="document.getElementById('posterUpload').click()">تغيير البوستر</button>
                    <input type="file" id="posterUpload" hidden onchange="uploadImage(this, 'prePoster', true)">
                </div>
                <div style="flex:1; padding-top:20px;">
                    <textarea id="mDesc" class="input-minimal" rows="4" placeholder="قصة العمل..."></textarea>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="mRate" class="input-minimal" placeholder="التقييم">
                        <input type="text" id="mYear" class="input-minimal" placeholder="السنة">
                    </div>
                </div>
            </div>

            <div class="section-title" style="margin-top:30px;">المواسم والحلقات</div>
            <div id="seasonsBox"></div>
            <button onclick="addSeasonBlock()" class="input-minimal" style="cursor:pointer;">+ إضافة موسم جديد</button>

            <div style="display:flex; gap:20px; margin-top:30px;">
                <button onclick="confirmSaveMovie()" style="flex:2; background:var(--primary); color:white; border:none; padding:15px; border-radius:8px; cursor:pointer;">نشر العمل</button>
                <button onclick="closeAdminModal()" style="flex:1; background:#222; color:white; border:none; border-radius:8px; cursor:pointer;">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = 'https://script.google.com/macros/s/AKfycbw4GkkBMwuUqmeMBYUNV1u0LvQvMla1MgM6ActKpZsdhVvPUnUqdi1StaL_1KkEgniV2A/exec';
        let currentTargetGrid = '';

        function uploadImage(input, targetId, isBg = false) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const el = document.getElementById(targetId);
                    if(isBg) el.style.backgroundImage = `url(${e.target.result})`;
                    else el.src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function renderSection(name, id) {
            const html = `
                <div class="section-box" id="sec_${id}">
                    <div class="section-title"><span>${name}</span></div>
                    <div class="grid-display" id="grid_${id}"></div>
                    <button onclick="openAdminModal('grid_${id}')" style="width:100%; padding:15px; background:#111; border:1px dashed #333; color:#555; cursor:pointer; margin-bottom:30px;">+ إضافة عمل لـ ${name}</button>
                </div>`;
            document.getElementById('sectionsContainer').insertAdjacentHTML('beforeend', html);
        }

        function openAdminModal(gridId) { currentTargetGrid = gridId; document.getElementById('adminModal').style.display = 'flex'; }
        function closeAdminModal() { document.getElementById('adminModal').style.display = 'none'; }

        function addSeasonBlock() {
            const box = document.getElementById('seasonsBox');
            box.insertAdjacentHTML('beforeend', `
                <div style="background:#1a1a1a; padding:15px; border-radius:8px; margin-bottom:10px; border-left:3px solid var(--primary);">
                    <input type="text" class="input-minimal" placeholder="اسم الموسم (مثلاً الموسم الأول)">
                    <textarea class="input-minimal" placeholder="روابط الحلقات (كل رابط في سطر)"></textarea>
                </div>`);
        }

        function confirmSaveMovie() {
            const title = document.getElementById('mTitle').value;
            const poster = document.getElementById('prePoster').style.backgroundImage.slice(5, -2);
            if(!title) return alert("ادخل العنوان");

            const card = `
                <div class="item-card">
                    <img src="${poster}">
                    <div class="hover-details">
                        <div style="font-weight:bold; text-align:center;">${title}</div>
                        <div class="btn-group">
                            <button class="btn-action" style="background:var(--primary)">شاهد</button>
                            <button class="btn-action" style="background:#333">تحميل</button>
                        </div>
                    </div>
                </div>`;
            document.getElementById(currentTargetGrid).insertAdjacentHTML('beforeend', card);
            closeAdminModal();
        }

        // الربط مع السيرفر و API
        async function loadTMDB(endpoint, gridId, type) {
            try {
                const res = await fetch(`${BASE_URL}?endpoint=${endpoint}&language=ar-SA`);
                const data = await res.json();
                const html = data.results.slice(0, 6).map(m => `
                    <div class="item-card" onclick="location.href='movie.html?id=${m.id}&type=${type}'">
                        <img src="https://image.tmdb.org/t/p/w500${m.poster_path}">
                        <div class="hover-details">
                            <div style="font-weight:bold; text-align:center;">${m.title || m.name}</div>
                            <div style="color:var(--primary); text-align:center; font-size:12px;">⭐ ${m.vote_average}</div>
                        </div>
                    </div>`).join('');
                document.getElementById(gridId).innerHTML = html;
            } catch(e) { console.log("خطأ في التحميل"); }
        }

        window.onload = () => {
            renderSection("مسلسلات رمضان 2026", "ramadan");
            renderSection("أفلام مصرية", "egypt");
            loadTMDB('discover/tv', 'grid_ramadan', 'tv');
            loadTMDB('discover/movie', 'grid_egypt', 'movie');
            // تحميل الجوانب
            loadTMDB('movie/top_rated', 'bestMoviesSide', 'movie');
            loadTMDB('discover/tv', 'animeSide', 'tv');
        };
    </script>
</body>
</html>
