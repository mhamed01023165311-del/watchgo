<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchGo - Pro Master Mode</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --primary: #9b51e0; 
            --bg-dark: #070707; 
            --card-bg: #111;
            --border-color: #222;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; scroll-behavior: smooth; }

        /* الهيدر المطور */
        .header { 
            background: #000; padding: 0 40px; height: 75px;
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 2000;
        }
        .logo-ctn { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; }
        .logo-ctn img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; }

        /* نظام الشبكة والأقسام (تحت بعض) */
        .main-layout { display: flex; flex-direction: column; gap: 35px; padding: 20px 40px; }
        .section-box { border-right: 5px solid var(--primary); padding-right: 15px; margin-bottom: 20px; }
        .grid-display { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 20px; 
            margin-top: 15px;
        }

        /* السلايدر المصلح */
        .slider-container { max-width: 1620px; margin: 20px auto; padding: 0 40px; }
        #heroSection { width: 100%; height: 420px; position: relative; overflow: hidden; border-radius: 15px; border: 1px solid var(--border-color); background: #000; cursor: pointer; }
        .slider-wrapper { display: flex; width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide { min-width: 100%; height: 100%; background-size: cover; background-position: center 20%; position: relative; }
        
        /* تصغير زر شاهد في السلايدر */
        .watch-btn-sm { 
            background: var(--primary); color: white; padding: 8px 20px; 
            border-radius: 4px; font-size: 13px; font-weight: bold; 
            border: none; cursor: pointer; margin-top: 15px; width: fit-content;
        }

        /* كروت الأفلام المطور */
        .item-card { background: var(--card-bg); border-radius: 10px; border: 1px solid var(--border-color); transition: 0.4s; cursor: pointer; position: relative; overflow: hidden; }
        .item-card:hover { transform: scale(1.08); z-index: 10; border-color: var(--primary); box-shadow: 0 10px 40px rgba(0,0,0,0.9); }
        .item-card img { width: 100%; height: 260px; object-fit: cover; }
        
        .hover-details { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 15px; opacity: 0; transition: 0.3s; border-top: 1px solid var(--primary); }
        .item-card:hover .hover-details { opacity: 1; }

        /* باليتة الألوان الـ 30 */
        .palette-box { display: grid; grid-template-columns: repeat(10, 1fr); gap: 8px; padding: 15px; background: #0a0a0a; border-radius: 12px; border: 1px solid var(--primary); }
        .color-dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 1px solid #fff; }

        /* مودال الإضافة الكامل */
        .admin-modal-full { position: fixed; inset: 0; background: var(--bg-dark); display: none; flex-direction: column; z-index: 5000; overflow-y: auto; }
        .input-minimal { background: rgba(255,255,255,0.05); border: 1px solid #333; color: white; width: 100%; margin: 10px 0; padding: 12px; border-radius: 8px; }
        .input-minimal:focus { border-color: var(--primary); outline: none; }
        
        /* مظهر الحلقات الممسوحة */
        .episode-thumb { display: inline-block; margin: 10px; border: 1px solid var(--primary); padding: 8px; border-radius: 10px; background: #111; text-align: center; width: 130px; }
        .episode-thumb img { width: 100%; height: 80px; object-fit: cover; border-radius: 5px; }

        @media (max-width: 768px) { .grid-display { grid-template-columns: repeat(2, 1fr); } .header { padding: 0 15px; } }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo-ctn">
            <img src="https://i.ibb.co/5ggRsXdV/Red-Black-Modern-Movie-Cinema-Presentation-20260311-124846.jpg">
            <span id="siteTitleText" style="font-weight: bold; font-size: 22px;">WATCH<span style="color: var(--primary);">GO</span></span>
        </div>
        
        <div style="display:flex; gap:15px; align-items:center;">
             <i class="fa-solid fa-palette" onclick="togglePalette()" style="cursor:pointer; color:var(--primary); font-size:20px;"></i>
             <button onclick="addNewSection()" style="background:var(--primary); color:white; border:none; padding:8px 18px; border-radius:5px; font-weight:bold; cursor:pointer;">+ إضافة قسم</button>
        </div>
    </header>

    <div class="slider-container" id="sliderArea">
        <div id="heroSection">
            <div class="slider-wrapper" id="sliderWrapper"></div>
        </div>
    </div>
    <main class="main-layout" id="sectionsContainer">
        </main>

    <div id="adminModal" class="admin-modal-full">
        <div style="padding:40px; max-width:900px; margin:0 auto; background: var(--bg-dark);">
            <h2 style="color:var(--primary); border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px;">🎬 إضافة عمل جديد (WatchGo)</h2>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <label>اسم العمل:</label>
                    <input type="text" id="mTitle" class="input-minimal" placeholder="مثلاً: Breaking Bad">
                    <label>التقييم:</label>
                    <input type="text" id="mRate" class="input-minimal" placeholder="⭐ 9.5">
                </div>
                <div>
                    <label>رابط البوستر:</label>
                    <input type="text" id="mPoster" class="input-minimal" placeholder="رابط الصورة المباشر">
                    <label>السنة:</label>
                    <input type="text" id="mYear" class="input-minimal" placeholder="2024">
                </div>
            </div>

            <label>وصف وقصة العمل:</label>
            <textarea id="mDesc" class="input-minimal" rows="4" placeholder="اكتب قصة الفيلم أو المسلسل هنا..."></textarea>

            <div style="margin-top:30px; background: #111; padding: 20px; border-radius: 10px; border: 1px solid #333;">
                <h3 style="color:var(--primary); margin-bottom: 15px;">🎞️ الحلقات / الأجزاء</h3>
                <p style="font-size: 12px; color: #777; margin-bottom: 10px;">(اضغط إضافة حلقة لرفع الصورة من الاستوديو أولاً، ثم اضغط على الحلقة لتعديل بياناتها)</p>
                <div id="itemsPreviewArea" style="min-height: 100px; border: 1px dashed #444; margin-bottom: 15px; padding: 10px;"></div>
                <button onclick="addQuickItem()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">+ إضافة حلقة/جزء جديد</button>
            </div>

            <div style="margin-top:40px; display:flex; gap:15px;">
                <button onclick="saveFinalWork()" style="flex:2; padding:15px; background:var(--primary); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer; font-size:18px;">نشر العمل الآن</button>
                <button onclick="closeModal('adminModal')" style="flex:1; background:#222; color:white; border:none; border-radius:8px; cursor:pointer;">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="episodeEditModal" class="admin-modal-full" style="justify-content:center; align-items:center; background:rgba(0,0,0,0.98);">
        <div style="background:#0a0a0a; padding:35px; border-radius:20px; width:95%; max-width:500px; border:2px solid var(--primary); box-shadow: 0 0 50px rgba(155, 81, 224, 0.2);">
            <h3 style="color:var(--primary); margin-bottom:20px; text-align:center;">📝 تعديل بيانات الحلقة</h3>
            <label style="font-size: 13px; color: #aaa;">اسم الحلقة:</label>
            <input type="text" id="epNameInput" class="input-minimal" placeholder="مثلاً: الحلقة 1">
            <label style="font-size: 13px; color: #aaa;">قصة الحلقة (اختياري):</label>
            <textarea id="epDescInput" class="input-minimal" placeholder="ماذا حدث في هذه الحلقة؟" rows="3"></textarea>
            <label style="font-size: 13px; color: #aaa;">رابط الفيديو / المشاهدة:</label>
            <input type="text" id="epLinkInput" class="input-minimal" placeholder="ضع رابط الفيديو هنا">
            
            <button onclick="finishEpEdit()" style="width:100%; padding:15px; background:var(--primary); border:none; color:white; font-weight:bold; border-radius:10px; margin-top:20px; font-size:16px;">💾 حفظ التفاصيل</button>
            <button onclick="closeModal('episodeEditModal')" style="width:100%; background:none; border:none; color:#555; margin-top:10px; cursor:pointer;">رجوع</button>
        </div>
    </div>

    <div id="paletteModal" class="admin-modal-full" style="justify-content:center; align-items:center; background:rgba(0,0,0,0.95);">
        <div style="background:#111; padding:25px; border-radius:20px; width:350px; border:1px solid var(--primary);">
            <h4 style="text-align:center; margin-bottom:20px; color:var(--primary);">تغيير ثيم الموقع</h4>
            <div class="palette-box" id="paletteGrid"></div>
            <button onclick="closeModal('paletteModal')" style="width:100%; margin-top:25px; padding:12px; background:#222; border:none; color:white; border-radius:10px;">إغلاق</button>
        </div>
    </div>
    <script>
        const BASE_URL = 'https://script.google.com/macros/s/AKfycbw4GkkBMwuUqmeMBYUNV1u0LvQvMla1MgM6ActKpZsdhVvPUnUqdi1StaL_1KkEgniV2A/exec';
        let currentTargetGrid = '';
        let activeEpId = '';

        // 1. نظام الألوان الثابت (30 لون)
        const siteColors = ["#9b51e0", "#e91e63", "#2196f3", "#4caf50", "#ff9800", "#f44336", "#00bcd4", "#8bc34a", "#ffeb3b", "#795548", "#607d8b", "#ff4081", "#7c4dff", "#00e5ff", "#00c853", "#ffd600", "#ff6d00", "#d500f9", "#3d5afe", "#1de9b6", "#c6ff00", "#ffea00", "#ff3d00", "#76ff03", "#00b0ff", "#009688", "#3f51b5", "#673ab7", "#e91e63", "#ffffff"];
        
        function initPalette() {
            const grid = document.getElementById('paletteGrid');
            siteColors.forEach(color => {
                const dot = document.createElement('div');
                dot.className = 'color-dot';
                dot.style.backgroundColor = color;
                dot.onclick = () => applyTheme(color);
                grid.appendChild(dot);
            });
        }

        function applyTheme(color) {
            document.documentElement.style.setProperty('--primary', color);
            localStorage.setItem('watchgo_theme', color);
        }

        function togglePalette() {
            const m = document.getElementById('paletteModal');
            m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
        }

        // 2. إدارة الأقسام (إضافة وحذف)
        function addNewSection() {
            const name = prompt("ما هو اسم القسم الجديد؟");
            if (name) renderNewSection(name, Date.now());
        }

        function renderNewSection(name, id) {
            const html = `
                <section class="section-box" id="sec_${id}">
                    <div class="section-title" style="display:flex; justify-content:space-between; align-items:center; background:#111; padding:10px; border-right:5px solid var(--primary);">
                        <span style="font-weight:bold;">${name}</span>
                        <i class="fa-solid fa-trash" style="cursor:pointer; color:#444; font-size:14px;" onclick="confirmDeleteSection('${id}')"></i>
                    </div>
                    <div class="grid-display" id="grid_${id}"></div>
                    <div style="text-align:center; margin-top:15px;">
                        <button onclick="openAdminModal('grid_${id}')" style="background:none; border:1px dashed #333; color:#555; padding:10px 20px; cursor:pointer; width:100%; border-radius:8px;">+ إضافة عمل إلى ${name}</button>
                    </div>
                </section>`;
            document.getElementById('sectionsContainer').insertAdjacentHTML('beforeend', html);
        }

        function confirmDeleteSection(id) {
            if(confirm("هل أنت متأكد من حذف هذا القسم بالكامل؟")) document.getElementById('sec_'+id).remove();
        }

        // 3. نظام الإضافة المتطور (حلقات ممسوحة)
        function openAdminModal(gridId) {
            currentTargetGrid = gridId;
            document.getElementById('adminModal').style.display = 'flex';
            window.scrollTo(0,0);
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function addQuickItem() {
            const id = 'ep_' + Date.now();
            const html = `
                <div id="${id}" class="episode-thumb">
                    <div style="cursor:pointer; position:relative;" onclick="document.getElementById('input_${id}').click()">
                        <img id="img_${id}" src="https://via.placeholder.com/130x80?text=Upload+Photo">
                        <div style="position:absolute; bottom:0; background:rgba(0,0,0,0.6); width:100%; font-size:10px;">تغيير الصورة</div>
                    </div>
                    <input type="file" id="input_${id}" hidden accept="image/*" onchange="previewEpImage(this, '${id}')">
                    <button onclick="openEpEditor('${id}')" style="margin-top:8px; width:100%; background:var(--primary); border:none; color:white; padding:5px; border-radius:4px; font-size:11px; cursor:pointer;">تعديل البيانات</button>
                    <i class="fa-solid fa-xmark" style="color:red; cursor:pointer; font-size:12px; margin-top:5px;" onclick="this.parentElement.remove()"></i>
                </div>`;
            document.getElementById('itemsPreviewArea').insertAdjacentHTML('beforeend', html);
        }

        function previewEpImage(input, id) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => { document.getElementById('img_'+id).src = e.target.result; };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function openEpEditor(id) {
            activeEpId = id;
            document.getElementById('episodeEditModal').style.display = 'flex';
            // تصفير الخانات (شاشة ممسوحة)
            document.getElementById('epNameInput').value = "";
            document.getElementById('epDescInput').value = "";
            document.getElementById('epLinkInput').value = "";
        }

        function finishEpEdit() {
            const name = document.getElementById('epNameInput').value;
            if(name) {
                // حفظ البيانات في خاصية الـ Card نفسه لاستخدامها لاحقاً
                const card = document.getElementById(activeEpId);
                card.setAttribute('data-title', name);
                card.setAttribute('data-link', document.getElementById('epLinkInput').value);
                alert("تم حفظ بيانات " + name);
            }
            closeModal('episodeEditModal');
        }

        function saveFinalWork() {
            const title = document.getElementById('mTitle').value;
            const poster = document.getElementById('mPoster').value || 'https://via.placeholder.com/260x400';
            if(!title) return alert("يرجى إدخال اسم الفيلم أو المسلسل!");

            const cardHtml = `
                <div class="item-card">
                    <img src="${poster}">
                    <div class="hover-details">
                        <div style="font-weight:bold; text-align:center; font-size:14px;">${title}</div>
                        <div style="display:flex; gap:5px; margin-top:10px;">
                            <button class="watch-btn-sm" style="flex:1;">شاهد</button>
                            <button class="watch-btn-sm" style="flex:1; background:#333;">تحميل</button>
                        </div>
                    </div>
                </div>`;
            document.getElementById(currentTargetGrid).insertAdjacentHTML('beforeend', cardHtml);
            closeModal('adminModal');
            // تنظيف الفورم
            document.getElementById('mTitle').value = "";
            document.getElementById('itemsPreviewArea').innerHTML = "";
        }

        // 4. السلايدر والتشغيل التلقائي
        async function loadSliderData() {
            try {
                const res = await fetch(`${BASE_URL}?endpoint=movie/popular&language=ar-SA`);
                const data = await res.json();
                const wrapper = document.getElementById('sliderWrapper');
                wrapper.innerHTML = data.results.slice(0, 5).map(m => `
                    <div class="slide" style="background-image: url('https://image.tmdb.org/t/p/original${m.backdrop_path}')" onclick="location.href='movie.html?id=${m.id}'">
                        <div style="position:absolute; inset:0; background:linear-gradient(to top, #070707 10%, transparent 80%); padding:40px; display:flex; flex-direction:column; justify-content:flex-end;">
                            <h2 style="font-size:35px; font-weight:900; text-shadow: 2px 2px 10px #000;">${m.title}</h2>
                            <button class="watch-btn-sm">شاهد الآن</button>
                        </div>
                    </div>`).join('');
                startSlider();
            } catch(e) { console.log("Error slider"); }
        }

        function startSlider() {
            let i = 0;
            const w = document.getElementById('sliderWrapper');
            setInterval(() => {
                i = (i + 1) % 5;
                w.style.transform = `translateX(${i * 100}%)`;
            }, 5000);
        }

        // تشغيل كل شيء عند التحميل
        window.onload = () => {
            const saved = localStorage.getItem('watchgo_theme');
            if(saved) document.documentElement.style.setProperty('--primary', saved);
            initPalette();
            loadSliderData();
            // أقسام افتراضية
            renderNewSection("المضاف حديثاً", "default1");
            renderNewSection("أفلام الأكشن", "default2");
        };
    </script>
</body>
</html>
