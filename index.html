<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchGo - Master Admin Mode</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --primary: #9b51e0; 
            --bg-dark: #070707; 
            --card-bg: #111;
            --border-color: #222;
            --netflix-red: #e50914;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; scroll-behavior: smooth; }

        /* --- الهيدر (المطور) --- */
        .header { 
            background: #000; padding: 0 40px; height: 75px;
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 2000;
        }
        .logo-ctn { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; flex-shrink: 0; position: relative; }
        .logo-ctn img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; cursor: pointer; }
        
        /* --- لوحة تحكم الإضافة المتقدمة (Admin UI) --- */
        .admin-modal-full {
            position: fixed; inset: 0; background: var(--bg-dark); 
            display: none; flex-direction: column; z-index: 5000; overflow-y: auto; padding-bottom: 50px;
        }
        .preview-header {
            height: 380px; position: relative; background-size: cover; background-position: center;
            border-bottom: 3px solid var(--primary); background-color: #1a1a1a;
            display: flex; align-items: flex-end; padding: 40px;
        }
        .edit-overlay-btn {
            position: absolute; background: rgba(155, 81, 224, 0.8);
            color: white; border: none; padding: 8px 15px; border-radius: 5px;
            cursor: pointer; font-size: 12px; transition: 0.3s;
        }
        .edit-overlay-btn:hover { background: var(--primary); transform: scale(1.05); }

        .preview-content { padding: 20px 40px; max-width: 1200px; margin: 0 auto; width: 100%; }
        .preview-poster {
            width: 200px; height: 300px; border-radius: 10px; border: 2px solid var(--primary);
            margin-top: -150px; position: relative; background: #222; overflow: hidden;
            background-size: cover; background-position: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .input-minimal {
            background: rgba(255,255,255,0.05); border: 1px solid #333;
            color: white; width: 100%; margin: 10px 0; padding: 12px; border-radius: 8px;
        }
        .input-minimal:focus { border-color: var(--primary); outline: none; background: rgba(155, 81, 224, 0.05); }

        /* ألوان التخصيص (20-30 لون) */
        .color-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 10px; margin: 20px 0; }
        .color-dot { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .color-dot:hover { transform: scale(1.2); }

        /* زر الإضافة في كل قسم */
        .section-add-btn {
            background: #1a1a1a; border: 2px dashed #444; color: #777;
            padding: 15px; border-radius: 8px; cursor: pointer; text-align: center;
            transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .section-add-btn:hover { border-color: var(--primary); color: var(--primary); background: rgba(155, 81, 224, 0.05); }

        /* تنسيقاتك الأصلية كما هي */
        .main-nav { display: flex; list-style: none; height: 100%; align-items: center; gap: 5px; }
        .nav-link { color: #eee; text-decoration: none; font-size: 14px; font-weight: 600; padding: 0 15px; cursor: pointer; transition: 0.3s; }
        .nav-link:hover { color: var(--primary); }
        .dropdown { position: absolute; top: 75px; right: 0; background: #0a0a0a; min-width: 220px; border-top: 3px solid var(--primary); display: none; flex-direction: column; z-index: 3000; }
        .nav-item:hover .dropdown { display: flex; }
        .dropdown a { color: #ccc; padding: 12px 20px; text-decoration: none; border-bottom: 1px solid #1a1a1a; text-align: right; }
        .dropdown a:hover { color: var(--primary); }

        .container { padding: 20px 40px; display: grid; grid-template-columns: 280px 1fr 280px; gap: 25px; max-width: 1700px; margin: 0 auto; }
        .section-title { background: #111; padding: 12px 20px; font-size: 17px; font-weight: bold; margin-bottom: 20px; border-right: 5px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        .grid-display { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; margin-bottom: 20px; }
        
        /* كارت الفيلم الأصلي */
        .item-card { background: var(--card-bg); border-radius: 8px; border: 1px solid var(--border-color); transition: 0.4s; cursor: pointer; position: relative; }
        .item-card:hover { transform: scale(1.05); border-color: var(--primary); }
        .item-card img { width: 100%; height: 260px; object-fit: cover; border-radius: 8px; }
        .hidden { display: none !important; }

        .edit-pen { cursor: pointer; color: var(--primary); font-size: 14px; margin-right: 10px; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-ctn">
            <label>
                <img id="siteLogo" src="https://i.ibb.co/5ggRsXdV/Red-Black-Modern-Movie-Cinema-Presentation-20260311-124846.jpg" title="تغيير اللوجو">
                <input type="file" hidden accept="image/*" onchange="uploadImage(this, 'siteLogo')">
            </label>
            <span id="siteTitleText" style="font-weight: bold; font-size: 22px; margin-right:10px;">WATCH<span style="color: var(--primary);">GO</span></span>
            <i class="fa-solid fa-pen-to-square edit-pen" onclick="editSiteTitle()"></i>
        </div>
        
        <nav class="main-nav">
            <div class="nav-item"><a class="nav-link" href="index.html">الرئيسية</a></div>
            <div class="nav-item">
                <span class="nav-link">الأفلام <i class="fa-solid fa-chevron-down" style="font-size: 10px;"></i></span>
                <div class="dropdown">
                    <a href="#" onclick="showFull('discover/movie', 'أفلام مصرية', 'egypt')">أفلام مصرية</a>
                    <a href="#" onclick="showFull('discover/movie', 'أفلام أجنبية', 'en')">أفلام أجنبية</a>
                </div>
            </div>
            <div class="nav-item"><a class="nav-link" title="إضافة قسم جديد" onclick="addNewSection()"><i class="fa-solid fa-folder-plus"></i> إضافة قسم</a></div>
        </nav>

        <div class="header-icons">
            <div class="nav-item">
                <i class="fa-solid fa-palette icon-btn"></i>
                <div class="dropdown" style="padding: 15px; min-width: 200px;">
                    <div style="font-size:12px; margin-bottom:10px;">اختر لون الهوية:</div>
                    <div class="color-grid" id="themeColors"></div>
                </div>
            </div>
            <i class="fa-solid fa-magnifying-glass icon-btn" onclick="toggleSearch()"></i>
        </div>
    </header>

    <div id="searchBox"><center><input type="text" id="searchInput" placeholder="ابحث..." onkeyup="smartSearch(this.value)"></center></div>
    
    <div class="slider-container" id="sliderArea">
        <div id="heroSection"><div class="slider-wrapper" id="sliderWrapper"></div></div>
    </div>

    <div class="container">
        <aside class="sidebar">
            <div class="side-title">أعلى التقييمات</div>
            <div id="bestMoviesSide" class="side-list"></div>
        </aside>

        <main class="main-col" id="sectionsContainer">
            </main>

        <aside class="sidebar">
            <div class="side-title">عالم الأنمي</div>
            <div id="animeSide" class="side-list"></div>
        </aside>
    </div>

    <div id="adminModal" class="admin-modal-full">
        <div class="preview-header" id="preBackdrop">
            <button class="edit-overlay-btn" style="top:20px; left:20px;" onclick="document.getElementById('bgUpload').click()">
                <i class="fa-solid fa-image"></i> تغيير الغلاف
            </button>
            <input type="file" id="bgUpload" hidden accept="image/*" onchange="uploadImage(this, 'preBackdrop', true)">
            
            <div style="width:100%">
                <input type="text" id="mTitle" class="input-minimal" style="font-size:35px; font-weight:900; background:none; border:none; border-bottom:2px solid var(--primary); width:60%;" placeholder="اسم الفيلم / المسلسل">
            </div>
        </div>

        <div class="preview-content">
            <div style="display:flex; gap:40px;">
                <div class="preview-poster" id="prePoster">
                    <button class="edit-overlay-btn" style="bottom:10px; width:100%; border-radius:0;" onclick="document.getElementById('posterUpload').click()">تغيير البوستر</button>
                    <input type="file" id="posterUpload" hidden accept="image/*" onchange="uploadImage(this, 'prePoster', true)">
                </div>

                <div style="flex:1; padding-top:20px;">
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="mRate" class="input-minimal" style="width:100px;" placeholder="التقييم ⭐">
                        <input type="text" id="mYear" class="input-minimal" style="width:100px;" placeholder="السنة">
                        <input type="text" id="mQuality" class="input-minimal" style="width:100px;" placeholder="الجودة">
                    </div>
                    <textarea id="mDesc" class="input-minimal" rows="5" placeholder="اكتب قصة العمل هنا..."></textarea>
                </div>
            </div>

            <div class="section-title" style="margin-top:40px;">
                <span>المواسم والحلقات</span>
                <button class="save-btn" style="width:auto; padding:5px 20px;" onclick="addSeason()">+ إضافة جزء</button>
            </div>
            <div id="seasonsBox" style="display:grid; grid-template-columns: repeat(4, 1fr); gap:15px; margin-top:15px;"></div>

            <div style="margin-top:50px; display:flex; gap:20px;">
                <button class="save-btn" style="flex:2; height:60px; font-size:20px;" onclick="confirmSaveMovie()">حفظ ونشر العمل في القسم</button>
                <button onclick="closeAdminModal()" style="flex:1; background:#333; color:white; border:none; border-radius:8px; cursor:pointer;">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = 'https://script.google.com/macros/s/AKfycbw4GkkBMwuUqmeMBYUNV1u0LvQvMla1MgM6ActKpZsdhVvPUnUqdi1StaL_1KkEgniV2A/exec';
        let currentTargetGrid = ''; 

        // تلوين الثيم (30 لون)
        const colors = ['#9b51e0', '#e50914', '#2ecc71', '#3498db', '#f1c40f', '#e67e22', '#1abc9c', '#ff4757', '#2f3542', '#7beded', '#70a1ff', '#5352ed', '#ffa502', '#ff6b81', '#1e90ff', '#20bf6b', '#eb3b5a', '#fa8231', '#a55eea', '#4b7bec', '#26de81', '#fed330', '#fb1', '#0fb', '#f0f', '#0ff', '#fff', '#888', '#444', '#222'];
        
        function initTheme() {
            const grid = document.getElementById('themeColors');
            grid.innerHTML = colors.map(c => `<div class="color-dot" style="background:${c}" onclick="changeMainTheme('${c}')"></div>`).join('');
        }

        function changeMainTheme(c) {
            document.documentElement.style.setProperty('--primary', c);
            localStorage.setItem('userTheme', c);
        }

        // رفع الصور من الجهاز وعرضها فوراً
        function uploadImage(input, targetId, isBg = false) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const el = document.getElementById(targetId);
                    if(isBg) el.style.backgroundImage = `url(${e.target.result})`;
                    else el.src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // إضافة قسم جديد
        function addNewSection() {
            const name = prompt("ادخل اسم القسم الجديد:");
            if(!name) return;
            const id = 'custom_' + Date.now();
            renderSection(name, id);
        }

        function renderSection(name, id) {
            const html = `
                <section class="section-box" id="sec_${id}">
                    <div class="section-title">
                        <span id="title_${id}">${name}</span>
                        <div>
                            <i class="fa-solid fa-pen edit-pen" onclick="editSecName('title_${id}')"></i>
                            <i class="fa-solid fa-trash edit-pen" style="color:#e50914" onclick="document.getElementById('sec_${id}').remove()"></i>
                        </div>
                    </div>
                    <div class="grid-display" id="grid_${id}"></div>
                    <div class="section-add-btn" onclick="openAdminModal('grid_${id}')">
                        <i class="fa-solid fa-plus-circle"></i> إضافة فيلم لهذا القسم
                    </div>
                </section>`;
            document.getElementById('sectionsContainer').insertAdjacentHTML('beforeend', html);
        }

        function editSecName(id) {
            const el = document.getElementById(id);
            const n = prompt("تعديل اسم القسم:", el.innerText);
            if(n) el.innerText = n;
        }

        function openAdminModal(gridId) {
            currentTargetGrid = gridId;
            document.getElementById('adminModal').style.display = 'flex';
            window.scrollTo(0,0);
        }

        function closeAdminModal() { document.getElementById('adminModal').style.display = 'none'; }

        function addSeason() {
            const box = document.getElementById('seasonsBox');
            const count = box.children.length + 1;
            box.insertAdjacentHTML('beforeend', `
                <div style="background:#222; padding:10px; border-radius:5px; border:1px solid var(--primary)">
                    <div style="font-size:12px; margin-bottom:5px;">الجزء ${count}</div>
                    <input type="text" class="input-minimal" style="margin:0; padding:5px; font-size:11px;" placeholder="رابط المشاهدة">
                </div>`);
        }

        function confirmSaveMovie() {
            const title = document.getElementById('mTitle').value;
            const poster = document.getElementById('prePoster').style.backgroundImage.slice(5, -2);
            const rate = document.getElementById('mRate').value || "8.5";
            const year = document.getElementById('mYear').value || "2026";

            if(!title) return alert("ادخل اسم الفيلم!");

            const cardHtml = `
                <div class="item-card">
                    <img src="${poster || 'https://via.placeholder.com/500x750'}" alt="${title}">
                    <div class="hover-details">
                        <div class="item-name">${title}</div>
                        <p class="item-story">${document.getElementById('mDesc').value.substring(0,60)}...</p>
                        <div class="meta-info"><span>${year}</span><span style="color:#f1c40f;">★ ${rate}</span></div>
                        <div class="watch-btn">مشاهدة</div>
                    </div>
                </div>`;
            
            document.getElementById(currentTargetGrid).insertAdjacentHTML('beforeend', cardHtml);
            closeAdminModal();
            alert("تمت إضافة العمل بنجاح إلى القسم!");
        }

        // الكود الأصلي كما هو
        async function loadSection(urlPath, gridId, type, cat = '') {
            let url = `${BASE_URL}?endpoint=${urlPath}&language=ar-SA`;
            if(cat === 'egypt') url += `&with_origin_country=EG`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                const cards = await Promise.all(data.results.slice(0, 6).map(m => createCard(m, type)));
                document.getElementById(gridId).innerHTML += cards.join('');
            } catch(e) {}
        }

        async function createCard(m, type) {
            return `
                <div class="item-card" onclick="location.href='movie.html?id=${m.id}&type=${type}'">
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}">
                    <div class="hover-details">
                        <div class="item-name">${m.title || m.name}</div>
                        <div class="meta-info"><span>${m.vote_average} ★</span></div>
                        <div class="watch-btn">مشاهدة</div>
                    </div>
                </div>`;
        }

        function init() {
            initTheme();
            // إنشاء الأقسام الافتراضية
            renderSection("مسلسلات رمضان 2026", "ramadan");
            renderSection("أفلام مصرية حديثة", "egypt");
            renderSection("أفلام عالمية", "global");
            
            // تحميل البيانات من TMDB للأقسام الافتراضية
            loadSection('discover/tv', 'grid_ramadan', 'tv', 'ramadan');
            loadSection('discover/movie', 'grid_egypt', 'movie', 'egypt');
            loadSection('discover/movie', 'grid_global', 'movie');
        }

        function editSiteTitle() {
            const n = prompt("اسم الموقع الجديد:", document.getElementById('siteTitleText').innerText);
            if(n) document.getElementById('siteTitleText').innerHTML = `${n}<span style="color: var(--primary);">GO</span>`;
        }

        init();
    </script>
</body>
</html>
