<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchGo - لوحة تحكم المطور</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* نفس الـ CSS القديم مع إضافات أدوات التعديل */
        :root { --primary: #9b51e0; --bg-dark: #070707; --card-bg: #111; --border-color: #222; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; }

        /* --- أدوات المطور الجديدة --- */
        .admin-badge { background: var(--primary); color: white; padding: 2px 8px; border-radius: 4px; font-size: 10px; margin-right: 10px; }
        
        .edit-pen { 
            cursor: pointer; color: var(--primary); margin-right: 8px; font-size: 14px; 
            transition: 0.3s; vertical-align: middle;
        }
        .edit-pen:hover { transform: scale(1.3); filter: brightness(1.2); }

        .add-card-btn {
            border: 2px dashed #444; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; min-height: 260px; 
            border-radius: 8px; cursor: pointer; color: #777; transition: 0.3s;
        }
        .add-card-btn:hover { border-color: var(--primary); color: var(--primary); background: rgba(155, 81, 224, 0.05); }
        .add-card-btn i { font-size: 40px; margin-bottom: 10px; }

        /* النافذة المنبثقة (Popup) */
        .admin-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center; z-index: 9999;
            backdrop-filter: blur(10px);
        }
        .modal-content {
            background: #111; padding: 30px; border-radius: 15px; border: 1px solid var(--primary);
            width: 90%; max-width: 500px;
        }
        .modal-content input, .modal-content textarea {
            width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333;
            color: white; border-radius: 5px; outline: none;
        }
        .save-btn {
            background: var(--primary); color: white; border: none; padding: 12px;
            width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer;
        }

        /* باقي استايلات الموقع الأصلية */
        .header { background: #000; padding: 0 40px; height: 75px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 2000; }
        .logo-ctn { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; }
        .logo-ctn img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--primary); }
        .slider-container { max-width: 1620px; margin: 20px auto; padding: 0 40px; }
        #heroSection { width: 100%; height: 420px; position: relative; overflow: hidden; border-radius: 15px; background: #000; }
        .container { padding: 20px 40px; display: grid; grid-template-columns: 280px 1fr 280px; gap: 25px; }
        .grid-display { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .section-title { background: #111; padding: 12px 20px; font-size: 17px; font-weight: bold; margin-bottom: 20px; border-right: 5px solid var(--primary); display: flex; align-items: center; }
        .item-card { background: var(--card-bg); border-radius: 8px; border: 1px solid var(--border-color); position: relative; }
        .item-card img { width: 100%; height: 260px; object-fit: cover; border-radius: 8px; }
        .sidebar { background: #111; border-radius: 8px; padding: 10px; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-ctn">
            <img src="https://i.ibb.co/5ggRsXdV/Red-Black-Modern-Movie-Cinema-Presentation-20260311-124846.jpg">
            <span id="siteNameDisplay" style="font-weight: bold; font-size: 22px;">WATCH<span style="color: var(--primary);">GO</span></span>
            <i class="fa-solid fa-pen-to-square edit-pen" onclick="editSiteName()" title="تعديل اسم الموقع"></i>
            <span class="admin-badge">وضع المطور</span>
        </div>
        <div class="header-icons">
            <input type="color" id="themeColor" value="#9b51e0" onchange="changeTheme(this.value)" style="background:none; border:none; width:30px; height:30px; cursor:pointer;" title="تعديل لون الموقع">
        </div>
    </header>

    <div class="slider-container">
        <div id="heroSection" style="display:flex; align-items:center; justify-content:center; border: 2px dashed #333;">
             <p style="color:#555">منطقة السلايدر (يتم جلبها تلقائياً)</p>
        </div>
    </div>

    <div class="container">
        <aside class="sidebar"><div class="section-title">أعلى التقييمات</div></aside>

        <main class="main-col">
            <section class="section-box">
                <div class="section-title">
                    <span id="sec1Title">أفلام المطور المضافة</span>
                    <i class="fa-solid fa-pen-to-square edit-pen" onclick="editSectionTitle('sec1Title')"></i>
                </div>
                <div class="grid-display" id="customMoviesGrid">
                    <div class="add-card-btn" onclick="openAddModal()">
                        <i class="fa-solid fa-plus-circle"></i>
                        <span>إضافة فيلم جديد</span>
                    </div>
                </div>
            </section>
        </main>

        <aside class="sidebar"><div class="section-title">عالم الأنمي</div></aside>
    </div>

    <div id="adminModal" class="admin-modal">
        <div class="modal-content">
            <h3 style="color: var(--primary); margin-bottom: 15px;">إضافة محتوى إلى BaqrDB</h3>
            <input type="text" id="mTitle" placeholder="اسم الفيلم / المسلسل">
            <textarea id="mDesc" placeholder="الوصف والقصة..." rows="4"></textarea>
            <input type="text" id="mImg" placeholder="رابط صورة البوستر (URL)">
            <input type="text" id="mRate" placeholder="التقييم (مثال: 9.2)">
            <button class="save-btn" onclick="saveToBaqr()">حفظ ونشر فوراً</button>
            <button onclick="closeModal()" style="width:100%; background:none; border:none; color:#555; margin-top:10px; cursor:pointer;">إلغاء</button>
        </div>
    </div>

    <script>
        const BASE_URL = 'https://script.google.com/macros/s/AKfycbw4GkkBMwuUqmeMBYUNV1u0LvQvMla1MgM6ActKpZsdhVvPUnUqdi1StaL_1KkEgniV2A/exec';

        // 1. تعديل لون الموقع (Visual)
        function changeTheme(color) {
            document.documentElement.style.setProperty('--primary', color);
            // هنا نبعت أمر حفظ اللون لـ BaqrDB
            updateConfig('primaryColor', color);
        }

        // 2. تعديل اسم الموقع (Visual)
        function editSiteName() {
            const current = document.getElementById('siteNameDisplay').innerText;
            const newName = prompt("اكتب اسم الموقع الجديد:", current);
            if(newName) {
                document.getElementById('siteNameDisplay').innerHTML = newName.replace("GO", `<span style="color:var(--primary)">GO</span>`);
                updateConfig('siteName', newName);
            }
        }

        // 3. تعديل عناوين الأقسام
        function editSectionTitle(id) {
            const el = document.getElementById(id);
            const newTitle = prompt("عنوان القسم الجديد:", el.innerText);
            if(newTitle) {
                el.innerText = newTitle;
                updateConfig(id, newTitle);
            }
        }

        // 4. فتح وإغلاق نافذة الإضافة
        function openAddModal() { document.getElementById('adminModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('adminModal').style.display = 'none'; }

        // 5. الحفظ الفعلي في BaqrDB
        async function saveToBaqr() {
            const data = {
                title: document.getElementById('mTitle').value,
                desc: document.getElementById('mDesc').value,
                img: document.getElementById('mImg').value,
                rate: document.getElementById('mRate').value,
                action: 'addMovie' // إشارة للسكربت إنه يضيف لـ BaqrDB
            };

            if(!data.title || !data.img) return alert("يرجى ملء البيانات الأساسية");

            // عرض حالة التحميل
            document.querySelector('.save-btn').innerText = "... جاري الحفظ";

            try {
                // إرسال البيانات للـ Apps Script اللي مربوط بـ BaqrDB
                const response = await fetch(BASE_URL, {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                
                alert("تم الحفظ في BaqrDB بنجاح! سيظهر الفيلم في نسخة الجمهور.");
                location.reload();
            } catch (e) {
                alert("تم الإرسال (تأكد من إعداد POST في السكريبت)");
                closeModal();
            }
        }

        // دالة مساعدة لتحديث الإعدادات (الألوان والأسماء)
        function updateConfig(key, value) {
            console.log(`Saving ${key}: ${value} to BaqrDB...`);
            // هنا نرسل طلب تحديث بسيط للـ API
            fetch(BASE_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'updateConfig', key: key, value: value })
            });
        }
    </script>
</body>
</html>
